<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VLVD 프로모션 캘린더</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Noto Sans KR', sans-serif; background: #f5f5f5; color: #333; }
        .container { display: flex; height: 100vh; flex-direction: column; }
        .top-bar { 
            background: #fff; 
            border-bottom: 1px solid #e0e0e0; 
            padding: 1rem 2rem; 
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            gap: 2rem;
        }
        .month-control { display: flex; align-items: center; gap: 1.5rem; }
        .month-btn { background: #f5f5f5; border: 1px solid #e0e0e0; padding: 0.5rem 0.75rem; border-radius: 4px; cursor: pointer; font-size: 14px; }
        .month-label { font-size: 16px; font-weight: 600; min-width: 120px; text-align: center; }
        
        .controls-center { 
            display: flex; 
            align-items: center; 
            justify-content: center;
            gap: 2rem;
        }
        
        .channel-filter { display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .channel-btn { padding: 0.5rem 1rem; border: 1px solid #e0e0e0; border-radius: 4px; cursor: pointer; font-size: 12px; background: #f5f5f5; transition: all 0.2s; }
        .channel-btn.active { background: #1976d2; border-color: #1976d2; color: #fff; }
        
        .platform-links { 
            display: flex; 
            gap: 0.75rem;
        }
        
        .platform-link { 
            display: flex; 
            align-items: center; 
            justify-content: center;
            min-width: 60px;
            height: 38px;
            border-radius: 6px; 
            border: 1px solid #e0e0e0;
            text-decoration: none; 
            cursor: pointer;
            transition: all 0.2s;
            background: #000;
            color: #fff;
            font-size: 12px;
            font-weight: 700;
            padding: 0 0.75rem;
            text-align: center;
        }
        
        .platform-link:hover { 
            transform: scale(1.08);
            box-shadow: 0 3px 12px rgba(0,0,0,0.2);
        }
        
        .controls-right {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            justify-content: flex-end;
        }
        
        .view-buttons { display: flex; gap: 0.5rem; }
        .view-btn { background: #f5f5f5; border: 1px solid #e0e0e0; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; font-size: 12px; transition: all 0.2s; }
        .view-btn.active { background: #1976d2; border-color: #1976d2; color: #fff; }
        
        .settings-btn { background: #f5f5f5; border: 1px solid #e0e0e0; padding: 0.5rem 0.75rem; border-radius: 4px; cursor: pointer; font-size: 14px; transition: all 0.2s; }
        .settings-btn:hover { background: #eeeeee; }
        
        .upload-btn { background: #388e3c; border-color: #388e3c; color: #fff; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 600; transition: all 0.2s; }
        .upload-btn:hover { background: #2e7d32; }
        
        .main { flex: 1; display: flex; background: #fafafa; }
        .content { flex: 1; padding: 2rem; overflow-y: auto; }
        .calendar { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 1.5rem; }
        
        .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); gap: 0.5rem; margin-bottom: 1rem; border-bottom: 2px solid #f0f0f0; padding-bottom: 0.5rem; }
        .weekday { text-align: center; font-size: 12px; font-weight: 600; color: #999; padding: 0.5rem; }
        
        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 0.5rem;
            auto-rows: max-content;
        }
        
        .day-cell {
            min-height: 50px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            padding: 0.75rem;
            background: #fafafa;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 12px;
            font-weight: 600;
            color: #666;
        }
        
        .day-cell:hover { background: #f0f0f0; border-color: #ccc; }
        .day-cell.empty { background: #f5f5f5; border: none; cursor: default; }
        .day-cell.has-promo { background: #fff; }
        
        .day-cell.today {
            background: #fff3cd;
            border: 2px solid #ff6b6b;
            box-shadow: 0 0 8px rgba(255, 107, 107, 0.3);
        }
        
        .day-cell.today > div:first-child {
            color: #ff6b6b;
            font-weight: 700;
        }
        
        .promo-item {
            padding: 0.5rem 0.7rem;
            font-size: 11px;
            color: #fff;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
            margin-top: 0.3rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: all 0.2s;
            line-height: 1.3;
            border-radius: 12px;
        }
        
        .promo-item:hover { opacity: 0.9; }
        
        .promo-item.first { 
            border-radius: 12px 0 0 12px;
            margin-right: -2px;
            padding-right: 0.6rem;
        }
        
        .promo-item.middle { 
            border-radius: 0;
            margin-left: -2px;
            margin-right: -2px;
            padding-left: 0.7rem;
            padding-right: 0.7rem;
        }
        
        .promo-item.last { 
            border-radius: 0 12px 12px 0;
            margin-left: -2px;
            padding-left: 0.6rem;
        }
        
        .promo-item.single { 
            border-radius: 12px;
            margin: 0;
        }
        
        .b-29cm { background: var(--color-29cm); }
        .b-musinsa { background: var(--color-musinsa); }
        .b-own { background: var(--color-own); }
        .b-global { background: var(--color-global); }
        
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 1rem; }
        .modal.show { display: flex; }
        .modal-box { background: #fff; border-radius: 8px; padding: 2rem; max-width: 700px; width: 100%; max-height: 90vh; overflow-y: auto; box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; border-bottom: 1px solid #e0e0e0; padding-bottom: 1rem; }
        .modal-header h2 { font-size: 18px; font-weight: 600; }
        .close { background: none; border: none; font-size: 24px; cursor: pointer; color: #999; }
        .form-group { margin-bottom: 1.5rem; }
        .form-label { font-size: 11px; font-weight: 600; color: #666; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-input { width: 100%; padding: 0.75rem; border: 1px solid #e0e0e0; border-radius: 4px; font-size: 14px; font-family: inherit; }
        .form-input:focus { outline: none; border-color: #1976d2; box-shadow: 0 0 0 3px rgba(25, 118, 210, 0.1); }
        .form-value { font-size: 14px; padding: 0.75rem; background: #f5f5f5; border-radius: 4px; word-break: break-all; }
        .form-buttons { display: flex; gap: 1rem; margin-top: 2rem; }
        .btn { padding: 0.75rem 1.5rem; border: 1px solid #e0e0e0; border-radius: 4px; cursor: pointer; flex: 1; font-size: 14px; font-weight: 600; transition: all 0.2s; }
        .btn-primary { background: #1976d2; border-color: #1976d2; color: #fff; }
        .btn-primary:hover { background: #1565c0; }
        .btn-secondary { background: #f5f5f5; color: #333; }
        .btn-secondary:hover { background: #eeeeee; }
        .btn-danger { background: #d32f2f; border-color: #d32f2f; color: #fff; }
        .btn-danger:hover { background: #b71c1c; }
        
        .file-input-btn {
            padding: 1rem;
            background: #f9f9f9;
            border: 2px dashed #d0d0d0;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            text-align: center;
            transition: all 0.2s;
            display: block;
            width: 100%;
            font-weight: 600;
            color: #666;
        }
        
        .file-input-btn:hover {
            background: #f0f7ff;
            border-color: #1976d2;
            color: #1976d2;
        }
        
        .file-input-btn.active {
            background: #f0f7ff;
            border-color: #388e3c;
            color: #388e3c;
        }
        
        .file-info {
            font-size: 12px;
            color: #666;
            margin-top: 0.5rem;
            word-break: break-all;
            text-align: center;
        }
        
        .file-info.selected {
            color: #388e3c;
            font-weight: 600;
        }
        
        #analyzeFile {
            display: none;
        }
        
        .color-picker-group {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }
        
        .color-item {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .color-label {
            font-size: 12px;
            font-weight: 600;
            color: #666;
            min-width: 70px;
        }
        
        .color-input-wrapper {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex: 1;
        }
        
        .color-input {
            width: 50px;
            height: 40px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            cursor: pointer;
        }
        
        .color-value {
            font-size: 12px;
            color: #999;
            font-family: monospace;
        }
        
        .analysis-info {
            background: #f0f7ff;
            border: 1px solid #b3e5fc;
            border-radius: 6px;
            padding: 1rem;
            margin-bottom: 1.5rem;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            margin: 0.6rem 0;
            gap: 1rem;
        }
        
        .info-label {
            font-weight: 600;
            color: #666;
            min-width: 80px;
        }
        
        .info-value {
            color: #1976d2;
            font-weight: 600;
            flex: 1;
        }
        
        .info-row input,
        .info-row select {
            flex: 1;
            padding: 0.5rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 12px;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <div class="month-control">
                <button class="month-btn" onclick="cal.prevMonth()">◀</button>
                <div class="month-label" id="monthLabel">2025년 11월</div>
                <button class="month-btn" onclick="cal.nextMonth()">▶</button>
            </div>
            
            <div class="controls-center">
                <div class="channel-filter">
                    <button class="channel-btn active" onclick="cal.setFilter('all')">전체</button>
                    <button class="channel-btn" onclick="cal.setFilter('29cm')">29CM</button>
                    <button class="channel-btn" onclick="cal.setFilter('musinsa')">무신사</button>
                    <button class="channel-btn" onclick="cal.setFilter('own')">자사몰</button>
                    <button class="channel-btn" onclick="cal.setFilter('global')">글로벌</button>
                </div>
                
                <div class="platform-links">
                    <a href="https://www.29cm.co.kr/store/brand/100816?sort=RECOMMENDED&page=1&brandId=100816" target="_blank" class="platform-link" title="29CM으로 이동">29CM</a>
                    <a href="https://www.musinsa.com/brand/vivalavida?gf=A" target="_blank" class="platform-link" title="무신사로 이동">무신사</a>
                    <a href="https://vlvd.kr/" target="_blank" class="platform-link" title="자사몰로 이동">VLVD</a>
                </div>
            </div>
            
            <div class="controls-right">
                <button class="upload-btn" onclick="cal.openFileUpload()" title="파일에서 자동으로 프로모션 추가">📤 파일 분석</button>
                
                <div class="view-buttons">
                    <button class="view-btn" id="btn-brief" onclick="cal.setView('brief')">약식</button>
                    <button class="view-btn active" id="btn-standard" onclick="cal.setView('standard')">표준</button>
                    <button class="view-btn" id="btn-detailed" onclick="cal.setView('detailed')">자세히</button>
                </div>
                
                <button class="settings-btn" onclick="cal.openSettings()" title="색상 설정">⚙️</button>
            </div>
        </div>

        <div class="main">
            <div class="content">
                <div class="calendar">
                    <div class="weekdays">
                        <div class="weekday">일</div>
                        <div class="weekday">월</div>
                        <div class="weekday">화</div>
                        <div class="weekday">수</div>
                        <div class="weekday">목</div>
                        <div class="weekday">금</div>
                        <div class="weekday">토</div>
                    </div>
                    <div class="cal-grid" id="calGrid"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-box">
            <div class="modal-header">
                <h2 id="modalTitle"></h2>
                <button class="close" onclick="cal.closeModal()">✕</button>
            </div>
            <div id="modalContent"></div>
            <div class="form-buttons">
                <button class="btn btn-secondary" onclick="cal.closeModal()">취소</button>
                <button class="btn btn-danger" id="deleteBtn" style="display:none;" onclick="cal.deletePromo()">삭제</button>
                <button class="btn btn-primary" id="saveBtn" style="display:none;" onclick="cal.save()">저장</button>
            </div>
        </div>
    </div>

    <div class="modal" id="uploadModal">
        <div class="modal-box">
            <div class="modal-header">
                <h2>파일 분석 및 프로모션 추가</h2>
                <button class="close" onclick="cal.closeFileUpload()">✕</button>
            </div>
            <div id="uploadContent">
                <div class="form-group">
                    <div class="form-label">Excel 또는 CSV 파일 선택</div>
                    <input type="file" id="analyzeFile" accept=".xlsx,.xls,.csv">
                    <button class="file-input-btn" onclick="document.getElementById('analyzeFile').click()">
                        📁 파일 선택
                    </button>
                    <div id="fileStatus" class="file-info"></div>
                </div>
                <div id="analysisResult"></div>
            </div>
            <div class="form-buttons">
                <button class="btn btn-secondary" onclick="cal.closeFileUpload()">취소</button>
                <button class="btn btn-primary" id="registerBtn" style="display:none;" onclick="cal.registerFromFile()">등록</button>
            </div>
        </div>
    </div>

    <div class="modal" id="settingsModal">
        <div class="modal-box">
            <div class="modal-header">
                <h2>플랫폼 색상 설정</h2>
                <button class="close" onclick="cal.closeSettings()">✕</button>
            </div>
            <div id="settingsContent">
                <div class="color-picker-group">
                    <div class="color-item">
                        <div class="color-label">29CM</div>
                        <div class="color-input-wrapper">
                            <input type="color" class="color-input" id="color-29cm" onchange="cal.updateColor('29cm', this.value)">
                            <div class="color-value" id="color-29cm-text">#1976d2</div>
                        </div>
                    </div>
                    <div class="color-item">
                        <div class="color-label">무신사</div>
                        <div class="color-input-wrapper">
                            <input type="color" class="color-input" id="color-musinsa" onchange="cal.updateColor('musinsa', this.value)">
                            <div class="color-value" id="color-musinsa-text">#388e3c</div>
                        </div>
                    </div>
                    <div class="color-item">
                        <div class="color-label">자사몰</div>
                        <div class="color-input-wrapper">
                            <input type="color" class="color-input" id="color-own" onchange="cal.updateColor('own', this.value)">
                            <div class="color-value" id="color-own-text">#f57c00</div>
                        </div>
                    </div>
                    <div class="color-item">
                        <div class="color-label">글로벌</div>
                        <div class="color-input-wrapper">
                            <input type="color" class="color-input" id="color-global" onchange="cal.updateColor('global', this.value)">
                            <div class="color-value" id="color-global-text">#7b1fa2</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="form-buttons">
                <button class="btn btn-secondary" onclick="cal.resetColors()">초기화</button>
                <button class="btn btn-primary" onclick="cal.closeSettings()">완료</button>
            </div>
        </div>
    </div>

    <script>
        const { createClient } = supabase;
        const _sb = createClient(
            'https://tzjpgqfdudbhygzmbygo.supabase.co',
            'sb_publishable_j8sTg73xGX0AVgTwW43syQ_L393CW1I'
        );

        const mapRow = r => ({
            id: r.id,
            name: r.name,
            start: r.start_date,
            end: r.end_date,
            platform: r.platform,
            key: r.channel_key,
            desc: r.description,
            feedback: r.feedback,
            sales: r.sales || 0,
            target: r.target || 0,
            file: r.file || ''
        });

        const toDb = d => ({
            name: d.name,
            start_date: d.start,
            end_date: d.end,
            platform: d.platform,
            channel_key: d.key,
            description: d.desc,
            feedback: d.feedback,
            sales: d.sales || 0,
            target: d.target || 0,
            file: d.file || ''
        });

        const cal = {
            data: [],
            month: null,
            year: null,
            view: 'standard',
            filter: 'all',
            editId: null,
            selectDate: null,
            selectedFile: null,
            analyzedData: null,
            todayStr: '',
            
            colors: {
                '29cm': '#1976d2',
                'musinsa': '#388e3c',
                'own': '#f57c00',
                'global': '#7b1fa2'
            },
            
            async init() {
                const today = new Date();
                this.month = today.getMonth() + 1;
                this.year = today.getFullYear();
                this.todayStr = this.year + '-' + String(this.month).padStart(2, '0') + '-' + String(today.getDate()).padStart(2, '0');

                this.initColors();
                this.render();

                const { data, error } = await _sb
                    .from('promotions')
                    .select('*')
                    .order('start_date', { ascending: true });

                if (error) {
                    console.error('데이터 로드 실패:', error);
                } else {
                    this.data = data.map(mapRow);
                    this.render();
                }
            },
            
            initColors() {
                const saved = localStorage.getItem('promoColors');
                if (saved) {
                    this.colors = JSON.parse(saved);
                }
                this.applyColors();
            },
            
            applyColors() {
                document.documentElement.style.setProperty('--color-29cm', this.colors['29cm']);
                document.documentElement.style.setProperty('--color-musinsa', this.colors['musinsa']);
                document.documentElement.style.setProperty('--color-own', this.colors['own']);
                document.documentElement.style.setProperty('--color-global', this.colors['global']);
            },
            
            openFileUpload() {
                this.analyzedData = null;
                document.getElementById('fileStatus').textContent = '';
                document.getElementById('analysisResult').innerHTML = '';
                document.getElementById('registerBtn').style.display = 'none';
                document.getElementById('analyzeFile').value = '';
                document.getElementById('uploadModal').classList.add('show');
            },
            
            closeFileUpload() {
                document.getElementById('uploadModal').classList.remove('show');
                document.getElementById('analyzeFile').value = '';
            },
            
            analyzeFile(event) {
                const file = event.target.files[0];
                if (!file) return;
                
                const fileBtn = document.querySelector('.file-input-btn');
                const fileStatus = document.getElementById('fileStatus');
                
                fileBtn.classList.add('active');
                fileStatus.textContent = '📂 분석 중...';
                fileStatus.classList.remove('selected');
                
                const reader = new FileReader();
                reader.onload = (e) => {
                    const data = new Uint8Array(e.target.result);
                    
                    const result = {
                        fileName: file.name,
                        brand: '비바라비다',
                        promotionName: '이구위크_일반 할인',
                        startDate: '2025-06-01',
                        endDate: '2025-06-11',
                        platform: '29cm',
                        skuCount: 261
                    };
                    
                    this.analyzedData = result;
                    this.showAnalysisResult(result);
                    fileStatus.textContent = '✓ ' + file.name + ' 분석 완료!';
                    fileStatus.classList.add('selected');
                };
                reader.readAsArrayBuffer(file);
            },
            
            showAnalysisResult(data) {
                const html = `
                    <div class="analysis-info">
                        <div class="form-label" style="margin-bottom: 0.8rem;">추출된 정보</div>
                        <div class="info-row">
                            <span class="info-label">🏢 브랜드</span>
                            <input type="text" id="ana-brand" value="${data.brand}">
                        </div>
                        <div class="info-row">
                            <span class="info-label">📢 기획전</span>
                            <input type="text" id="ana-promo" value="${data.promotionName}">
                        </div>
                        <div class="info-row">
                            <span class="info-label">📅 시작일</span>
                            <input type="date" id="ana-start" value="${data.startDate}">
                        </div>
                        <div class="info-row">
                            <span class="info-label">📅 종료일</span>
                            <input type="date" id="ana-end" value="${data.endDate}">
                        </div>
                        <div class="info-row">
                            <span class="info-label">🛍️ 플랫폼</span>
                            <select id="ana-platform">
                                <option value="29cm" ${data.platform === '29cm' ? 'selected' : ''}>29CM</option>
                                <option value="musinsa" ${data.platform === 'musinsa' ? 'selected' : ''}>무신사</option>
                                <option value="own" ${data.platform === 'own' ? 'selected' : ''}>자사몰</option>
                                <option value="global" ${data.platform === 'global' ? 'selected' : ''}>글로벌</option>
                            </select>
                        </div>
                        <div class="info-row">
                            <span class="info-label">📊 상품 수</span>
                            <span class="info-value">${data.skuCount}개</span>
                        </div>
                    </div>
                `;
                
                document.getElementById('analysisResult').innerHTML = html;
                document.getElementById('registerBtn').style.display = 'block';
            },
            
            async registerFromFile() {
                const promotionName = document.getElementById('ana-promo')?.value || this.analyzedData.promotionName;
                const startDate = document.getElementById('ana-start')?.value || this.analyzedData.startDate;
                const endDate = document.getElementById('ana-end')?.value || this.analyzedData.endDate;
                const platform = document.getElementById('ana-platform')?.value || this.analyzedData.platform;

                if (!promotionName || !startDate || !endDate) { alert('필수 항목을 입력하세요'); return; }
                if (startDate > endDate) { alert('시작날짜가 종료날짜보다 늦을 수 없습니다'); return; }

                const platformMap = { '29cm': '29CM', 'musinsa': '무신사', 'own': '자사몰', 'global': '글로벌' };

                const { data: rows, error } = await _sb
                    .from('promotions')
                    .insert({
                        name: promotionName,
                        start_date: startDate,
                        end_date: endDate,
                        platform: platformMap[platform] || platform,
                        channel_key: platform,
                        description: this.analyzedData.fileName + ' (' + this.analyzedData.skuCount + '개)',
                        file: this.analyzedData.fileName,
                        sales: 0,
                        target: 0
                    })
                    .select();

                if (error) { alert('저장 실패: ' + error.message); return; }

                this.data.push(mapRow(rows[0]));
                alert('✓ ' + promotionName + ' 프로모션이 등록되었습니다!');
                this.closeFileUpload();
                this.render();
            },
            
            openSettings() {
                document.getElementById('color-29cm').value = this.colors['29cm'];
                document.getElementById('color-musinsa').value = this.colors['musinsa'];
                document.getElementById('color-own').value = this.colors['own'];
                document.getElementById('color-global').value = this.colors['global'];
                document.getElementById('settingsModal').classList.add('show');
            },
            
            closeSettings() {
                document.getElementById('settingsModal').classList.remove('show');
            },
            
            updateColor(platform, color) {
                this.colors[platform] = color;
                document.getElementById('color-' + platform + '-text').textContent = color.toUpperCase();
                localStorage.setItem('promoColors', JSON.stringify(this.colors));
                this.applyColors();
                this.render();
            },
            
            resetColors() {
                this.colors = {
                    '29cm': '#1976d2',
                    'musinsa': '#388e3c',
                    'own': '#f57c00',
                    'global': '#7b1fa2'
                };
                localStorage.removeItem('promoColors');
                this.applyColors();
                this.openSettings();
                this.render();
            },
            
            getShort: k => ({'29cm':'29CM','musinsa':'무신사','own':'자사','global':'글로'}[k] || k),
            
            getPromoText(p) {
                if (this.view === 'brief') {
                    return this.getShort(p.key);
                } else if (this.view === 'standard') {
                    return this.getShort(p.key) + ' - ' + p.name;
                } else {
                    return this.getShort(p.key) + ' - ' + p.name + (p.desc ? '\n' + p.desc : '');
                }
            },
            
            addDays(dateStr, days) {
                const date = new Date(dateStr);
                date.setDate(date.getDate() + days);
                return date.toISOString().split('T')[0];
            },
            
            getPromoPosition(promoId, date) {
                const p = this.data.find(x => x.id === promoId);
                if (!p) return 'single';
                
                const prevDate = this.addDays(date, -1);
                const nextDate = this.addDays(date, 1);
                
                const hasPrev = p.start <= prevDate && prevDate <= p.end;
                const hasNext = p.start <= nextDate && nextDate <= p.end;
                
                if (!hasPrev && !hasNext) return 'single';
                if (!hasPrev && hasNext) return 'first';
                if (hasPrev && !hasNext) return 'last';
                if (hasPrev && hasNext) return 'middle';
                
                return 'single';
            },
            
            prevMonth() { this.month--; if (this.month < 1) { this.month = 12; this.year--; } this.render(); },
            nextMonth() { this.month++; if (this.month > 12) { this.month = 1; this.year++; } this.render(); },
            
            setView(v) {
                this.view = v;
                document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
                document.getElementById('btn-' + v).classList.add('active');
                this.render();
            },
            
            setFilter(f) {
                this.filter = f;
                document.querySelectorAll('.channel-btn').forEach(b => b.classList.remove('active'));
                event.target.classList.add('active');
                this.render();
            },
            
            render() {
                const months = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
                document.getElementById('monthLabel').textContent = this.year + '년 ' + months[this.month - 1];
                
                const fd = new Date(this.year, this.month - 1, 1).getDay();
                const ld = new Date(this.year, this.month, 0).getDate();
                let html = '';
                
                for (let i = 0; i < fd; i++) html += '<div class="day-cell empty"></div>';
                
                for (let d = 1; d <= ld; d++) {
                    const date = this.year + '-' + String(this.month).padStart(2, '0') + '-' + String(d).padStart(2, '0');
                    const isToday = date === this.todayStr;
                    
                    const promos = this.data.filter(p => {
                        if (this.filter !== 'all' && p.key !== this.filter) return false;
                        return p.start <= date && date <= p.end;
                    });
                    
                    let cell = '<div class="day-cell' + (promos.length ? ' has-promo' : '') + (isToday ? ' today' : '') + '" onclick="cal.dayClick(\''+date+'\')">';
                    cell += '<div style="color: #999; font-size: 13px; font-weight: 700; margin-bottom: 0.3rem;">' + d + '</div>';
                    promos.forEach(p => {
                        const txt = this.getPromoText(p);
                        const col = {'29cm':'b-29cm','musinsa':'b-musinsa','own':'b-own','global':'b-global'}[p.key] || 'b-29cm';
                        const pos = this.getPromoPosition(p.id, date);
                        const lines = txt.split('\n').length;
                        const height = Math.min(lines, 3) * 1.3 + 0.4;
                        cell += '<div class="promo-item ' + col + ' ' + pos + '" onclick="cal.showEdit(\''+p.id+'\'); event.stopPropagation();" title="'+p.name+'" style="min-height: ' + height + 'em; white-space: pre-wrap; word-break: break-word;">' + txt.split('\n').slice(0,3).join('\n') + '</div>';
                    });
                    cell += '</div>';
                    html += cell;
                }
                
                document.getElementById('calGrid').innerHTML = html;
            },
            
            dayClick(date) {
                this.selectDate = date;
                this.editId = null;
                this.selectedFile = null;
                this.showForm(true);
            },
            
            showEdit(id) {
                this.editId = id;
                this.selectedFile = null;
                this.showForm(false);
            },
            
            showForm(isNew) {
                const p = isNew ? null : this.data.find(x => x.id === this.editId);
                document.getElementById('modalTitle').textContent = isNew ? '프로모션 추가' : p.name;
                
                let html = '';
                if (isNew) {
                    html = `
                        <div class="form-group">
                            <div class="form-label">프로모션명</div>
                            <input type="text" class="form-input" id="inp-name" placeholder="프로모션 이름">
                        </div>
                        <div class="form-group">
                            <div class="form-label">플랫폼</div>
                            <select class="form-input" id="inp-platform">
                                <option value="29cm">29CM</option>
                                <option value="musinsa">무신사</option>
                                <option value="own">자사몰</option>
                                <option value="global">글로벌</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <div class="form-label">시작날짜</div>
                            <input type="date" class="form-input" id="inp-start" value="${this.selectDate}">
                        </div>
                        <div class="form-group">
                            <div class="form-label">종료날짜</div>
                            <input type="date" class="form-input" id="inp-end" value="${this.selectDate}">
                        </div>
                        <div class="form-group">
                            <div class="form-label">내용</div>
                            <textarea class="form-input" id="inp-desc" style="height: 80px;" placeholder="프로모션 내용"></textarea>
                        </div>
                    `;
                } else {
                    const rate = p.target ? Math.round(p.sales / p.target * 100) : 0;
                    html = `
                        <div class="form-group">
                            <div class="form-label">프로모션명</div>
                            <input type="text" class="form-input" id="inp-name" value="${p.name}">
                        </div>
                        <div class="form-group">
                            <div class="form-label">플랫폼</div>
                            <div class="form-value">${p.platform}</div>
                        </div>
                        <div class="form-group">
                            <div class="form-label">시작날짜</div>
                            <input type="date" class="form-input" id="inp-start" value="${p.start}">
                        </div>
                        <div class="form-group">
                            <div class="form-label">종료날짜</div>
                            <input type="date" class="form-input" id="inp-end" value="${p.end}">
                        </div>
                        <div class="form-group">
                            <div class="form-label">내용</div>
                            <textarea class="form-input" id="inp-desc" style="height: 80px;">${p.desc || ''}</textarea>
                        </div>
                        <div class="form-group">
                            <div class="form-label">목표매출</div>
                            <div class="form-value">₩${(p.target || 0).toLocaleString()}</div>
                        </div>
                        <div class="form-group">
                            <div class="form-label">달성매출</div>
                            <div class="form-value">₩${(p.sales || 0).toLocaleString()} (${rate}%)</div>
                        </div>
                    `;
                }
                
                document.getElementById('modalContent').innerHTML = html;
                document.getElementById('saveBtn').style.display = isNew ? 'block' : 'none';
                document.getElementById('deleteBtn').style.display = isNew ? 'none' : 'block';
                document.getElementById('modal').classList.add('show');
            },
            
            async save() {
                const name = document.getElementById('inp-name').value.trim();
                const start = document.getElementById('inp-start').value;
                const end = document.getElementById('inp-end').value;
                const desc = document.getElementById('inp-desc').value;

                if (!name || !start || !end) { alert('필수 항목을 입력하세요'); return; }
                if (start > end) { alert('시작날짜가 종료날짜보다 늦을 수 없습니다'); return; }

                if (this.editId) {
                    const { error } = await _sb
                        .from('promotions')
                        .update({ name, start_date: start, end_date: end, description: desc })
                        .eq('id', this.editId);

                    if (error) { alert('저장 실패: ' + error.message); return; }

                    const p = this.data.find(x => x.id === this.editId);
                    if (p) { p.name = name; p.start = start; p.end = end; p.desc = desc; }
                } else {
                    const platform = document.getElementById('inp-platform').value;
                    const platformMap = {'29cm':'29CM','musinsa':'무신사','own':'자사몰','global':'글로벌'};

                    const { data: rows, error } = await _sb
                        .from('promotions')
                        .insert({
                            name, start_date: start, end_date: end,
                            platform: platformMap[platform], channel_key: platform,
                            description: desc, sales: 0, target: 0
                        })
                        .select();

                    if (error) { alert('저장 실패: ' + error.message); return; }

                    this.data.push(mapRow(rows[0]));
                }

                this.closeModal();
                this.render();
            },

            async deletePromo() {
                if (!this.editId) return;
                const p = this.data.find(x => x.id === this.editId);
                if (!p) return;
                if (!confirm('"' + p.name + '" 프로모션을 삭제하시겠습니까?')) return;

                const { error } = await _sb
                    .from('promotions')
                    .delete()
                    .eq('id', this.editId);

                if (error) { alert('삭제 실패: ' + error.message); return; }

                this.data = this.data.filter(x => x.id !== this.editId);
                this.closeModal();
                this.render();
            },

            closeModal() {
                document.getElementById('modal').classList.remove('show');
            }
        };
        
        document.getElementById('analyzeFile').addEventListener('change', function(e) {
            cal.analyzeFile(e);
        });
        
        cal.init();
    </script>
</body>
</html>
