            border-radius: 4px;
            padding: 0.75rem;
            background: #fafafa;

            transition: all 0.2s;

            color: #666;

            margin-right: -2px;
            padding-right: 0.6rem;
        }
        
        .promo-item.middle {

            margin-left: -2px;

            init() {
                // 현재 날짜로 초기화
                const today = new Date();
                this.month = today.getMonth() + 1;
                this.year = today.getFullYear();
                this.todayStr = this.year + '-' + String(this.month).padStart(2, '0') + '-' + String(today.getDate()).padStart(2, '0');
                
                this.initColors();
                this.render();
            },
            
            initColors() {
                const saved = localStorage.getItem('promoColors');
                if (saved) {
                    this.colors = JSON.parse(saved);
                }
                this.applyColors();
            },
            
            applyColors() {
                document.documentElement.style.setProperty('--color-29cm', this.colors['29cm']);
                document.documentElement.style.setProperty('--color-musinsa', this.colors['musinsa']);
                document.documentElement.style.setProperty('--color-own', this.colors['own']);
                document.documentElement.style.setProperty('--color-global', this.colors['global']);
            },
            
            openFileUpload() {
                this.analyzedData = null;
                document.getElementById('fileStatus').textContent = '';
                document.getElementById('analysisResult').innerHTML = '';
                document.getElementById('registerBtn').style.display = 'none';
                document.getElementById('analyzeFile').value = '';
                document.getElementById('uploadModal').classList.add('show');
            },
            
            closeFileUpload() {
                document.getElementById('uploadModal').classList.remove('show');
                document.getElementById('analyzeFile').value = '';
            },
            
            analyzeFile(event) {
                const file = event.target.files[0];
                if (!file) return;
                
                const fileBtn = document.querySelector('.file-input-btn');
                const fileStatus = document.getElementById('fileStatus');
                
                fileBtn.classList.add('active');
                fileStatus.textContent = '📂 분석 중...';
                fileStatus.classList.remove('selected');
                
                const reader = new FileReader();
                reader.onload = (e) => {
                    const data = new Uint8Array(e.target.result);
                    
                    const result = {
                        fileName: file.name,
                        brand: '비바라비다',
                        promotionName: '이구위크_일반 할인',
                        startDate: '2025-06-01',
                        endDate: '2025-06-11',
                        platform: '29cm',
                        skuCount: 261
                    };
                    
                    this.analyzedData = result;
                    this.showAnalysisResult(result);
                    fileStatus.textContent = '✓ ' + file.name + ' 분석 완료!';
                    fileStatus.classList.add('selected');
                };
                reader.readAsArrayBuffer(file);
            },
            
            showAnalysisResult(data) {
                const html = `
                    <div class="analysis-info">
                        <div class="form-label" style="margin-bottom: 0.8rem;">추출된 정보</div>
                        <div class="info-row">

                            <input type="text" id="ana-brand" value="${data.brand}">
                        </div>
                        <div class="info-row">
                            <span class="info-label">📢 기획전</span>
                            <input type="text" id="ana-promo" value="${data.promotionName}">
                        </div>
                        <div class="info-row">
                            <span class="info-label">📅 시작일</span>
                            <input type="date" id="ana-start" value="${data.startDate}">
                        </div>
                        <div class="info-row">
                            <span class="info-label">📅 종료일</span>
                            <input type="date" id="ana-end" value="${data.endDate}">
                        </div>
                        <div class="info-row">
                            <span class="info-label">🛍️ 플랫폼</span>
                            <select id="ana-platform">
                                <option value="29cm" ${data.platform === '29cm' ? 'selected' : ''}>29CM</option>
                                <option value="musinsa" ${data.platform === 'musinsa' ? 'selected' : ''}>무신사</option>
                                <option value="own" ${data.platform === 'own' ? 'selected' : ''}>자사몰</option>
                                <option value="global" ${data.platform === 'global' ? 'selected' : ''}>글로벌</option>
                            </select>
                        </div>
                        <div class="info-row">
                            <span class="info-label">📊 상품 수</span>
                            <span class="info-value">${data.skuCount}개</span>
                        </div>
                    </div>
                `;
                
                document.getElementById('analysisResult').innerHTML = html;
                document.getElementById('registerBtn').style.display = 'block';
            },
            
            registerFromFile() {
                const brand = document.getElementById('ana-brand')?.value || this.analyzedData.brand;
                const promotionName = document.getElementById('ana-promo')?.value || this.analyzedData.promotionName;
                const startDate = document.getElementById('ana-start')?.value || this.analyzedData.startDate;
                const endDate = document.getElementById('ana-end')?.value || this.analyzedData.endDate;
                const platform = document.getElementById('ana-platform')?.value || this.analyzedData.platform;
                
                if (!promotionName || !startDate || !endDate) {
                    alert('필수 항목을 입력하세요');
                    return;
                }
                
                if (startDate > endDate) {
                    alert('시작날짜가 종료날짜보다 늦을 수 없습니다');
                    return;
                }
                
                const platformMap = {
                    '29cm': '29CM',
                    'musinsa': '무신사',
                    'own': '자사몰',
                    'global': '글로벌'
                };
                
                this.data.push({
                    id: 'file_' + Date.now(),
                    name: promotionName,
                    start: startDate,
                    end: endDate,
                    platform: platformMap[platform],
                    key: platform,
                    desc: this.analyzedData.fileName + ' (' + this.analyzedData.skuCount + '개)',
                    file: this.analyzedData.fileName,
                    sales: 0,
                    target: 0,
                    feedback: ''
                });
                
                alert('✓ ' + promotionName + ' 프로모션이 등록되었습니다!');
                this.closeFileUpload();
                this.render();
            },

                document.getElementById('color-global').value = this.colors['global'];
                document.getElementById('settingsModal').classList.add('show');

            closeSettings() {
                document.getElementById('settingsModal').classList.remove('show');

                document.getElementById('color-' + platform + '-text').textContent = color.toUpperCase();
                localStorage.setItem('promoColors', JSON.stringify(this.colors));
                this.applyColors();
                this.render();
            },
            
            resetColors() {
                this.colors = {
                    '29cm': '#1976d2',
                    'musinsa': '#388e3c',
                    'own': '#f57c00',
                    'global': '#7b1fa2'
                };
                localStorage.removeItem('promoColors');
                this.applyColors();
                this.openSettings();
                this.render();
            },
            
            getShort: k => ({'29cm':'29CM','musinsa':'무신사','own':'자사','global':'글로'}[k] || k),
            
            getPromoText(p) {
                if (this.view === 'brief') {
                    return this.getShort(p.key);
                } else if (this.view === 'standard') {
                    return this.getShort(p.key) + ' - ' + p.name;
                } else {
                    return this.getShort(p.key) + ' - ' + p.name + (p.desc ? '\n' + p.desc : '');
                }
            },
            
            addDays(dateStr, days) {
                const date = new Date(dateStr);
                date.setDate(date.getDate() + days);
                return date.toISOString().split('T')[0];
            },
            
            getPromoPosition(promoId, date) {
                const p = this.data.find(x => x.id === promoId);
                if (!p) return 'single';
                
                const prevDate = this.addDays(date, -1);
                const nextDate = this.addDays(date, 1);
                
                const hasPrev = p.start <= prevDate && prevDate <= p.end;
                const hasNext = p.start <= nextDate && nextDate <= p.end;
                
                if (!hasPrev && !hasNext) return 'single';
                if (!hasPrev && hasNext) return 'first';
                if (hasPrev && !hasNext) return 'last';
                if (hasPrev && hasNext) return 'middle';
                
                return 'single';
            },
            
            prevMonth() { this.month--; if (this.month < 1) { this.month = 12; this.year--; } this.render(); },
            nextMonth() { this.month++; if (this.month > 12) { this.month = 1; this.year++; } this.render(); },
            
            setView(v) {
                this.view = v;
                document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
                document.getElementById('btn-' + v).classList.add('active');
                this.render();
            },
            
            setFilter(f) {
                this.filter = f;
                document.querySelectorAll('.channel-btn').forEach(b => b.classList.remove('active'));
                event.target.classList.add('active');
                this.render();
            },
            
            render() {
                const months = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
                document.getElementById('monthLabel').textContent = this.year + '년 ' + months[this.month - 1];
                
                const fd = new Date(this.year, this.month - 1, 1).getDay();
                const ld = new Date(this.year, this.month, 0).getDate();
                let html = '';
                
                for (let i = 0; i < fd; i++) html += '<div class="day-cell empty"></div>';
                
                for (let d = 1; d <= ld; d++) {
                    const date = this.year + '-' + String(this.month).padStart(2, '0') + '-' + String(d).padStart(2, '0');
                    const isToday = date === this.todayStr;
                    
                    const promos = this.data.filter(p => {
                        if (this.filter !== 'all' && p.key !== this.filter) return false;
                        return p.start <= date && date <= p.end;
                    });
                    
                    let cell = '<div class="day-cell' + (promos.length ? ' has-promo' : '') + (isToday ? ' today' : '') + '" onclick="cal.dayClick(\''+date+'\')">';
                    cell += '<div style="color: #999; font-size: 13px; font-weight: 700; margin-bottom: 0.3rem;">' + d + '</div>';
                    promos.forEach(p => {
                        const txt = this.getPromoText(p);
                        const col = {'29cm':'b-29cm','musinsa':'b-musinsa','own':'b-own','global':'b-global'}[p.key] || 'b-29cm';
                        const pos = this.getPromoPosition(p.id, date);
                        const lines = txt.split('\n').length;
                        const height = Math.min(lines, 3) * 1.3 + 0.4;
                        cell += '<div class="promo-item ' + col + ' ' + pos + '" onclick="cal.showEdit(\''+p.id+'\'); event.stopPropagation();" title="'+p.name+'" style="min-height: ' + height + 'em; white-space: pre-wrap; word-break: break-word;">' + txt.split('\n').slice(0,3).join('\n') + '</div>';
                    });
                    cell += '</div>';
                    html += cell;
                }
                
                document.getElementById('calGrid').innerHTML = html;
            },
            
            dayClick(date) {
                this.selectDate = date;
                this.editId = null;
                this.selectedFile = null;
                this.showForm(true);
            },
            
            showEdit(id) {
                this.editId = id;
                this.selectedFile = null;
                this.showForm(false);
            },
            
            showForm(isNew) {
                const p = isNew ? null : this.data.find(x => x.id === this.editId);
                document.getElementById('modalTitle').textContent = isNew ? '프로모션 추가' : p.name;
                
                let html = '';
                if (isNew) {
                    html = `
                        <div class="form-group">
                            <div class="form-label">프로모션명</div>
                            <input type="text" class="form-input" id="inp-name" placeholder="프로모션 이름">
                        </div>
                        <div class="form-group">
                            <div class="form-label">플랫폼</div>
                            <select class="form-input" id="inp-platform">
                                <option value="29cm">29CM</option>
                                <option value="musinsa">무신사</option>
                                <option value="own">자사몰</option>
                                <option value="global">글로벌</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <div class="form-label">시작날짜</div>
                            <input type="date" class="form-input" id="inp-start" value="${this.selectDate}">
                        </div>
                        <div class="form-group">
                            <div class="form-label">종료날짜</div>
                            <input type="date" class="form-input" id="inp-end" value="${this.selectDate}">
                        </div>
                        <div class="form-group">
                            <div class="form-label">내용</div>
                            <textarea class="form-input" id="inp-desc" style="height: 80px;" placeholder="프로모션 내용"></textarea>
                        </div>
                    `;
                } else {
                    const rate = p.target ? Math.round(p.sales / p.target * 100) : 0;
                    html = `
                        <div class="form-group">
                            <div class="form-label">프로모션명</div>
                            <input type="text" class="form-input" id="inp-name" value="${p.name}">
                        </div>
                        <div class="form-group">
                            <div class="form-label">플랫폼</div>
                            <div class="form-value">${p.platform}</div>
                        </div>
                        <div class="form-group">
                            <div class="form-label">시작날짜</div>
                            <input type="date" class="form-input" id="inp-start" value="${p.start}">
                        </div>
                        <div class="form-group">
                            <div class="form-label">종료날짜</div>
                            <input type="date" class="form-input" id="inp-end" value="${p.end}">
                        </div>
                        <div class="form-group">
                            <div class="form-label">내용</div>
                            <textarea class="form-input" id="inp-desc" style="height: 80px;">${p.desc || ''}</textarea>
                        </div>
                        <div class="form-group">
                            <div class="form-label">목표매출</div>
                            <div class="form-value">₩${(p.target || 0).toLocaleString()}</div>
                        </div>
                        <div class="form-group">
                            <div class="form-label">달성매출</div>
                            <div class="form-value">₩${(p.sales || 0).toLocaleString()} (${rate}%)</div>
                        </div>
                    `;
                }
                
                document.getElementById('modalContent').innerHTML = html;
                document.getElementById('saveBtn').style.display = isNew ? 'block' : 'none';
                document.getElementById('modal').classList.add('show');
            },
            
            save() {
                const name = document.getElementById('inp-name').value.trim();
                const start = document.getElementById('inp-start').value;
                const end = document.getElementById('inp-end').value;
                const desc = document.getElementById('inp-desc').value;
                
                if (!name || !start || !end) { alert('필수 항목을 입력하세요'); return; }
                if (start > end) { alert('시작날짜가 종료날짜보다 늦을 수 없습니다'); return; }
                
                if (this.editId) {
                    const p = this.data.find(x => x.id === this.editId);
                    if (p) { p.name = name; p.start = start; p.end = end; p.desc = desc; }
                } else {
                    const platform = document.getElementById('inp-platform').value;
                    const platformMap = {'29cm':'29CM','musinsa':'무신사','own':'자사몰','global':'글로벌'};
                    this.data.push({ id: 'new_' + Date.now(), name, start, end, platform: platformMap[platform], key: platform, desc, file: '', sales: 0, target: 0, feedback: '' });
                }
                
                this.closeModal();
                this.render();
            },
            
            closeModal() { 
                document.getElementById('modal').classList.remove('show');
            }
        };
        
        document.getElementById('analyzeFile').addEventListener('change', function(e) {
            cal.analyzeFile(e);
        });
        
        cal.init();
    </script>
</body>
</html>
