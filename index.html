<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VLVD ьћёвАювфеВЁў В║ўвд░вЇћ</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root {
            --bg: #f6f7f9;
            --surface: #ffffff;
            --surface-2: #f8f9fb;
            --ink: #1a1d21;
            --ink-soft: #5b6470;
            --ink-faint: #99a1ad;
            --line: #e8eaed;
            --line-soft: #f0f1f3;
            --accent: #1a1d21;
            --radius-lg: 20px;
            --radius-md: 14px;
            --radius-sm: 10px;
            --shadow-card: 0 1px 3px rgba(16,24,40,0.04), 0 1px 2px rgba(16,24,40,0.03);
            --shadow-soft: 0 4px 16px rgba(16,24,40,0.06);
            --font: 'Pretendard', 'Pretendard Variable', -apple-system, BlinkMacSystemFont, system-ui, 'Segoe UI', 'Noto Sans KR', sans-serif;
            --sidebar-w: 240px;
            --content-max: 1180px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font); background: var(--bg); color: var(--ink); -webkit-font-smoothing: antialiased; letter-spacing: -0.01em; }
        .container { display: flex; height: 100vh; flex-direction: column; }
        .top-bar { 
            background: var(--surface); 
            border-bottom: 1px solid var(--line); 
            padding: 0.85rem 2rem; 
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            gap: 2rem;
        }
        .month-control { display: flex; align-items: center; gap: 1rem; }
        .month-btn { background: var(--surface-2); border: 1px solid var(--line); width: 34px; height: 34px; border-radius: var(--radius-sm); cursor: pointer; font-size: 13px; color: var(--ink-soft); transition: all 0.18s; display: inline-flex; align-items: center; justify-content: center; }
        .month-btn:hover { background: #eef0f3; color: var(--ink); }
        .month-label { font-size: 16px; font-weight: 700; min-width: 130px; text-align: center; letter-spacing: -0.02em; }
        
        .controls-center { 
            display: flex; 
            align-items: center; 
            justify-content: center;
            gap: 2rem;
        }
        
        .channel-filter { display: flex; gap: 0.4rem; flex-wrap: wrap; }
        .channel-btn { padding: 0.45rem 0.95rem; border: 1px solid var(--line); border-radius: 999px; cursor: pointer; font-size: 12.5px; font-weight: 500; background: var(--surface); color: var(--ink-soft); transition: all 0.18s; }
        .channel-btn:hover { background: var(--surface-2); }
        .channel-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
        
        .platform-links { 
            display: flex; 
            gap: 0.6rem;
        }
        
        .platform-link { 
            display: flex; 
            align-items: center; 
            justify-content: center;
            min-width: 60px;
            height: 40px;
            border-radius: var(--radius-sm); 
            border: 1px solid var(--line);
            text-decoration: none; 
            cursor: pointer;
            transition: all 0.18s;
            background: var(--accent);
            color: #fff;
            font-size: 12.5px;
            font-weight: 600;
            padding: 0 0.9rem;
            text-align: center;
        }
        
        .platform-link:hover { 
            transform: translateY(-2px);
            box-shadow: var(--shadow-soft);
        }
        
        .controls-right {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            justify-content: flex-end;
        }
        
        .view-buttons { display: flex; gap: 0.25rem; background: var(--surface-2); padding: 3px; border-radius: var(--radius-sm); border: 1px solid var(--line); }
        .view-btn { background: transparent; border: none; padding: 0.4rem 0.8rem; border-radius: 7px; cursor: pointer; font-size: 12.5px; font-weight: 500; color: var(--ink-soft); transition: all 0.18s; }
        .view-btn.active { background: var(--surface); color: var(--ink); font-weight: 600; box-shadow: 0 1px 2px rgba(16,24,40,0.06); }
        
        .settings-btn { background: var(--surface-2); border: 1px solid var(--line); width: 38px; height: 38px; border-radius: var(--radius-sm); cursor: pointer; font-size: 14px; transition: all 0.18s; }
        .settings-btn:hover { background: #eef0f3; }
        
        .upload-btn { background: var(--surface-2); border: 1px solid var(--line); color: var(--ink); padding: 0.5rem 0.95rem; border-radius: var(--radius-sm); cursor: pointer; font-size: 12.5px; font-weight: 600; transition: all 0.18s; }
        .upload-btn:hover { background: #eef0f3; }
        
        .main { flex: 1; display: block; background: var(--bg); overflow-y: auto; }
        .content { flex: 1; padding: 2.25rem 2rem 3rem; max-width: var(--content-max); margin: 0 auto; width: 100%; }
        .calendar { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius-lg); padding: 1.5rem; box-shadow: var(--shadow-card); }
        

        .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); gap: 0.5rem; margin-bottom: 1rem; border-bottom: 1px solid var(--line); padding-bottom: 0.6rem; }
        .weekday { text-align: center; font-size: 11.5px; font-weight: 600; color: var(--ink-faint); padding: 0.4rem; letter-spacing: 0.02em; }
        
        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 0.5rem;
            auto-rows: max-content;
        }
        
        .day-cell {
            min-height: 56px;
            border: 1px solid var(--line);
            border-radius: var(--radius-sm);
            padding: 0.7rem;
            background: var(--surface-2);
            cursor: pointer;
            transition: all 0.18s;
            font-size: 12px;
            font-weight: 600;
            color: var(--ink-soft);
        }
        
        .day-cell:hover { background: #eef0f3; border-color: #d8dce1; }
        .day-cell.empty { background: transparent; border: none; cursor: default; }
        .day-cell.has-promo { background: var(--surface); }
        
        .day-cell.today {
            background: var(--surface);
            border: 1.5px solid var(--ink);
            box-shadow: 0 0 0 3px rgba(26,29,33,0.06);
        }
        
        .day-cell.today > div:first-child {
            color: var(--ink);
            font-weight: 700;
        }
        
        .promo-item {
            padding: 0.5rem 0.7rem;
            font-size: 11px;
            color: #fff;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
            margin-top: 0.3rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: all 0.2s;
            line-height: 1.3;
            border-radius: 12px;
        }
        
        .promo-item:hover { opacity: 0.9; }
        
        .promo-item.first { 
            border-radius: 12px 0 0 12px;
            margin-right: -2px;
            padding-right: 0.6rem;
        }
        
        .promo-item.middle { 
            border-radius: 0;
            margin-left: -2px;
            margin-right: -2px;
            padding-left: 0.7rem;
            padding-right: 0.7rem;
        }
        
        .promo-item.last { 
            border-radius: 0 12px 12px 0;
            margin-left: -2px;
            padding-left: 0.6rem;
        }
        
        .promo-item.single { 
            border-radius: 12px;
            margin: 0;
        }
        
        .b-29cm { background: var(--color-29cm); }
        .b-musinsa { background: var(--color-musinsa); }
        .b-own { background: var(--color-own); }
        .b-global { background: var(--color-global); }
        
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 1rem; }
        .modal.show { display: flex; }
        .modal-box { background: #fff; border-radius: 8px; padding: 2rem; max-width: 700px; width: 100%; max-height: 90vh; overflow-y: auto; box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; border-bottom: 1px solid #e0e0e0; padding-bottom: 1rem; }
        .modal-header h2 { font-size: 18px; font-weight: 600; }
        .close { background: none; border: none; font-size: 24px; cursor: pointer; color: #999; }
        .form-group { margin-bottom: 1.5rem; }
        .form-label { font-size: 11px; font-weight: 600; color: #666; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-input { width: 100%; padding: 0.7rem 0.85rem; border: 1px solid var(--line); border-radius: var(--radius-sm); font-size: 14px; font-family: inherit; color: var(--ink); background: var(--surface); }
        .form-input:focus { outline: none; border-color: var(--ink); box-shadow: 0 0 0 3px rgba(26,29,33,0.07); }
        .form-value { font-size: 14px; padding: 0.75rem; background: #f5f5f5; border-radius: 4px; word-break: break-all; }
        .form-buttons { display: flex; gap: 1rem; margin-top: 2rem; }
        .btn { padding: 0.75rem 1.5rem; border: 1px solid #e0e0e0; border-radius: 4px; cursor: pointer; flex: 1; font-size: 14px; font-weight: 600; transition: all 0.2s; }
        .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
        .btn-primary:hover { opacity: 0.88; }
        .btn-secondary { background: var(--surface-2); color: var(--ink); border: 1px solid var(--line); }
        .btn-secondary:hover { background: #eef0f3; }
        
        .file-input-btn {
            padding: 1rem;
            background: #f9f9f9;
            border: 2px dashed #d0d0d0;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            text-align: center;
            transition: all 0.2s;
            display: block;
            width: 100%;
            font-weight: 600;
            color: #666;
        }
        
        .file-input-btn:hover {
            background: #f0f7ff;
            border-color: #1976d2;
            color: #1976d2;
        }
        
        .file-input-btn.active {
            background: #f0f7ff;
            border-color: #388e3c;
            color: #388e3c;
        }
        
        .file-info {
            font-size: 12px;
            color: #666;
            margin-top: 0.5rem;
            word-break: break-all;
            text-align: center;
        }
        
        .file-info.selected {
            color: #388e3c;
            font-weight: 600;
        }
        
        #analyzeFile {
            display: none;
        }
        
        .color-picker-group {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }
        
        .color-item {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .color-label {
            font-size: 12px;
            font-weight: 600;
            color: #666;
            min-width: 70px;
        }
        
        .color-input-wrapper {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex: 1;
        }
        
        .color-input {
            width: 50px;
            height: 40px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            cursor: pointer;
        }
        
        .color-value {
            font-size: 12px;
            color: #999;
            font-family: monospace;
        }
        
        .analysis-info {
            background: #f0f7ff;
            border: 1px solid #b3e5fc;
            border-radius: 6px;
            padding: 1rem;
            margin-bottom: 1.5rem;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            margin: 0.6rem 0;
            gap: 1rem;
        }
        
        .info-label {
            font-weight: 600;
            color: #666;
            min-width: 80px;
        }
        
        .info-value {
            color: #1976d2;
            font-weight: 600;
            flex: 1;
        }
        
        .info-row input,
        .info-row select {
            flex: 1;
            padding: 0.5rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 12px;
        }
        
        .platform-banner {
            background: var(--surface);
            border: 1px solid var(--line);
            padding: 1.1rem 1.5rem;
            margin-top: 1.5rem;
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            gap: 1.5rem;
            box-shadow: var(--shadow-card);
        }
        
        .banner-label {
            font-size: 12.5px;
            font-weight: 600;
            color: var(--ink-soft);
            min-width: 100px;
            white-space: nowrap;
        }
        
        .platform-banner .platform-links {
            display: flex;
            gap: 0.75rem;
            flex: 1;
        }
        
        .platform-banner .platform-link {
            flex: 1;
            padding: 0.5rem 1rem;
            border-radius: var(--radius-sm);
            border: 1px solid var(--accent);
            text-decoration: none;
            cursor: pointer;
            transition: all 0.18s;
            background: var(--accent);
            color: #fff;
            font-size: 12.5px;
            font-weight: 600;
            text-align: center;
            min-width: auto;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .platform-banner .platform-link:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-soft);
        }

        /* ===== ьјўВЮ┤ВДђ вёцв╣ёЖ▓їВЮ┤ВЁў ===== */
        .nav-buttons { display: flex; gap: 0.25rem; background: var(--surface-2); padding: 4px; border-radius: 999px; border: 1px solid var(--line); }
        .nav-btn {
            padding: 0.5rem 1.1rem; border: none; border-radius: 999px;
            cursor: pointer; font-size: 13px; background: transparent; font-weight: 600;
            transition: all 0.18s; color: var(--ink-soft);
        }
        .nav-btn.active { background: var(--surface); color: var(--ink); box-shadow: 0 1px 3px rgba(16,24,40,0.08); }
        .nav-btn:hover:not(.active) { color: var(--ink); }

        .page { display: none; }
        .page.active { display: block; }

        /* В║ўвд░вЇћ Вюё ьЋёьё░в░ћ */
        .calendar-filter-bar {
            display: flex; align-items: center; gap: 0.75rem;
            padding: 0.75rem 0; margin-bottom: 0.5rem; flex-wrap: wrap;
        }
        .calendar-filter-bar .filter-label { font-size: 12.5px; color: var(--ink-faint); font-weight: 600; margin-right: 0.25rem; }

        /* ===== вХёВёЮ ьјўВЮ┤ВДђ ===== */
        .analysis-wrap { padding: 2.25rem 2rem 3rem; max-width: var(--content-max); margin: 0 auto; width: 100%; }
        .analysis-section { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius-lg); padding: 1.75rem; margin-bottom: 1.5rem; box-shadow: var(--shadow-card); }
        .analysis-section h2 { font-size: 19px; margin-bottom: 0.4rem; color: var(--ink); letter-spacing: -0.02em; font-weight: 700; }
        .analysis-section .sub { font-size: 13px; color: var(--ink-faint); margin-bottom: 1.4rem; line-height: 1.6; }

        .stat-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 1.25rem; }
        .stat-card { background: var(--surface-2); border: 1px solid var(--line-soft); border-radius: var(--radius-md); padding: 1.2rem 1.3rem; }
        .stat-card .label { font-size: 12px; color: var(--ink-faint); margin-bottom: 0.5rem; font-weight: 500; }
        .stat-card .value { font-size: 26px; font-weight: 700; color: var(--ink); letter-spacing: -0.03em; }
        .stat-card .value.small { font-size: 17px; }

        .ana-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .ana-table th, .ana-table td { padding: 0.7rem 0.85rem; text-align: left; border-bottom: 1px solid var(--line-soft); }
        .ana-table th { background: var(--surface-2); font-weight: 600; color: var(--ink-soft); position: sticky; top: 0; cursor: pointer; user-select: none; font-size: 12px; }
        .ana-table th:hover { background: #eef1f3; }
        .ana-table td.num, .ana-table th.num { text-align: right; font-variant-numeric: tabular-nums; }
        .ana-table tbody tr:hover { background: var(--surface-2); }
        .table-scroll { max-height: 460px; overflow-y: auto; border: 1px solid var(--line-soft); border-radius: var(--radius-md); }

        .badge { display: inline-block; padding: 0.2rem 0.55rem; border-radius: 999px; font-size: 11px; font-weight: 600; color: #fff; }

        .bar-track { background: var(--line); border-radius: 999px; height: 7px; overflow: hidden; min-width: 60px; }
        .bar-fill { height: 100%; border-radius: 4px; }

        .forecast-controls { display: flex; gap: 0.75rem; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; }
        .forecast-controls select, .forecast-controls input {
            padding: 0.5rem 0.75rem; border: 1px solid var(--line); border-radius: var(--radius-sm); font-size: 13px;
        }
        .save-forecast-btn {
            padding: 0.5rem 1rem; background: var(--accent); color: #fff; border: none;
            border-radius: var(--radius-sm); cursor: pointer; font-size: 13px; font-weight: 600;
        }
        .save-forecast-btn:hover { opacity: 0.88; }
        .save-forecast-btn:disabled { background: #ccc; cursor: not-allowed; }
        .ana-empty { padding: 3rem; text-align: center; color: var(--ink-faint); font-size: 14px; }
        .group-row { cursor: pointer; }
        .group-detail td { background: var(--surface-2); padding: 0; }
        .detail-inner { padding: 0.75rem 1.5rem; }
        .detail-inner table { width: 100%; font-size: 12px; }
        .detail-inner td { padding: 0.4rem 0.5rem; border-bottom: 1px solid var(--line-soft); }
        .sync-status { font-size: 12px; color: #888; margin-left: auto; }

        /* ===== в░ўВЮЉьўЋ ===== */
        html, body { max-width: 100%; overflow-x: hidden; }
        @media (max-width: 900px) {
            .top-bar { grid-template-columns: 1fr; gap: 0.75rem; padding: 0.85rem 1rem; }
            .controls-center { justify-content: flex-start; }
            .controls-right { justify-content: flex-start; flex-wrap: wrap; }
            .content, .analysis-wrap { padding-left: 1rem; padding-right: 1rem; }
            .platform-banner { flex-direction: column; align-items: stretch; gap: 0.75rem; }
            .platform-banner .platform-links { flex-direction: column; }
        }
        @media (max-width: 640px) {
            .weekdays { gap: 0.25rem; }
            .cal-grid { gap: 0.25rem; }
            .day-cell { min-height: 44px; padding: 0.4rem; font-size: 11px; }
            .promo-item { font-size: 10px; padding: 0.35rem 0.4rem; }
            .stat-cards { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

        <div class="main">

                        <div class="cal-grid" id="calGrid"></div>
                    </div>

                        <div class="banner-label">­ЪЊ▒ ьћїваЏьЈ╝ в░ћвАюЖ░ђЖИ░</div>

            analyzeFile(event) {
                const file = event.target.files[0];
                if (!file) return;
                
                const fileBtn = document.querySelector('.file-input-btn');
                const fileStatus = document.getElementById('fileStatus');
                
                fileBtn.classList.add('active');
                fileStatus.textContent = '­ЪЊѓ вХёВёЮ ВцЉ...';
                fileStatus.classList.remove('selected');
                
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = new Uint8Array(e.target.result);
                        const text = new TextDecoder('utf-8', { fatal: false }).decode(data);
                        
                        // ьўёВъг ВЌ░вЈё ВъљвЈЎ Ж░љВДђ
                        const today = new Date();
                        const currentYear = today.getFullYear();
                        
                        // ьїїВЮ╝вфЁВЌљВёю ВаЋв│┤ ВХћВХю
                        const fileName = file.name.replace('.xlsx', '').replace('.xls', '');
                        const parts = fileName.split('_');
                        
                        // ЖИ░в│ИЖ░њ (ьўёВъг ВЌ░вЈё ВаЂВџЕ)
                        let result = {
                            fileName: file.name,
                            file: file,  // ьїїВЮ╝ Ж░ЮВ▓┤ ВађВъЦ!
                            brand: 'в╣ёв░ћвЮ╝в╣ёвІц',
                            promotionName: fileName,
                            startDate: currentYear + '-06-01',
                            endDate: currentYear + '-06-11',
                            platform: '29cm',
                            skuCount: 100
                        };
                        
                        // ьїїВЮ╝вфЁ вХёВёЮ
                        if (fileName.includes('ВъЦвДѕвїђВ▓ў')) {
                            if (fileName.includes('вИївъювЊювд┤ваѕВЮ┤') || fileName.includes('вИївъювЊю')) {
                                result.promotionName = 'ВъЦвДѕвїђВ▓ў_вИївъювЊю вд┤ваѕВЮ┤ВёИВЮ╝';
                                result.startDate = currentYear + '-06-15';
                                result.endDate = currentYear + '-06-21';
                            } else if (fileName.includes('ВЮ╝в░ў')) {
                                result.promotionName = 'ВъЦвДѕвїђВ▓ў_ВЮ╝в░ўьЋаВЮИ';
                                result.startDate = currentYear + '-06-15';
                                result.endDate = currentYear + '-06-27';
                            }
                        }
                        
                        // A1 ВЁђ ьЁЇВіцьіИВЌљВёю вѓаВДю ВаЋв│┤ ВХћВХю (ВъѕВю╝вЕ┤ вЇ«Вќ┤ВЊ░ЖИ░)
                        const datePattern = /\\d{1,2}[\\/\\.]\\s*\\d{1,2}[\\(ВЏћьЎћВѕўвфЕЖИѕьєаВЮ╝\\)\\s~-]+\\d{1,2}[\\/\\.]\\s*\\d{1,2}/g;
                        const titlePattern = /ЖИ░ьџЇВаё вфЁ\\s*:\\s*([^\\n]+)/;
                        
                        const titleMatch = text.match(titlePattern);
                        if (titleMatch && titleMatch[1]) {
                            result.promotionName = titleMatch[1].trim();
                        }
                        
                        const dates = text.match(datePattern);
                        if (dates && dates.length > 0) {
                            const lastDate = dates[dates.length - 1];
                            const numbers = lastDate.match(/\\d+/g);
                            if (numbers && numbers.length >= 4) {
                                const startMonth = numbers[0].padStart(2, '0');
                                const startDay = numbers[1].padStart(2, '0');
                                const endMonth = numbers[2].padStart(2, '0');
                                const endDay = numbers[3].padStart(2, '0');
                                
                                result.startDate = currentYear + '-' + startMonth + '-' + startDay;
                                result.endDate = currentYear + '-' + endMonth + '-' + endDay;
                            }
                        }
                        
                        this.analyzedData = result;
                        this.showAnalysisResult(result);
                        fileStatus.textContent = 'РюЊ ' + file.name + ' вХёВёЮ ВЎёвБї!';
                        fileStatus.classList.add('selected');
                    } catch (err) {
                        console.log('вХёВёЮ ВўцвЦў:', err);
                        fileStatus.textContent = 'РЮї вХёВёЮ ВІцьїе - ьїїВЮ╝ ьўЋВІЮ ьЎЋВЮИ';
                    }
                };
                reader.readAsArrayBuffer(file);
            },

            getPromoText(p) {

                    return this.getShort(p.key) + ' - ' + p.name;
                } else {

                }

            addDays(dateStr, days) {
                const date = new Date(dateStr);
                date.setDate(date.getDate() + days);
                return date.toISOString().split('T')[0];
            },
            
            getPromoPosition(promoId, date) {
                const p = this.data.find(x => x.id === promoId);
                if (!p) return 'single';
                
                const prevDate = this.addDays(date, -1);
                const nextDate = this.addDays(date, 1);
                
                const hasPrev = p.start <= prevDate && prevDate <= p.end;
                const hasNext = p.start <= nextDate && nextDate <= p.end;
                
                if (!hasPrev && !hasNext) return 'single';
                if (!hasPrev && hasNext) return 'first';
                if (hasPrev && !hasNext) return 'last';
                if (hasPrev && hasNext) return 'middle';
                
                return 'single';
            },
            
            prevMonth() { this.month--; if (this.month < 1) { this.month = 12; this.year--; } this.render(); },
            nextMonth() { this.month++; if (this.month > 12) { this.month = 1; this.year++; } this.render(); },

                document.getElementById('monthLabel').textContent = this.year + 'вЁё ' + months[this.month - 1];
                
                const fd = new Date(this.year, this.month - 1, 1).getDay();
                const ld = new Date(this.year, this.month, 0).getDate();
                let html = '';
                
                for (let i = 0; i < fd; i++) html += '<div class="day-cell empty"></div>';
                
                for (let d = 1; d <= ld; d++) {
                    const date = this.year + '-' + String(this.month).padStart(2, '0') + '-' + String(d).padStart(2, '0');
                    const isToday = date === this.todayStr;
                    
                    const promos = this.data.filter(p => {
                        if (this.filter !== 'all' && p.key !== this.filter) return false;
                        return p.start <= date && date <= p.end;
                    });
                    
                    let cell = '<div class="day-cell' + (promos.length ? ' has-promo' : '') + (isToday ? ' today' : '') + '" onclick="cal.dayClick(\''+date+'\')">';
                    cell += '<div style="color: #999; font-size: 13px; font-weight: 700; margin-bottom: 0.3rem;">' + d + '</div>';
                    promos.forEach(p => {
                        const txt = this.getPromoText(p);
                        const col = {'29cm':'b-29cm','musinsa':'b-musinsa','own':'b-own','global':'b-global'}[p.key] || 'b-29cm';
                        const pos = this.getPromoPosition(p.id, date);
                        const lines = txt.split('\n').length;
                        const height = Math.min(lines, 3) * 1.3 + 0.4;
                        cell += '<div class="promo-item ' + col + ' ' + pos + '" onclick="cal.showEdit(\''+p.id+'\'); event.stopPropagation();" title="'+p.name+'" style="min-height: ' + height + 'em; white-space: pre-wrap; word-break: break-word;">' + txt.split('\n').slice(0,3).join('\n') + '</div>';
                    });
                    cell += '</div>';
                    html += cell;
                }
                
                document.getElementById('calGrid').innerHTML = html;

                    delBtn.onclick = () => this.deletePromo(this.editId);
                    formBtns.appendChild(delBtn);
                    
                    // ьїїВЮ╝ вІцВџ┤вАювЊю в▓ёьі╝ (ьїїВЮ╝ВЮ┤ ВъѕВю╝вЕ┤)
                    if (fileStorage[this.editId]) {
                        const dlBtn = document.createElement('button');
                        dlBtn.id = 'downloadBtn';
                        dlBtn.className = 'btn btn-info';
                        dlBtn.textContent = '­ЪЊЦ ьїїВЮ╝ вІцВџ┤вАювЊю';
                        dlBtn.style.background = '#17a2b8';
                        dlBtn.onclick = () => this.downloadFile(this.editId);
                        formBtns.appendChild(dlBtn);
                    }
                }
                
                document.getElementById('modal').classList.add('show');
            },
            
            save() {
                const name = document.getElementById('inp-name').value.trim();
                const start = document.getElementById('inp-start').value;
                const end = document.getElementById('inp-end').value;
                const desc = document.getElementById('inp-desc').value;
                
                if (!name || !start || !end) { alert('ьЋёВѕў ьЋГвфЕВЮё ВъЁваЦьЋўВёИВџћ'); return; }
                if (start > end) { alert('ВІюВъЉвѓаВДюЖ░ђ ВбЁвБївѓаВДюв│┤вІц відВЮё Вѕў ВЌєВіхвІѕвІц'); return; }
                
                if (this.editId) {
                    const p = this.data.find(x => x.id === this.editId);
                    if (p) { 
                        p.name = name; 
                        p.start = start; 
                        p.end = end; 
                        p.desc = desc;
                        
                        // Local StorageВЌљ ВађВъЦ
                        this.saveToLocalStorage();
                        
                        // Supabase ВЌЁвЇ░ВЮ┤ьіИ (в░▒ЖиИвЮ╝Вџ┤вЊю)
                        console.log('ьћёвАювфеВЁў ВѕўВаЋвље:', name);
                    }
                } else {
                    const platform = document.getElementById('inp-platform').value;
                    const platformMap = {'29cm':'29CM','musinsa':'вг┤ВІаВѓг','own':'ВъљВѓгвф░','global':'ЖИђвАюв▓ї'};
                    
                    const newPromo = {
                        id: 'new_' + Date.now(), 
                        name, 
                        start, 
                        end, 
                        platform: platformMap[platform], 
                        key: platform, 
                        desc, 
                        file: '', 
                        sales: 0, 
                        target: 0, 
                        feedback: ''
                    };
                    
                    this.data.push(newPromo);
                    
                    // Local StorageВЌљ ВађВъЦ (ВдЅВІю)
                    this.saveToLocalStorage();
                    
                    // SupabaseВЌљ ВађВъЦ (в░▒ЖиИвЮ╝Вџ┤вЊю)
                    this.saveToSupabase(newPromo);
                }
                
                this.closeModal();
                this.render();
            },
            
            // Local StorageВЌљ ВађВъЦ
            saveToLocalStorage() {
                try {
                    const localData = this.data.filter(p => !p.id.startsWith('sb_'));
                    localStorage.setItem('vlvd_promotions', JSON.stringify(localData));
                    console.log('РюЊ Local StorageВЌљ ВађВъЦвље: ' + localData.length + 'Ж░ю');
                } catch (err) {
                    console.log('Local Storage ВађВъЦ ВўцвЦў:', err);
                }
            },
            
            // Local StorageВЌљВёю вАювЊю
            loadFromLocalStorage() {
                try {
                    const saved = localStorage.getItem('vlvd_promotions');
                    if (saved) {
                        const localData = JSON.parse(saved);
                        this.data = localData;
                        console.log('РюЊ Local StorageВЌљВёю вАювЊювље: ' + localData.length + 'Ж░ю');
                        return true;
                    }
                } catch (err) {
                    console.log('Local Storage вАювЊю ВўцвЦў:', err);
                }
                return false;
            },
            
            // ьїїВЮ╝ ВЌЁвАювЊю
            uploadFile(promoId, file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const fileData = {
                        name: file.name,
                        size: file.size,
                        type: file.type,
                        data: e.target.result // Base64 ВЮИВйћвћЕ
                    };
                    
                    fileStorage[promoId] = fileData;
                    console.log('РюЊ ьїїВЮ╝ ВађВъЦвље:', file.name);
                };
                reader.readAsArrayBuffer(file);
            },
            
            // ьїїВЮ╝ вІцВџ┤вАювЊю
            downloadFile(promoId) {
                const fileData = fileStorage[promoId];
                if (!fileData) {
                    alert('ьїїВЮ╝ВЮ┤ ВЌєВіхвІѕвІц');
                    return;
                }
                
                const blob = new Blob([fileData.data], { type: fileData.type });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = fileData.name;
                a.click();
                URL.revokeObjectURL(url);
                
                console.log('РюЊ ьїїВЮ╝ вІцВџ┤вАювЊю:', fileData.name);
            },
            
            // ьћёвАювфеВЁў ВѓГВаю
            async deletePromo(id) {
                if (!confirm('ВаЋвДљ ВѓГВаюьЋўВІюЖ▓аВіхвІѕЖ╣ї?')) {
                    return;
                }
                
                // вЇ░ВЮ┤ьё░ВЌљВёю ВѓГВаю
                this.data = this.data.filter(p => p.id !== id);
                
                // Local Storage ВађВъЦ
                this.saveToLocalStorage();
                
                // SupabaseВЌљВёю ВѓГВаю
                if (supabaseClient && id.startsWith('sb_')) {
                    const supabaseId = id.replace('sb_', '');
                    try {
                        const { error } = await supabaseClient
                            .from(TABLE_NAME)
                            .delete()
                            .eq('id', supabaseId);
                        
                        if (!error) {
                            console.log('РюЊ SupabaseВЌљВёю ВѓГВаювље');
                        }
                    } catch (err) {
                        console.log('Supabase ВѓГВаю ВўцвЦў:', err);
                    }
                }
                
                // ьїїВЮ╝вЈё ВѓГВаю
                delete fileStorage[id];
                
                alert('ьћёвАювфеВЁўВЮ┤ ВѓГВаювљўВЌѕВіхвІѕвІц');
                this.render();
            },
            
            closeModal() { 
                document.getElementById('modal').classList.remove('show');
            },

            // ============================================================
            // ===== ьћёвАювфеВЁў вХёВёЮ =====
            // ============================================================

            // ьћёвАювфеВЁўвфЁВЌљВёю ВюаьўЋ ьѓцВЏївЊю ВХћВХю (ВюаВѓгвЈё ЖиИвБ╣ьЎћВџЕ)
            extractType(name) {
                let n = (name || '').toLowerCase();
                // ВѕФВъљ, ВБ╝В░е, вѓаВДю, Ж┤ёьўИвѓ┤ВџЕ вЊ▒ в│ђвЈЎ ВџћВєї ВаюЖ▒░
                n = n.replace(/\([^)]*\)/g, ' ');           // Ж┤ёьўИ ВаюЖ▒░
                n = n.replace(/[0-9]+\s*ВЏћ/g, ' ');          // nВЏћ
                n = n.replace(/[0-9]+\s*ВБ╝В░е?/g, ' ');       // nВБ╝В░е
                n = n.replace(/[0-9]+\s*ВЮ╝/g, ' ');          // nВЮ╝
                n = n.replace(/[0-9]{2,4}[-./][0-9]{1,2}([-./][0-9]{1,2})?/g, ' '); // вѓаВДю
                n = n.replace(/[0-9]+/g, ' ');               // вѓеВЮђ ВѕФВъљ
                n = n.replace(/[~,:&\/]/g, ' ');
                n = n.replace(/\s+/g, ' ').trim();
                // вїђьЉю ВюаьўЋ ьѓцВЏївЊю вДцВ╣Г (Вџ░ВёаВѕюВюё Вѕю)
                const keywords = ['ВБ╝вДљьі╣Ж░ђ','ьЃђВъёВёИВЮ╝','ьЋўвБеьі╣Ж░ђ','ВЮ┤ЖхгВюёьЂг','ВЮ┤ЖхгвЇ░ВЮ┤','вИївъювЊюВюёьЂг',
                    'вЕцв▓ёВіцвЇ░ВЮ┤','вИћвъЎьћёвЮ╝ВЮ┤вЇ░ВЮ┤','вИћьћё','ЖИ░ьџЇВаё','ьЂ┤вдгВќ┤вЪ░Віц','ВІюВдїВўцьћё','в╣ЁВёИВЮ╝',
                    'ВъЦв░ћЖхгвІѕ','В┐аьЈ░','ВюёьЂг','ВёИВЮ╝','ьі╣Ж░ђ','В║аьјўВЮИ','ьјўВіцьІ░в▓ї'];
                for (const k of keywords) {
                    if (n.replace(/\s/g,'').includes(k)) return k;
                }
                return n || 'ЖИ░ьЃђ';
            },

            // ===== ВІцВаю вДцВХю ВЌ░вЈЎ (vlvd_daily_sales View) =====
            // вѓ┤вХђ В▒ёвёљьѓц Рєњ ViewВЮў channel(ьЋюЖИђ) вДцьЋЉ
            channelToKey: { 'вг┤ВІаВѓг':'musinsa', '29CM':'29cm', 'ВъљВѓгвф░':'own' },

            // ViewВЌљВёю ВЮ╝в│ё вДцВХю вАювЊю (ьЋю в▓ѕвДї)
            async loadDailySales() {
                if (this.dailySalesLoaded) return true;
                if (!supabaseClient) { await new Promise(r=>setTimeout(r,800)); return this.loadDailySales(); }
                try {
                    // Viewвіћ ~ВѕўВ▓юьќЅВЮ┤в»ђвАю ьјўВЮ┤ВДђвёцВЮ┤ВЁўВю╝вАю ВаёвХђ Ж░ђВаИВў┤
                    let all = [], from = 0, page = 1000;
                    while (true) {
                        const { data, error } = await supabaseClient
                            .from('vlvd_daily_sales')
                            .select('channel,sale_date,revenue')
                            .range(from, from + page - 1);
                        if (error) { console.error('ВЮ╝в│ёвДцВХю вАювЊю ВўцвЦў:', error); this.dailySales = []; return false; }
                        if (!data || data.length === 0) break;
                        all = all.concat(data);
                        if (data.length < page) break;
                        from += page;
                        if (from > 100000) break; // ВЋѕВаёВъЦВ╣ў
                    }
                    // В▒ёвёљьѓцв│ёвАю {date: revenue} вДх ЖхгВё▒
                    const map = { 'musinsa':{}, '29cm':{}, 'own':{} };
                    all.forEach(r => {
                        const k = this.channelToKey[r.channel];
                        if (!k) return;
                        const d = (r.sale_date || '').slice(0,10);
                        map[k][d] = (map[k][d] || 0) + (Number(r.revenue) || 0);
                    });
                    this.dailySalesMap = map;
                    this.dailySales = all;
                    this.dailySalesLoaded = true;
                    console.log('РюЊ ВІцВаю вДцВХю вАювЊю: ' + all.length + 'ВЮ╝В╣ў (В▒ёвёљ├ЌвѓаВДю)');
                    return true;
                } catch (err) {
                    console.error('ВЮ╝в│ёвДцВХю вАювЊю ВўѕВЎИ:', err);
                    this.dailySales = []; return false;
                }
            },

            // ьЋю ьћёвАювфеВЁўВЮў ВІцВаю вДцВХю = В▒ёвёљ ВЮ╝В╣ў + ЖИ░Ж░ё вѓ┤ ВЮ╝в│ёвДцВХю ьЋЕВѓ░
            actualSalesFor(promo) {
                if (!this.dailySalesMap) return 0;
                const k = promo.key;
                const m = this.dailySalesMap[k];
                if (!m) return 0; // ЖИђвАюв▓ї вЊ▒ вДцВХюВєїВіц ВЌєвіћ В▒ёвёљ
                const start = (promo.start || '').slice(0,10);
                const end = (promo.end || '').slice(0,10);
                if (!start || !end) return 0;
                let sum = 0;
                for (const d in m) {
                    if (d >= start && d <= end) sum += m[d];
                }
                return Math.round(sum);
            },

            // data в░░ВЌ┤ВЮў Ж░Ђ ьћёвАювфеВЁўВЌљ actualSales В▒ёВџ░ЖИ░
            applyActualSales() {
                if (!this.dailySalesMap) return;
                this.data.forEach(p => {
                    p.actualSales = this.actualSalesFor(p);
                });
            },

            // вЇ░ВЮ┤ьё░вЦ╝ ьћївъФьЈ╝+ВюаьўЋВю╝вАю ЖиИвБ╣ьЎћ
            buildGroups() {
                const groups = {};
                this.data.forEach(p => {
                    const type = this.extractType(p.name);
                    const key = (p.key || 'other') + '::' + type;
                    if (!groups[key]) {
                        groups[key] = { key, platform: p.platform, platformKey: p.key || 'other',
                            type, items: [] };
                    }
                    groups[key].items.push(p);
                });
                // ьєхЖ│ё Ж│ёВѓ░ (ВІцВаювДцВХю Вџ░Вёа: actualSalesЖ░ђ ВъѕВю╝вЕ┤ ЖиИЖ▒И, ВЌєВю╝вЕ┤ ВѕўвЈЎ sales)
                const eff = (i) => (i.actualSales != null && i.actualSales > 0) ? i.actualSales : (i.sales || 0);
                Object.values(groups).forEach(g => {
                    const withSales = g.items.filter(i => eff(i) > 0);
                    g.count = g.items.length;
                    g.salesCount = withSales.length;
                    g.totalSales = g.items.reduce((s,i)=>s+eff(i),0);
                    g.avgSales = withSales.length ? Math.round(g.totalSales / withSales.length) : 0;
                    g.totalTarget = g.items.reduce((s,i)=>s+(i.target||0),0);
                    // вфЕьЉю вїђв╣ё вІгВё▒вЦа (вфЕьЉюЖ░ђ Въѕвіћ Ж▒┤вДї)
                    const withTarget = g.items.filter(i => (i.target||0) > 0);
                    if (withTarget.length) {
                        const ach = withTarget.reduce((s,i)=>s+eff(i),0);
                        const tgt = withTarget.reduce((s,i)=>s+(i.target||0),0);
                        g.achieveRate = tgt ? Math.round(ach/tgt*100) : null;
                    } else g.achieveRate = null;
                    // вДцВХю ьЉюВцђьјИВ░е (в│ђвЈЎВё▒)
                    if (withSales.length > 1) {
                        const mean = g.avgSales;
                        const variance = withSales.reduce((s,i)=>s+Math.pow(eff(i)-mean,2),0)/withSales.length;
                        g.stdev = Math.round(Math.sqrt(variance));
                    } else g.stdev = 0;
                });
                return groups;
            },

            platColor(key) {
                return this.colors[key] || '#888';
            },
            platName(key) {
                return {'29cm':'29CM','musinsa':'вг┤ВІаВѓг','own':'ВъљВѓгвф░','global':'ЖИђвАюв▓ї'}[key] || 'ЖИ░ьЃђ';
            },

            async renderAnalysis() {
                // ВІцВаю вДцВХю(View) вАювЊю ьЏё Ж░Ђ ьћёвАювфеВЁўВЌљ ВаЂВџЕ
                const wrap = document.getElementById('analysisWrap');
                if (!this.dailySalesLoaded && wrap) {
                    wrap.innerHTML = '<div class="ana-empty">ВІцВаю вДцВХю вЇ░ВЮ┤ьё░вЦ╝ вХѕвЪгВўцвіћ ВцЉ...</div>';
                }
                await this.loadDailySales();
                this.applyActualSales();

                const groups = this.buildGroups();
                const groupArr = Object.values(groups);

                // ВаёВ▓┤ ьєхЖ│ё (ВІцВаювДцВХю Вџ░Вёа)
                const eff = (p) => (p.actualSales != null && p.actualSales > 0) ? p.actualSales : (p.sales || 0);
                const allWithSales = this.data.filter(p => eff(p) > 0);
                const totalSales = this.data.reduce((s,p)=>s+eff(p),0);
                const avgSales = allWithSales.length ? Math.round(totalSales/allWithSales.length) : 0;
                const totalPromos = this.data.length;
                const realCount = this.data.filter(p => (p.actualSales||0) > 0).length;

                let html = '';

                // --- вЈЎЖИ░ьЎћ ВЃЂьЃю ВЋѕвѓ┤ ---
                if (allWithSales.length === 0) {
                    html += `<div class="analysis-section" style="border-color:#ffd; background:#fffdf5;">
                        <h2>Рџа№ИЈ вДцВХю вЇ░ВЮ┤ьё░ ВЌєВЮї</h2>
                        <div class="sub" style="margin-bottom:0;">ВІцВаю вДцВХю вЇ░ВЮ┤ьё░вЦ╝ вХѕвЪгВўцВДђ вф╗ьќѕВіхвІѕвІц.
                        вёцьіИВЏїьЂг ВЃЂьЃювЦ╝ ьЎЋВЮИьЋўЖ▒░вѓў ВъаВІю ьЏё вІцВІю ВІювЈёьЋ┤ВБ╝ВёИВџћ.</div>
                    </div>`;
                }

                // --- 1. ВаёВ▓┤ ВџћВЋй ---
                html += `<div class="analysis-section">
                    <h2>­ЪЊі ьћёвАювфеВЁў ьџеВюе вХёВёЮ</h2>
                    <div class="sub">вг┤ВІаВѓг ┬и 29CM ┬и ВъљВѓгвф░ ВІцВаю ьїљвДц вЇ░ВЮ┤ьё░(ВиеВєї┬иЖхљьЎў ВаюВЎИ, ьїљвДцЖ░ђ ЖИ░Вцђ)вЦ╝ ьћёвАювфеВЁў ЖИ░Ж░ёВЌљ вДцВ╣ГьЋ┤ ВДЉЖ│ёьЋЕвІѕвІц.</div>
                    <div class="stat-cards">
                        <div class="stat-card"><div class="label">В┤Ю ьћёвАювфеВЁў</div><div class="value">${totalPromos}Ж▒┤</div></div>
                        <div class="stat-card"><div class="label">вДцВХю ЖИ░вАЮ Ж▒┤Вѕў</div><div class="value">${allWithSales.length}Ж▒┤</div></div>
                        <div class="stat-card"><div class="label">вѕёВаЂ вДцВХю</div><div class="value small">РѓЕ${totalSales.toLocaleString()}</div></div>
                        <div class="stat-card"><div class="label">Ж▒┤вІ╣ ьЈЅЖиа вДцВХю</div><div class="value small">РѓЕ${avgSales.toLocaleString()}</div></div>
                    </div>`;

                // ьџеВюе ВѕюВюё ьЁїВЮ┤вИћ (вДцВХю ЖИ░вАЮ Въѕвіћ ЖиИвБ╣вДї, ьЈЅЖиавДцВХю вѓ┤вд╝В░еВѕю)
                const ranked = groupArr.filter(g => g.salesCount > 0).sort((a,b)=>b.avgSales-a.avgSales);
                if (ranked.length) {
                    const maxAvg = ranked[0].avgSales || 1;
                    html += `<div class="table-scroll"><table class="ana-table">
                        <thead><tr>
                            <th>ьћївъФьЈ╝</th><th>ьћёвАювфеВЁў ВюаьўЋ</th>
                            <th class="num">ВДёьќЅ</th><th class="num">вДцВХюЖИ░вАЮ</th>
                            <th class="num">ьЈЅЖиавДцВХю</th><th>ьџеВюе</th>
                            <th class="num">вфЕьЉювІгВё▒вЦа</th>
                        </tr></thead><tbody>`;
                    ranked.forEach(g => {
                        const barW = Math.round((g.avgSales/maxAvg)*100);
                        html += `<tr>
                            <td><span class="badge" style="background:${this.platColor(g.platformKey)}">${this.platName(g.platformKey)}</span></td>
                            <td>${g.type}</td>
                            <td class="num">${g.count}</td>
                            <td class="num">${g.salesCount}</td>
                            <td class="num">РѓЕ${g.avgSales.toLocaleString()}</td>
                            <td><div class="bar-track"><div class="bar-fill" style="width:${barW}%;background:${this.platColor(g.platformKey)}"></div></div></td>
                            <td class="num">${g.achieveRate!=null ? g.achieveRate+'%' : '-'}</td>
                        </tr>`;
                    });
                    html += `</tbody></table></div>`;
                } else {
                    html += `<div class="ana-empty">вДцВХюВЮ┤ ЖИ░вАЮвљю ьћёвАювфеВЁўВЮ┤ ВЋёВДЂ ВЌєВіхвІѕвІц.</div>`;
                }
                html += `</div>`;

                // --- 2. ЖИ░вїђ вДцВХю ВИАВаЋ ---
                html += `<div class="analysis-section">
                    <h2>­Ъћ« вІцВЮї ьћёвАювфеВЁў ЖИ░вїђ вДцВХю ВИАВаЋ</h2>
                    <div class="sub">ьћївъФьЈ╝ + ьћёвАювфеВЁўвфЁ ВюаВѓгвЈёвАю вгХВЮђ в░ўв│х ьћёвАювфеВЁў ЖиИвБ╣ВъЁвІѕвІц.
                    Ж░ЎВЮђ ВюаьўЋВЮў Ж│╝Ж▒░ вДцВХю ьЈЅЖиаВЮё ЖИ░вїђ вДцВХювАю ВўѕВИАьЋЕвІѕвІц. (2ьџї ВЮ┤ВЃЂ ВДёьќЅьЋю ЖиИвБ╣вДї ьЉюВІю)</div>`;

                const repeatGroups = groupArr.filter(g => g.count >= 2)
                    .sort((a,b)=> b.avgSales - a.avgSales || b.count - a.count);

                if (repeatGroups.length) {
                    html += `<div class="table-scroll"><table class="ana-table">
                        <thead><tr>
                            <th>ьћївъФьЈ╝</th><th>ВюаьўЋ</th>
                            <th class="num">ВДёьќЅьџЪВѕў</th><th class="num">вДцВХюЖИ░вАЮ</th>
                            <th class="num">ьЈЅЖиа(ЖИ░вїђвДцВХю)</th><th class="num">в│ђвЈЎВё▒(┬▒)</th>
                            <th></th>
                        </tr></thead><tbody>`;
                    repeatGroups.forEach((g,idx) => {
                        const canForecast = g.salesCount >= 1;
                        html += `<tr class="group-row" onclick="cal.toggleGroupDetail('grp${idx}')">
                            <td><span class="badge" style="background:${this.platColor(g.platformKey)}">${this.platName(g.platformKey)}</span></td>
                            <td>${g.type} <span style="color:#bbb">РќЙ</span></td>
                            <td class="num">${g.count}</td>
                            <td class="num">${g.salesCount}</td>
                            <td class="num">${canForecast ? 'РѓЕ'+g.avgSales.toLocaleString() : '<span style="color:#bbb">вЇ░ВЮ┤ьё░ вХђВА▒</span>'}</td>
                            <td class="num">${g.stdev ? 'РѓЕ'+g.stdev.toLocaleString() : '-'}</td>
                            <td class="num">${canForecast ? `<button class="save-forecast-btn" onclick="event.stopPropagation();cal.saveForecast('${g.key.replace(/'/g,"")}',${g.avgSales},${g.salesCount},${g.avgSales})">ВўѕВИАВађВъЦ</button>` : ''}</td>
                        </tr>`;
                        // ВЃЂВёИ (ВѕеЖ╣ђ)
                        html += `<tr class="group-detail" id="grp${idx}" style="display:none"><td colspan="7"><div class="detail-inner">
                            <table><tbody>`;
                        g.items.sort((a,b)=>(a.start>b.start?1:-1)).forEach(i => {
                            html += `<tr>
                                <td style="width:40%">${i.name}</td>
                                <td style="color:#999">${i.start} ~ ${i.end}</td>
                                <td class="num" style="text-align:right">${((i.actualSales!=null&&i.actualSales>0)?i.actualSales:(i.sales||0))>0 ? 'РѓЕ'+(((i.actualSales!=null&&i.actualSales>0)?i.actualSales:(i.sales||0))).toLocaleString() : '<span style="color:#ccc">в»ИЖИ░вАЮ</span>'}</td>
                            </tr>`;
                        });
                        html += `</tbody></table></div></td></tr>`;
                    });
                    html += `</tbody></table></div>`;
                } else {
                    html += `<div class="ana-empty">2ьџї ВЮ┤ВЃЂ в░ўв│хвљю ьћёвАювфеВЁў ЖиИвБ╣ВЮ┤ ВЌєВіхвІѕвІц.</div>`;
                }
                html += `</div>`;

                // --- 3. ВађВъЦвљю ВўѕВИА ЖИ░вАЮ ---
                html += `<div class="analysis-section">
                    <h2>­ЪЊЂ ВађВъЦвљю ЖИ░вїђвДцВХю ВўѕВИА ЖИ░вАЮ</h2>
                    <div class="sub">ВўѕВИАВађВъЦ в▓ёьі╝Вю╝вАю ЖИ░вАЮьЋю Ж░њВъЁвІѕвІц. вѓўВцЉВЌљ ВІцВаю вДцВХюЖ│╝ в╣ёЖхљьЋ┤ ВўѕВИА ВаЋьЎЋвЈёвЦ╝ ВХћВаЂьЋа Вѕў ВъѕВіхвІѕвІц.</div>
                    <div id="forecastList"><div class="ana-empty">вХѕвЪгВўцвіћ ВцЉ...</div></div>
                </div>`;

                document.getElementById('analysisWrap').innerHTML = html;
                this.loadForecasts();
            },

            toggleGroupDetail(id) {
                const el = document.getElementById(id);
                if (el) el.style.display = el.style.display === 'none' ? 'table-row' : 'none';
            },

            // ЖИ░вїђвДцВХю ВўѕВИА ВађВъЦ (Supabase)
            async saveForecast(groupKey, forecast, basisCount, basisAvg) {
                if (!supabaseClient) {
                    alert('Supabase ВЌ░Ж▓░ вїђЖИ░ ВцЉВъЁвІѕвІц. ВъаВІю ьЏё вІцВІю ВІювЈёьЋ┤ВБ╝ВёИВџћ.');
                    return;
                }
                const [platformKey, promoType] = groupKey.split('::');
                try {
                    const { error } = await supabaseClient
                        .from('vlvd_promotion_forecasts')
                        .insert([{
                            group_key: groupKey,
                            platform: this.platName(platformKey),
                            promo_type: promoType,
                            forecast: forecast,
                            basis_count: basisCount,
                            basis_avg: basisAvg,
                            note: ''
                        }]);
                    if (error) {
                        console.error('ВўѕВИА ВађВъЦ ВўцвЦў:', error);
                        alert('ВађВъЦ ВІцьїе: ' + (error.message || 'ьЁїВЮ┤вИћВЮ┤ ВЌєВЮё Вѕў ВъѕВіхвІѕвІц. SQLвАю vlvd_promotion_forecasts ьЁїВЮ┤вИћВЮё ве╝Вађ ВЃЮВё▒ьЋўВёИВџћ.'));
                        return;
                    }
                    alert('РюЊ ЖИ░вїђвДцВХю РѓЕ' + forecast.toLocaleString() + ' ВўѕВИАВЮ┤ ВађВъЦвљўВЌѕВіхвІѕвІц.');
                    this.loadForecasts();
                } catch (err) {
                    console.error(err);
                    alert('ВађВъЦ ВцЉ ВўцвЦўЖ░ђ в░юВЃЮьќѕВіхвІѕвІц.');
                }
            },

            // ВађВъЦвљю ВўѕВИА вХѕвЪгВўцЖИ░
            async loadForecasts() {
                const listEl = document.getElementById('forecastList');
                if (!listEl) return;
                if (!supabaseClient) {
                    setTimeout(() => this.loadForecasts(), 800);
                    return;
                }
                try {
                    const { data, error } = await supabaseClient
                        .from('vlvd_promotion_forecasts')
                        .select('*')
                        .order('created_at', { ascending: false });
                    if (error) {
                        listEl.innerHTML = `<div class="ana-empty">ВўѕВИА ьЁїВЮ┤вИћВЮё ВЮйВЮё Вѕў ВЌєВіхвІѕвІц.<br>
                            <span style="font-size:12px">vlvd_promotion_forecasts ьЁїВЮ┤вИћВЮё SQLвАю ВЃЮВё▒ьЋўвЕ┤ ьЉюВІювљЕвІѕвІц.</span></div>`;
                        return;
                    }
                    if (!data || data.length === 0) {
                        listEl.innerHTML = `<div class="ana-empty">ВЋёВДЂ ВађВъЦвљю ВўѕВИАВЮ┤ ВЌєВіхвІѕвІц.</div>`;
                        return;
                    }
                    let h = `<div class="table-scroll"><table class="ana-table">
                        <thead><tr>
                            <th>ВађВъЦВЮ╝</th><th>ьћївъФьЈ╝</th><th>ВюаьўЋ</th>
                            <th class="num">ЖИ░вїђвДцВХю</th><th class="num">Жи╝Ж▒░ Ж▒┤Вѕў</th><th></th>
                        </tr></thead><tbody>`;
                    data.forEach(f => {
                        const d = f.created_at ? new Date(f.created_at).toLocaleDateString('ko-KR') : '-';
                        h += `<tr>
                            <td style="color:#999">${d}</td>
                            <td>${f.platform || '-'}</td>
                            <td>${f.promo_type || '-'}</td>
                            <td class="num">РѓЕ${(f.forecast||0).toLocaleString()}</td>
                            <td class="num">${f.basis_count || 0}</td>
                            <td class="num"><button class="save-forecast-btn" style="background:#dc3545" onclick="cal.deleteForecast(${f.id})">ВѓГВаю</button></td>
                        </tr>`;
                    });
                    h += `</tbody></table></div>`;
                    listEl.innerHTML = h;
                } catch (err) {
                    listEl.innerHTML = `<div class="ana-empty">вХѕвЪгВўцЖИ░ ВўцвЦў</div>`;
                }
            },

            async deleteForecast(id) {
                if (!confirm('ВЮ┤ ВўѕВИА ЖИ░вАЮВЮё ВѓГВаюьЋаЖ╣їВџћ?')) return;
                try {
                    const { error } = await supabaseClient
                        .from('vlvd_promotion_forecasts').delete().eq('id', id);
                    if (error) { alert('ВѓГВаю ВІцьїе'); return; }
                    this.loadForecasts();
                } catch (err) { alert('ВѓГВаю ВцЉ ВўцвЦў'); }
            }
        };
        
        document.getElementById('analyzeFile').addEventListener('change', function(e) {
            cal.analyzeFile(e);
        });
        
        cal.init();
    </script>
</body>
</html>
