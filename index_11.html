            // ============================================================
            // ===== 프로모션 분석 =====
            // ============================================================

            // 프로모션명에서 유형 키워드 추출 (유사도 그룹화용)
            extractType(name) {
                let n = (name || '').toLowerCase();
                // 숫자, 주차, 날짜, 괄호내용 등 변동 요소 제거
                n = n.replace(/\([^)]*\)/g, ' ');           // 괄호 제거
                n = n.replace(/[0-9]+\s*월/g, ' ');          // n월
                n = n.replace(/[0-9]+\s*주차?/g, ' ');       // n주차
                n = n.replace(/[0-9]+\s*일/g, ' ');          // n일
                n = n.replace(/[0-9]{2,4}[-./][0-9]{1,2}([-./][0-9]{1,2})?/g, ' '); // 날짜
                n = n.replace(/[0-9]+/g, ' ');               // 남은 숫자
                n = n.replace(/[~,:&\/]/g, ' ');
                n = n.replace(/\s+/g, ' ').trim();
                // 별칭/오타 정규화 (같은 행사가 다른 표기로 갈라지는 것 방지)
                n = n.replace(/블프/g, '블랙프라이데이');   // 블프 → 블랙프라이데이
                n = n.replace(/멥버스데이/g, '멤버스데이');  // 오타 보정
                n = n.replace(/맴버스데이/g, '멤버스데이');  // 오타 보정
                // 대표 유형 키워드 매칭 (우선순위 순)
                const keywords = ['주말특가','타임세일','하루특가','이구위크','이구데이','브랜드위크',
                    '멤버스데이','블랙프라이데이','기획전','클리어런스','시즌오프','빅세일',
                    '장바구니','쿠폰','위크','세일','특가','캠페인','페스티벌'];
                for (const k of keywords) {
                    if (n.replace(/\s/g,'').includes(k)) return k;
                }
                return n || '기타';
            },

            // 프로모션 계층 분류 (대분류 / 시즌 / 기간한정)
            // level 1=큰프로모션 본체, 2=부수(시즌), 3=기간한정(타임세일 등)
            classifyTier(name) {
                const type = this.extractType(name);           // 대분류 키워드
                let nn = (name || '').toLowerCase().replace(/블프/g,'블랙프라이데이');
                // 시즌 감지
                let season = null;
                if (/여름|summer/.test(nn)) season = '여름';
                else if (/겨울|winter/.test(nn)) season = '겨울';
                else if (/봄|spring/.test(nn)) season = '봄';
                else if (/가을|fall|autumn/.test(nn)) season = '가을';
                // 기간 한정 키워드 (대분류가 그 자체가 아닌 경우에만 보조 키워드로 인정)
                const limitedKeys = ['타임세일','하루특가','타임'];
                const isLimited = limitedKeys.some(k => nn.replace(/\s/g,'').includes(k));
                // level 결정
                let level = 1;
                if (isLimited) level = 3;
                else if (season) level = 2;
                // 계층 라벨
                let tierLabel;
                if (level === 3) tierLabel = (season ? season + ' ' : '') + type + ' 타임세일';
                else if (level === 2) tierLabel = season + ' ' + type;
                else tierLabel = type;
                return { base: type, season, isLimited, level, tierLabel };
            },

            // ===== 실제 매출 연동 (vlvd_daily_sales View) =====
            // 내부 채널키 → View의 channel(한글) 매핑
            channelToKey: { '무신사':'musinsa', '29CM':'29cm', '자사몰':'own' },

            // View에서 일별 매출 로드 (한 번만)
            // 프로모션별 달성매출·증분 로드 (vlvd_promo_uplift, 읽기 전용)
            // 선택된 기간(2w/1m/3m)의 증분 효과 HTML
            upliftBoxHtml(up) {
                const per = this.upliftPeriod;
                const pctMap = { '2w': up.uplift_pct_2w, '1m': up.uplift_pct_1m, '3m': up.uplift_pct_3m };
                const baseMap = { '2w': up.baseline_2w, '1m': up.baseline_1m, '3m': up.baseline_3m };
                const labelMap = { '2w': '직전 2주', '1m': '직전 1개월', '3m': '직전 3개월' };
                // 신규 컬럼이 아직 없으면(SQL 미실행) 기존 단일값으로 폴백
                let pct = pctMap[per];
                let base = baseMap[per];
                if (pct === undefined && per === '2w') { pct = up.uplift_pct; base = up.baseline_daily_avg; }
                if (pct == null) {
                    return `<span style="color:var(--ink-faint);font-size:12.5px;">${labelMap[per]} 비교 기준 데이터 부족 (매출 데이터 범위 밖)</span>`;
                }
                pct = Number(pct);
                const pos = pct >= 0;
                const color = pos ? '#1a9d55' : '#d23f3f';
                const sign = pos ? '+' : '';
                return `<span style="display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap;">
                    <span style="font-weight:700;color:${color};font-size:16px;">${sign}${pct.toFixed(1)}%</span>
                    <span style="color:var(--ink-faint);font-size:12.5px;">
                        프로모션 기간 일평균 ₩${(up.daily_avg_during||0).toLocaleString()}
                        vs ${labelMap[per]} ₩${Number(base||0).toLocaleString()}
                    </span>
                </span>`;
            },

            // 기간 토글: 박스만 다시 그림 (팝업 전체 재렌더 불필요)
            setUpliftPeriod(per) {
                this.upliftPeriod = per;
                const p = this.data.find(x => x.id === this.editId);
                if (!p) return;
                const up = this.upliftMap && this.upliftMap[String(p.id).replace(/^sb_/, '')];
                const box = document.getElementById('upliftBox');
                if (up && box) box.innerHTML = this.upliftBoxHtml(up);
                // 토글 active 상태 갱신
                document.querySelectorAll('.uplift-toggle .uplift-tab').forEach(btn => {
                    btn.classList.toggle('active', btn.getAttribute('onclick').includes("'"+per+"'"));
                });
            },

            async loadUplift() {
                if (this.upliftLoaded) return true;
                if (!supabaseClient) return false;
                try {
                    const { data, error } = await supabaseClient
                        .from('vlvd_promo_uplift')
                        .select('promo_id,actual_sales,daily_avg_during,baseline_2w,baseline_1m,baseline_3m,uplift_pct_2w,uplift_pct_1m,uplift_pct_3m,baseline_daily_avg,uplift_pct,settlement_sales,cost_sales,margin,margin_pct,order_count,period_days');
                    if (error) { console.warn('uplift 로드 건너뜀:', error.message); return false; }
                    const map = {};
                    (data || []).forEach(r => { map[r.promo_id] = r; });
                    this.upliftMap = map;
                    this.upliftLoaded = true;
                    console.log('✓ 달성매출·증분 로드: ' + (data ? data.length : 0) + '건');
                    return true;
                } catch (e) { console.warn('uplift 예외:', e); return false; }
            },

            // 저장된 분석 요약 로드 (vlvd_promo_analysis, 읽기 전용·빠름)
            async loadSavedAnalysis() {
                if (this.savedAnalysisLoaded) return true;
                if (!supabaseClient) return false;
                try {
                    const { data, error } = await supabaseClient
                        .from('vlvd_promo_analysis')
                        .select('channel,promo_type,run_count,sales_count,total_sales,avg_sales,max_sales,min_sales,stdev_sales,first_date,last_date,top_promo_name,updated_at');
                    if (error) { console.warn('저장 분석 로드 건너뜀:', error.message); return false; }
                    if (!data || !data.length) return false;
                    // channel(한글)→key 매핑은 저장 시 platform_key(영문키)로 저장됨
                    this.savedAnalysis = data;
                    this.savedAnalysisLoaded = true;
                    this.savedAnalysisUpdatedAt = data[0] && data[0].updated_at ? data[0].updated_at : null;
                    console.log('✓ 저장 분석 로드: ' + data.length + '행 (빠른 표시용)');
                    return true;
                } catch (e) { console.warn('저장 분석 예외:', e); return false; }
            },

            // 그룹(유형)의 평균 증감% — 멤버 프로모션들의 uplift_pct(1개월 기준) 평균
            avgUpliftForGroup(g) {
                if (!this.upliftMap || !g || !g.items || !g.items.length) return null;
                let sum = 0, cnt = 0;
                g.items.forEach(it => {
                    const key = String(it.id).replace(/^sb_/, '');
                    const up = this.upliftMap[key];
                    if (up) {
                        const v = (up.uplift_pct_1m != null) ? up.uplift_pct_1m : up.uplift_pct;
                        if (v != null) { sum += Number(v); cnt++; }
                    }
                });
                return cnt > 0 ? Math.round((sum / cnt) * 10) / 10 : null;
            },

            // 그룹(유형)의 증감 분석 상세 — 평균 기준선/기간일평균/개별 내역 집계
            upliftAnalysisForGroup(g) {
                if (!this.upliftMap || !g || !g.items || !g.items.length) return null;
                let sumDuring = 0, sumBase = 0, sumPct = 0, cnt = 0, pos = 0, neg = 0;
                const detail = [];
                g.items.forEach(it => {
                    const key = String(it.id).replace(/^sb_/, '');
                    const up = this.upliftMap[key];
                    if (!up) return;
                    const pct = (up.uplift_pct_1m != null) ? Number(up.uplift_pct_1m)
                              : (up.uplift_pct != null ? Number(up.uplift_pct) : null);
                    const base = (up.baseline_1m != null) ? Number(up.baseline_1m)
                               : (up.baseline_daily_avg != null ? Number(up.baseline_daily_avg) : null);
                    const during = (up.daily_avg_during != null) ? Number(up.daily_avg_during) : null;
                    if (pct == null) return;
                    cnt++;
                    if (during != null) sumDuring += during;
                    if (base != null) sumBase += base;
                    sumPct += pct;
                    if (pct >= 0) pos++; else neg++;
                    detail.push({ name: it.name, start: (it.start||'').slice(0,10), pct, base, during });
                });
                if (cnt === 0) return null;
                return {
                    count: cnt,
                    avgPct: Math.round((sumPct / cnt) * 10) / 10,
                    avgDuring: Math.round(sumDuring / cnt),
                    avgBase: Math.round(sumBase / cnt),
                    posCount: pos,
                    negCount: neg,
                    detail: detail.sort((a,b)=> b.pct - a.pct)
                };
            },

            // 증감률 분석 카드 렌더 (펼침 영역 내용)
            renderUpliftAnalysis(g, a) {
                if (!a) return '<div style="padding:1.25rem;color:#999;font-size:13px">분석할 증감 데이터가 없습니다.</div>';
                const pos = a.avgPct >= 0;
                const color = pos ? '#1a9d55' : '#d23f3f';
                const liftAmt = a.avgDuring - a.avgBase;  // 일평균 증감액
                // 한 줄 요약 해석
                let verdict, advice;
                if (a.avgPct >= 30) {
                    verdict = `평소보다 매출이 크게 올랐습니다. 이 유형은 매출 견인 효과가 확실합니다.`;
                    advice = `핵심 프로모션으로 유지하고, 다음에도 비슷한 시기·구성으로 반복하는 것이 좋습니다. 노출 구좌나 할인 폭을 더 키워 규모를 확대해볼 만합니다.`;
                } else if (a.avgPct >= 5) {
                    verdict = `평소보다 매출이 소폭 올랐습니다. 완만한 플러스 효과가 있습니다.`;
                    advice = `효과는 있으나 폭이 작습니다. 상품 구성·할인율·노출 위치를 조정해 상승 폭을 키워볼 여지가 있습니다.`;
                } else if (a.avgPct >= -5) {
                    verdict = `평소 매출과 거의 비슷합니다. 프로모션의 매출 견인 효과가 뚜렷하지 않습니다.`;
                    advice = `이 유형은 매출 증대보다 재고 소진·고객 유지 목적이라면 유지하되, 매출이 목표라면 시기나 상품 구성을 바꿔보는 것이 좋습니다.`;
                } else {
                    verdict = `프로모션 기간 매출이 평소보다 오히려 낮았습니다.`;
                    advice = `직전 1개월에 더 강한 프로모션이 있었거나, 비수기·상품 매력도 문제일 수 있습니다. 시기를 옮기거나 할인 폭·주력 상품을 재검토하는 것을 권합니다.`;
                }
                // 개별 내역 (최대 6개)
                let rows = a.detail.slice(0, 6).map(d => {
                    const dp = d.pct >= 0;
                    return `<tr>
                        <td style="padding:0.35rem 0.6rem;color:#555;font-size:12px;max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${this.esc(d.name)}</td>
                        <td style="padding:0.35rem 0.6rem;color:#999;font-size:12px">${d.start}</td>
                        <td style="padding:0.35rem 0.6rem;text-align:right;font-size:12px">${d.during!=null?'₩'+d.during.toLocaleString():'-'}</td>
                        <td style="padding:0.35rem 0.6rem;text-align:right;font-size:12px;color:#999">${d.base!=null?'₩'+d.base.toLocaleString():'-'}</td>
                        <td style="padding:0.35rem 0.6rem;text-align:right;font-size:12px;font-weight:700;color:${dp?'#1a9d55':'#d23f3f'}">${dp?'+':''}${d.pct.toFixed(1)}%</td>
                    </tr>`;
                }).join('');

                return `<div style="padding:1.25rem 1.5rem">
                    <div style="font-size:13px;font-weight:700;margin-bottom:0.75rem;color:#333">📊 ${g.type} 증감률 분석 <span style="color:#999;font-weight:500">· 직전 1개월 평균 대비</span></div>
                    <div style="display:flex;gap:1.5rem;flex-wrap:wrap;margin-bottom:1rem">
                        <div style="min-width:160px">
                            <div style="font-size:11px;color:#999;margin-bottom:0.2rem">평소 일평균 (직전 1개월)</div>
                            <div style="font-size:15px;font-weight:700;color:#555">₩${a.avgBase.toLocaleString()}</div>
                        </div>
                        <div style="font-size:18px;color:#bbb;align-self:center">→</div>
                        <div style="min-width:160px">
                            <div style="font-size:11px;color:#999;margin-bottom:0.2rem">프로모션 기간 일평균</div>
                            <div style="font-size:15px;font-weight:700;color:#333">₩${a.avgDuring.toLocaleString()}</div>
                        </div>
                        <div style="min-width:140px">
                            <div style="font-size:11px;color:#999;margin-bottom:0.2rem">일평균 증감</div>
                            <div style="font-size:15px;font-weight:700;color:${color}">${liftAmt>=0?'+':''}₩${liftAmt.toLocaleString()}</div>
                        </div>
                        <div style="min-width:120px">
                            <div style="font-size:11px;color:#999;margin-bottom:0.2rem">평균 증감률</div>
                            <div style="font-size:18px;font-weight:800;color:${color}">${pos?'+':''}${a.avgPct.toFixed(1)}%</div>
                        </div>
                    </div>
                    <div style="background:#fff;border:1px solid #eee;border-radius:8px;padding:0.75rem 1rem;margin-bottom:0.9rem">
                        <div style="font-size:12.5px;line-height:1.6;color:#333"><b style="color:${color}">해석.</b> ${verdict}</div>
                        <div style="font-size:12.5px;line-height:1.6;color:#333;margin-top:0.4rem"><b style="color:#2563a8">다음 운영 제안.</b> ${advice}</div>
                        <div style="font-size:11.5px;color:#999;margin-top:0.5rem">집계 ${a.count}건 중 상승 ${a.posCount}건 · 하락 ${a.negCount}건</div>
                    </div>
                    ${rows ? `<table style="width:100%;border-collapse:collapse">
                        <thead><tr style="border-bottom:1px solid #eee">
                            <th style="padding:0.35rem 0.6rem;text-align:left;font-size:11px;color:#999;font-weight:600">개별 프로모션</th>
                            <th style="padding:0.35rem 0.6rem;text-align:left;font-size:11px;color:#999;font-weight:600">시작</th>
                            <th style="padding:0.35rem 0.6rem;text-align:right;font-size:11px;color:#999;font-weight:600">기간 일평균</th>
                            <th style="padding:0.35rem 0.6rem;text-align:right;font-size:11px;color:#999;font-weight:600">평소 일평균</th>
                            <th style="padding:0.35rem 0.6rem;text-align:right;font-size:11px;color:#999;font-weight:600">증감률</th>
                        </tr></thead><tbody>${rows}</tbody>
                    </table>` : ''}
                </div>`;
            },

            toggleUpliftDetail(id) {
                const el = document.getElementById(id);
                if (el) el.style.display = el.style.display === 'none' ? 'table-row' : 'none';
            },

            // 진행 중 프로모션 분석 (현재까지 실적으로 일평균 추정 + 대처법)
            renderOngoingAnalysis(p, up, sd, ed, today) {
                // 경과 일수 / 전체 일수
                const dayMs = 86400000;
                const startD = new Date(sd + 'T00:00:00');
                const endD = new Date(ed + 'T00:00:00');
                const todayD = new Date(today + 'T00:00:00');
                const totalDays = Math.max(1, Math.round((endD - startD)/dayMs) + 1);
                const elapsedDays = Math.max(1, Math.round((todayD - startD)/dayMs) + 1);
                const remainDays = Math.max(0, totalDays - elapsedDays);
                // 현재까지 매출: uplift의 daily_avg_during은 완료 기준이라, 진행중엔 actual_sales(현재까지 누적)를 경과일로 나눔
                const sofar = (up && up.actual_sales != null && up.actual_sales > 0) ? Number(up.actual_sales) : null;
                const base = up ? ((up.baseline_1m != null) ? Number(up.baseline_1m) : (up.baseline_daily_avg != null ? Number(up.baseline_daily_avg) : null)) : null;

                let body;
                if (sofar == null) {
                    body = `<div style="font-size:12.5px;color:#5a7ba8;">아직 집계된 매출이 없습니다. 매출 데이터가 들어오면 일평균과 효율 분석이 표시됩니다.</div>`;
                } else {
                    const dailyNow = Math.round(sofar / elapsedDays);
                    const projectedTotal = dailyNow * totalDays;   // 현재 페이스 유지 시 예상 총매출
                    // 평소 대비
                    let pct = null;
                    if (base && base > 0) pct = Math.round(((dailyNow - base) / base) * 1000) / 10;
                    const pos = pct == null ? true : pct >= 0;
                    const color = pos ? '#1a9d55' : '#d23f3f';
                    // 대처법
                    let advice;
                    if (pct == null) {
                        advice = `평소 매출 기준선이 없어 효율 판단이 어렵습니다. 현재 일평균을 지켜보며 주력 상품 노출을 유지하세요.`;
                    } else if (pct >= 20) {
                        advice = `평소보다 매출이 잘 나오고 있습니다. 지금 잘 팔리는 상품의 노출·재고를 늘리고, 남은 ${remainDays}일 동안 상위 상품 푸시를 강화하세요.`;
                    } else if (pct >= 0) {
                        advice = `평소와 비슷하거나 소폭 높은 수준입니다. 반응 좋은 상품으로 구좌를 교체하거나 추가 쿠폰으로 막판 부스팅을 검토하세요.`;
                    } else {
                        advice = `평소보다 부진합니다. 남은 ${remainDays}일 동안 노출 상품 교체, 할인 폭 강화, 메인 배너·쿠폰 추가 등 즉시 대처가 필요합니다.`;
                    }
                    body = `
                    <div style="display:flex;gap:1.1rem;flex-wrap:wrap;margin-bottom:0.7rem;">
                        <div>
                            <div style="font-size:10.5px;color:#999;margin-bottom:0.15rem">현재 일평균<br>(${elapsedDays}일 경과)</div>
                            <div style="font-size:14px;font-weight:800;color:#333">₩${dailyNow.toLocaleString()}</div>
                        </div>
                        ${base ? `<div>
                            <div style="font-size:10.5px;color:#999;margin-bottom:0.15rem">평소 일평균<br>(직전 1개월)</div>
                            <div style="font-size:13px;font-weight:700;color:#555">₩${base.toLocaleString()}</div>
                        </div>` : ''}
                        ${pct != null ? `<div>
                            <div style="font-size:10.5px;color:#999;margin-bottom:0.15rem">평소 대비</div>
                            <div style="font-size:15px;font-weight:800;color:${color}">${pos?'+':''}${pct.toFixed(1)}%</div>
                        </div>` : ''}
                        <div>
                            <div style="font-size:10.5px;color:#999;margin-bottom:0.15rem">예상 총매출<br>(현재 페이스)</div>
                            <div style="font-size:13px;font-weight:700;color:#333">₩${projectedTotal.toLocaleString()}</div>
                        </div>
                    </div>
                    <div style="font-size:12px;line-height:1.55;color:#333;"><b style="color:${color}">현재 효율.</b> 현재 페이스라면 종료일까지 약 ₩${projectedTotal.toLocaleString()}이 예상됩니다${pct!=null?` (평소 대비 ${pos?'+':''}${pct.toFixed(1)}%)`:''}.</div>
                    <div style="font-size:12px;line-height:1.55;color:#333;margin-top:0.35rem;"><b style="color:#e8590c">지금 대처.</b> ${advice}</div>`;
                }
                return `
                <div class="form-group">
                    <div class="form-label">프로모션 효과 <span style="color:#e8590c;font-size:11px;font-weight:600">· 진행 중</span></div>
                    <div class="form-value" style="background:#fff7ed;border:1px solid #fde0c4;border-radius:8px;padding:0.8rem 0.95rem;">
                        <div style="font-size:12.5px;color:#9a5a1c;font-weight:600;margin-bottom:0.5rem;">🔥 아직 진행 중인 프로모션입니다 · ${elapsedDays}/${totalDays}일 경과 (${remainDays}일 남음)</div>
                        ${body}
                    </div>
                </div>`;
            },

            // ===== 다차원 진단: 증감률 + 목표달성 + 마진 + 규모를 종합 =====
            // 단순 증감률 한 축이 아니라 4개 축을 조합해 '왜 부진한지 + 어떻게 대처할지' 진단
            diagnosePromo(ctx) {
                // ctx: { pct, base, during, achieved, target, marginPct, orderCount, periodDays, channelKey }
                const { pct, achieved, target, marginPct, orderCount, periodDays, channelKey } = ctx;
                const reasons = [];   // 부진/특이 원인
                const actions = [];   // 대처법

                // 채널 수수료율(참고): 29cm 30, 무신사 25, 자사몰 15
                const feeRate = { '29cm':30, 'musinsa':25, 'own':15 }[channelKey];

                // 목표 달성도
                const goalRate = (target && target > 0) ? Math.round(achieved / target * 100) : null;

                // 1) 매출 견인(증감률) 축
                if (pct != null) {
                    if (pct < -5) {
                        reasons.push(`프로모션 기간 일평균 매출이 평소(직전 1개월)보다 ${Math.abs(pct).toFixed(0)}% 낮았습니다. 행사가 매출을 끌어올리지 못했다는 뜻입니다`);
                        actions.push(`직전 1개월에 더 강한 행사가 겹쳐 기준선이 높았을 수 있으니, 직전 행사 일정과 비교해 시기를 분산하세요`);
                    } else if (pct <= 5) {
                        reasons.push(`매출이 평소와 거의 같았습니다(증감 ${pct>=0?'+':''}${pct.toFixed(0)}%). 매출 견인 효과가 뚜렷하지 않았습니다`);
                        actions.push(`상품 구성·할인율·노출 위치 중 하나를 바꿔 변화를 만들고 효과를 비교해 보세요`);
                    }
                }

                // 2) 목표 달성도 축
                if (goalRate != null) {
                    if (goalRate < 70) {
                        reasons.push(`목표매출 대비 ${goalRate}%에 그쳐 목표를 크게 밑돌았습니다`);
                        actions.push(`목표가 평균×1.2로 설정돼 있다면, 이 유형·시기의 현실적 평균을 반영해 목표를 재설정하거나 주력 상품 노출을 늘리세요`);
                    } else if (goalRate < 100) {
                        reasons.push(`목표매출 대비 ${goalRate}%로 목표에 약간 못 미쳤습니다`);
                    }
                }

                // 3) 수익성(마진) 축 — 매출은 났는데 남는 게 적은 경우
                if (marginPct != null) {
                    if (marginPct < 0) {
                        reasons.push(`마진율이 ${marginPct.toFixed(0)}%로 적자 구간입니다. 할인 폭이 원가·수수료를 넘어섰습니다`);
                        actions.push(`할인율을 낮추거나, 마진이 확보되는 주력 상품 위주로 구성을 재편하세요`);
                    } else if (marginPct < 15) {
                        reasons.push(`마진율이 ${marginPct.toFixed(0)}%로 낮습니다${feeRate?` (${channelKey==='own'?'자사몰':channelKey==='musinsa'?'무신사':'29CM'} 수수료 ${feeRate}% 차감 후 기준)`:''}. 매출 규모 대비 실제 남는 이익이 적습니다`);
                        actions.push(`재고 소진이 목적이 아니라면 할인 폭을 단계적으로 줄여 마진을 회복할 여지가 있습니다`);
                    }
                }

                // 4) 거래 규모(객단가) 축 — 보조 지표
                let aov = null;
                if (orderCount && orderCount > 0 && achieved > 0) {
                    aov = Math.round(achieved / orderCount);
                }

                return { reasons, actions, goalRate, aov, feeRate };
            },

            // 개별 프로모션 증감 분석 카드 (캘린더 팝업용)
            renderPromoUpliftAnalysisLegacy(up) {
                const pct = (up.uplift_pct_1m != null) ? Number(up.uplift_pct_1m)
                          : (up.uplift_pct != null ? Number(up.uplift_pct) : null);
                const base = (up.baseline_1m != null) ? Number(up.baseline_1m)
                           : (up.baseline_daily_avg != null ? Number(up.baseline_daily_avg) : null);
                const during = (up.daily_avg_during != null) ? Number(up.daily_avg_during) : null;
                if (pct == null || base == null || during == null) return '';
                const pos = pct >= 0;
                const color = pos ? '#1a9d55' : '#d23f3f';
                const liftAmt = during - base;
                let verdict, advice;
                if (pct >= 30) {
                    verdict = `평소보다 매출이 크게 올랐습니다. 이 프로모션은 매출 견인 효과가 확실합니다.`;
                    advice = `핵심 프로모션으로 유지하고, 다음에도 비슷한 시기·구성으로 반복하세요. 노출 구좌나 할인 폭을 키워 규모를 더 확대해볼 만합니다.`;
                } else if (pct >= 5) {
                    verdict = `평소보다 매출이 소폭 올랐습니다. 완만한 플러스 효과가 있었습니다.`;
                    advice = `효과는 있으나 폭이 작습니다. 상품 구성·할인율·노출 위치를 조정해 상승 폭을 키워볼 여지가 있습니다.`;
                } else if (pct >= -5) {
                    verdict = `평소 매출과 거의 비슷했습니다. 매출 견인 효과가 뚜렷하지 않았습니다.`;
                    advice = `매출 증대보다 재고 소진·고객 유지 목적이라면 유지하되, 매출이 목표라면 시기나 상품 구성을 바꿔보는 것이 좋습니다.`;
                } else {
                    verdict = `프로모션 기간 매출이 평소보다 오히려 낮았습니다.`;
                    advice = `직전 1개월에 더 강한 프로모션이 있었거나, 비수기·상품 매력도 문제일 수 있습니다. 시기를 옮기거나 할인 폭·주력 상품을 재검토하세요.`;
                }
                return `<div style="background:#fafbfc;border:1px solid #eee;border-radius:8px;padding:0.9rem 1rem;margin-top:0.5rem">
                    <div style="display:flex;gap:1.1rem;flex-wrap:wrap;margin-bottom:0.7rem">
                        <div>
                            <div style="font-size:10.5px;color:#999;margin-bottom:0.15rem">평소 일평균<br>(직전 1개월)</div>
                            <div style="font-size:13px;font-weight:700;color:#555">₩${base.toLocaleString()}</div>
                        </div>
                        <div style="align-self:center;color:#bbb">→</div>
                        <div>
                            <div style="font-size:10.5px;color:#999;margin-bottom:0.15rem">프로모션 기간<br>일평균</div>
                            <div style="font-size:13px;font-weight:700;color:#333">₩${during.toLocaleString()}</div>
                        </div>
                        <div>
                            <div style="font-size:10.5px;color:#999;margin-bottom:0.15rem">일평균<br>증감</div>
                            <div style="font-size:13px;font-weight:700;color:${color}">${liftAmt>=0?'+':''}₩${liftAmt.toLocaleString()}</div>
                        </div>
                        <div>
                            <div style="font-size:10.5px;color:#999;margin-bottom:0.15rem">증감률</div>
                            <div style="font-size:16px;font-weight:800;color:${color}">${pos?'+':''}${pct.toFixed(1)}%</div>
                        </div>
                    </div>
                    <div style="font-size:12px;line-height:1.55;color:#333"><b style="color:${color}">해석.</b> ${verdict}</div>
                    <div style="font-size:12px;line-height:1.55;color:#333;margin-top:0.35rem"><b style="color:#2563a8">다음 운영 제안.</b> ${advice}</div>
                </div>`;
            },

            // 개별 프로모션 종합 분석 카드 (증감률 + 목표달성 + 마진 + 규모)
            renderPromoUpliftAnalysis(up, promo) {
                const pct = (up.uplift_pct_1m != null) ? Number(up.uplift_pct_1m)
                          : (up.uplift_pct != null ? Number(up.uplift_pct) : null);
                const base = (up.baseline_1m != null) ? Number(up.baseline_1m)
                           : (up.baseline_daily_avg != null ? Number(up.baseline_daily_avg) : null);
                const during = (up.daily_avg_during != null) ? Number(up.daily_avg_during) : null;
                const achieved = (up.actual_sales != null) ? Number(up.actual_sales) : 0;
                const marginPct = (up.margin_pct != null) ? Number(up.margin_pct) : null;
                const margin = (up.margin != null) ? Number(up.margin) : null;
                const settlement = (up.settlement_sales != null) ? Number(up.settlement_sales) : null;
                const orderCount = (up.order_count != null) ? Number(up.order_count) : null;
                const periodDays = (up.period_days != null) ? Number(up.period_days) : null;

                // 목표매출 (브라우저 저장값 우선)
                const channelKey = promo ? promo.key : null;
                const savedTarget = promo ? this.getTargetOverride(promo.id) : null;
                const avgSales = promo ? this.avgSalesForPromo(promo) : null;
                const suggested = (avgSales != null && avgSales > 0) ? Math.round(avgSales * 1.2) : null;
                const target = (savedTarget != null) ? savedTarget
                             : ((promo && promo.target > 0) ? promo.target : (suggested || 0));

                // 증감 데이터가 아예 없으면(글로벌 등) 마진만이라도 보여줌
                const hasUplift = (pct != null && base != null && during != null);

                const dg = this.diagnosePromo({ pct, base, during, achieved, target, marginPct, orderCount, periodDays, channelKey });
                const pos = (pct != null && pct >= 0);
                const color = pos ? '#1a9d55' : '#d23f3f';

                // 종합 한줄 판정
                let headline, hcolor;
                if (dg.goalRate != null && dg.goalRate >= 100 && (pct == null || pct >= 5)) {
                    headline = '목표 달성 · 매출 견인 효과 확인'; hcolor = '#1a9d55';
                } else if (dg.reasons.length === 0) {
                    headline = '정상 범위'; hcolor = '#1a9d55';
                } else if (dg.goalRate != null && dg.goalRate < 70) {
                    headline = '목표 부진 — 점검 필요'; hcolor = '#d23f3f';
                } else {
                    headline = '개선 여지 있음'; hcolor = '#e08a1e';
                }

                // 지표 칩들
                let chips = '';
                if (hasUplift) {
                    chips += `<div><div style="font-size:10.5px;color:#999;margin-bottom:0.15rem">평소 일평균<br>(직전 1개월)</div><div style="font-size:13px;font-weight:700;color:#555">₩${base.toLocaleString()}</div></div>
                    <div style="align-self:center;color:#bbb">→</div>
                    <div><div style="font-size:10.5px;color:#999;margin-bottom:0.15rem">기간 일평균</div><div style="font-size:13px;font-weight:700;color:#333">₩${during.toLocaleString()}</div></div>
                    <div><div style="font-size:10.5px;color:#999;margin-bottom:0.15rem">증감률</div><div style="font-size:16px;font-weight:800;color:${color}">${pos?'+':''}${pct.toFixed(1)}%</div></div>`;
                }
                if (dg.goalRate != null) {
                    const gc = dg.goalRate >= 100 ? '#1a9d55' : (dg.goalRate >= 70 ? '#e08a1e' : '#d23f3f');
                    chips += `<div><div style="font-size:10.5px;color:#999;margin-bottom:0.15rem">목표 달성도</div><div style="font-size:14px;font-weight:800;color:${gc}">${dg.goalRate}%</div></div>`;
                }
                if (marginPct != null) {
                    const mc = marginPct >= 15 ? '#1a9d55' : (marginPct >= 0 ? '#e08a1e' : '#d23f3f');
                    chips += `<div><div style="font-size:10.5px;color:#999;margin-bottom:0.15rem">마진율<br><span style="font-size:9px">(정산-원가)/매출</span></div><div style="font-size:14px;font-weight:800;color:${mc}">${marginPct.toFixed(1)}%</div></div>`;
                }
                if (margin != null && margin !== 0) {
                    chips += `<div><div style="font-size:10.5px;color:#999;margin-bottom:0.15rem">마진액</div><div style="font-size:13px;font-weight:700;color:#555">₩${margin.toLocaleString()}</div></div>`;
                }
                if (dg.aov != null) {
                    chips += `<div><div style="font-size:10.5px;color:#999;margin-bottom:0.15rem">객단가<br><span style="font-size:9px">(${orderCount.toLocaleString()}건)</span></div><div style="font-size:13px;font-weight:700;color:#555">₩${dg.aov.toLocaleString()}</div></div>`;
                }

                // 진단/대처 문장 (없으면 긍정 메시지)
                const reasonHtml = dg.reasons.length
                    ? dg.reasons.map(r => `· ${r}`).join('<br>')
                    : '특이 부진 요인이 발견되지 않았습니다. 매출·목표·마진이 모두 정상 범위입니다.';
                const actionHtml = dg.actions.length
                    ? dg.actions.map(a => `· ${a}`).join('<br>')
                    : '현재 구성을 유지하고, 다음 동일 시기에 반복 운영을 권장합니다.';

                if (!hasUplift && marginPct == null && dg.goalRate == null) return '';

                return `<div style="background:#fafbfc;border:1px solid #eee;border-radius:8px;padding:0.9rem 1rem;margin-top:0.5rem">
                    <div style="display:inline-block;font-size:11px;font-weight:700;color:#fff;background:${hcolor};padding:0.15rem 0.6rem;border-radius:999px;margin-bottom:0.7rem">${headline}</div>
                    <div style="display:flex;gap:1.1rem;flex-wrap:wrap;margin-bottom:0.75rem">${chips}</div>
                    <div style="font-size:12px;line-height:1.6;color:#333"><b style="color:${hcolor}">진단.</b><br>${reasonHtml}</div>
                    <div style="font-size:12px;line-height:1.6;color:#333;margin-top:0.5rem"><b style="color:#2563a8">대처 방법.</b><br>${actionHtml}</div>
                </div>`;
            },

            // 특정 프로모션과 같은 채널+유형의 평균매출 (저장 분석에서 조회)
            avgSalesForPromo(p) {
                if (!this.savedAnalysis || !p) return null;
                const type = this.extractType(p.name);
                const row = this.savedAnalysis.find(r => r.channel === p.key && r.promo_type === type);
                return row && row.avg_sales != null ? Number(row.avg_sales) : null;
            },

            // 목표매출 입력란 천단위 콤마 자동 포맷 (커서 위치 유지)
            formatTargetInput(el) {
                const prevLen = el.value.length;
                const prevPos = el.selectionStart;
                const digits = el.value.replace(/[^\d]/g, '');
                const formatted = digits ? Number(digits).toLocaleString() : '';
                el.value = formatted;
                // 콤마 추가/제거로 길이가 바뀐 만큼 커서 위치 보정
                const diff = formatted.length - prevLen;
                const newPos = Math.max(0, (prevPos || 0) + diff);
                try { el.setSelectionRange(newPos, newPos); } catch (e) {}
            },

            // ===== 목표매출 로컬 저장 (브라우저 전용·Supabase 미사용) =====
            // 평균×1.2 자동 제안값이 기본. 사용자가 수정·저장하면 이 브라우저에 한해 유지됨.
            loadTargetOverrides() {
                try {
                    const saved = localStorage.getItem('promoTargets');
                    return saved ? JSON.parse(saved) : {};
                } catch (e) { return {}; }
            },

            getTargetOverride(promoId) {
                const m = this.loadTargetOverrides();
                const v = m[promoId];
                return (v != null && Number(v) > 0) ? Number(v) : null;
            },

            // 팝업 목표매출 입력칸의 현재 값을 이 브라우저에 저장
            saveTargetOverride(promoId) {
                const el = document.getElementById('inp-target');
                if (!el) return;
                const digits = el.value.replace(/[^\d]/g, '');
                const val = digits ? Number(digits) : 0;
                const m = this.loadTargetOverrides();
                if (val > 0) { m[promoId] = val; }
                else { delete m[promoId]; }   // 0이면 자동제안값으로 되돌림
                try {
                    localStorage.setItem('promoTargets', JSON.stringify(m));
                } catch (e) {
                    alert('목표매출 저장에 실패했습니다.');
                    return;
                }
                // 저장 피드백
                const status = document.getElementById('targetSaveStatus');
                if (status) {
                    status.textContent = val > 0 ? '✓ 저장됨' : '✓ 자동제안값으로 복원';
                    status.style.color = '#1a9d55';
                    setTimeout(() => { if (status) status.textContent = ''; }, 2500);
                }
            },

            // 저장 요약 → groupArr 형태로 변환 (효율표/그래프 즉시 렌더용)
            savedGroupsFor(ch) {
                if (!this.savedAnalysis) return null;
                const rows = this.savedAnalysis.filter(r => ch === 'all' || r.channel === ch);
                return rows.map(r => {
                    // 같은 채널+유형의 실제 프로모션들 (증감률 계산용 — upliftMap만 있으면 즉시 계산됨)
                    const items = this.data.filter(p =>
                        p.key === r.channel && this.extractType(p.name) === r.promo_type
                    );
                    return {
                        key: r.channel + '::' + r.promo_type,
                        platform: this.platName(r.channel),
                        platformKey: r.channel,
                        type: r.promo_type,
                        items: items,
                        count: r.run_count || 0,
                        salesCount: r.sales_count || 0,
                        runCount: r.run_count || 0,
                        achieveRate: null,
                        totalSales: Number(r.total_sales) || 0,
                        avgSales: Number(r.avg_sales) || 0,
                        maxSales: Number(r.max_sales) || 0,
                        minSales: Number(r.min_sales) || 0,
                        stdev: Number(r.stdev_sales) || 0,
                        firstStart: r.first_date || '',
                        topName: r.top_promo_name || ''
                    };
                });
            },

            async loadDailySales() {
                if (this.dailySalesLoaded) return true;
                if (!supabaseClient) { await new Promise(r=>setTimeout(r,800)); return this.loadDailySales(); }
                try {
                    // View는 ~수천행이므로 페이지네이션으로 전부 가져옴
                    let all = [], from = 0, page = 1000;
                    while (true) {
                        const { data, error } = await supabaseClient
                            .from('vlvd_daily_sales')
                            .select('channel,sale_date,revenue')
                            .range(from, from + page - 1);
                        if (error) { console.error('일별매출 로드 오류:', error); this.dailySales = []; return false; }
                        if (!data || data.length === 0) break;
                        all = all.concat(data);
                        if (data.length < page) break;
                        from += page;
                        if (from > 100000) break; // 안전장치
                    }
                    // 채널키별로 {date: revenue} 맵 구성
                    const map = { 'musinsa':{}, '29cm':{}, 'own':{} };
                    all.forEach(r => {
                        const k = this.channelToKey[r.channel];
                        if (!k) return;
                        const d = (r.sale_date || '').slice(0,10);
                        map[k][d] = (map[k][d] || 0) + (Number(r.revenue) || 0);
                    });
                    this.dailySalesMap = map;
                    this.dailySales = all;
                    this.dailySalesLoaded = true;
                    console.log('✓ 실제 매출 로드: ' + all.length + '일치 (채널×날짜)');
                    return true;
                } catch (err) {
                    console.error('일별매출 로드 예외:', err);
                    this.dailySales = []; return false;
                }
            },

            // 한 프로모션의 실제 매출 = 채널 일치 + 기간 내 일별매출 합산
            actualSalesFor(promo) {
                if (!this.dailySalesMap) return 0;
                const k = promo.key;
                const m = this.dailySalesMap[k];
                if (!m) return 0; // 글로벌 등 매출소스 없는 채널
                const start = (promo.start || '').slice(0,10);
                const end = (promo.end || '').slice(0,10);
                if (!start || !end) return 0;
                let sum = 0;
                for (const d in m) {
                    if (d >= start && d <= end) sum += m[d];
                }
                return Math.round(sum);
            },

            // data 배열의 각 프로모션에 actualSales 채우기
            applyActualSales() {
                if (!this.dailySalesMap) return;
                this.data.forEach(p => {
                    p.actualSales = this.actualSalesFor(p);
                });
            },

            // 데이터를 플랫폼+유형으로 그룹화
            buildGroups(srcData) {
                const src = srcData || this.data;
                const groups = {};
                src.forEach(p => {
                    const type = this.extractType(p.name);
                    const key = (p.key || 'other') + '::' + type;
                    if (!groups[key]) {
                        groups[key] = { key, platform: p.platform, platformKey: p.key || 'other',
                            type, items: [] };
                    }
                    groups[key].items.push(p);
                });
                // 통계 계산 (실제매출 우선: actualSales가 있으면 그걸, 없으면 수동 sales)
                const eff = (i) => (i.actualSales != null && i.actualSales > 0) ? i.actualSales : (i.sales || 0);
                Object.values(groups).forEach(g => {
                    const withSales = g.items.filter(i => eff(i) > 0);
                    g.count = g.items.length;
                    g.salesCount = withSales.length;
                    g.totalSales = g.items.reduce((s,i)=>s+eff(i),0);
                    g.avgSales = withSales.length ? Math.round(g.totalSales / withSales.length) : 0;
                    g.totalTarget = g.items.reduce((s,i)=>s+(i.target||0),0);
                    // 목표 대비 달성률 (목표가 있는 건만)
                    const withTarget = g.items.filter(i => (i.target||0) > 0);
                    if (withTarget.length) {
                        const ach = withTarget.reduce((s,i)=>s+eff(i),0);
                        const tgt = withTarget.reduce((s,i)=>s+(i.target||0),0);
                        g.achieveRate = tgt ? Math.round(ach/tgt*100) : null;
                    } else g.achieveRate = null;
                    // 매출 표준편차 (변동성)
                    if (withSales.length > 1) {
                        const mean = g.avgSales;
                        const variance = withSales.reduce((s,i)=>s+Math.pow(eff(i)-mean,2),0)/withSales.length;
                        g.stdev = Math.round(Math.sqrt(variance));
                    } else g.stdev = 0;
                    // 그룹 대표 시작일(가장 이른 것)
                    g.firstStart = g.items.reduce((m,i)=> (!m || (i.start && i.start < m)) ? i.start : m, null) || '';
                });
                return groups;
            },

            platColor(key) {
                return this.colors[key] || '#888';
            },
            platName(key) {
                return {'29cm':'29CM','musinsa':'무신사','own':'자사몰','global':'글로벌'}[key] || '기타';
            },

            // 채널 탭 / 정렬 전환
            setAnalysisChannel(ch) { this.analysisChannel = ch; this.renderAnalysis(); },
            setAnalysisSort(s) { this.analysisSort = s; this.renderAnalysis(); },

            // 기간 프리셋
            setAnalysisPreset(preset) {
                this.analysisPreset = preset;
                const today = this.todayStr || new Date().toISOString().slice(0,10);
                const y = parseInt(today.slice(0,4),10);
                if (preset === 'all') { this.analysisFrom=''; this.analysisTo=''; }
                else if (preset === 'year') { this.analysisFrom = y+'-01-01'; this.analysisTo = y+'-12-31'; }
                else if (preset === '3m') {
                    const d = new Date(today+'T00:00:00'); d.setMonth(d.getMonth()-3);
                    this.analysisFrom = d.toISOString().slice(0,10); this.analysisTo = today;
                }
                this.renderAnalysis();
            },
            // 직접 날짜 변경
            setAnalysisDate(which, val) {
                if (which==='from') this.analysisFrom = val; else this.analysisTo = val;
                this.analysisPreset = 'custom';
                this.renderAnalysis();
            },
            // 프로모션이 선택 기간(시작일 기준)에 포함되는지
            inPeriod(p) {
                const s = (p.start||'').slice(0,10);
                if (this.analysisFrom && s < this.analysisFrom) return false;
                if (this.analysisTo && s > this.analysisTo) return false;
                return true;
            },

            async renderAnalysis() {
                const wrap = document.getElementById('analysisWrap');
                // 1차: 저장된 요약으로 즉시 렌더 (빠름). 원천 매출이 아직이면 저장본 사용.
                if (!this.dailySalesLoaded) {
                    if (wrap) wrap.innerHTML = '<div class="ana-empty">분석 데이터를 불러오는 중...</div>';
                    // 저장 요약 + 증감률(uplift) 함께 로드 — 둘 다 가벼워서 빠름
                    await Promise.all([this.loadSavedAnalysis(), this.loadUplift()]);
                    if (this.savedAnalysisLoaded) {
                        this.renderAnalysisBody();   // 저장본+증감률로 즉시 표시
                    }
                    // 2차: 원천 매출을 백그라운드로 로드 후 완전판 재렌더 (드릴다운/예측 포함)
                    this.loadDailySales().then(() => {
                        this.applyActualSales();
                        // 현재도 분석 페이지를 보고 있을 때만 재렌더
                        const ap = document.getElementById('page-analysis');
                        if (ap && ap.classList.contains('active')) this.renderAnalysisBody();
                    });
                    return;
                }
                // 이미 원천이 로드된 상태(탭/기간 전환 등)면 바로 완전판 렌더
                this.applyActualSales();
                this.renderAnalysisBody();
            },

            renderAnalysisBody() {
                const wrap = document.getElementById('analysisWrap');
                // 원천 로드 완료 여부에 따라 데이터 소스 결정
                const useSaved = !this.dailySalesLoaded && this.savedAnalysisLoaded;

                const eff = (p) => (p.actualSales != null && p.actualSales > 0) ? p.actualSales : (p.sales || 0);
                const ch = this.analysisChannel;

                // 선택 채널 + 선택 기간으로 데이터 한정
                const scopeData = this.data.filter(p =>
                    (ch === 'all' || p.key === ch) && this.inPeriod(p)
                );

                // 채널 탭 + 기간 + 정렬 토글 바
                const chTabs = [['all','전체'],['musinsa','무신사'],['29cm','29CM'],['own','자사몰']];
                const presets = [['all','전체'],['year','올해'],['3m','최근3개월']];
                const savedNote = useSaved
                    ? `<div class="saved-note">⚡ 저장된 분석값으로 빠르게 표시 중 · 세부(드릴다운·예측)는 잠시 후 자동 갱신${this.savedAnalysisUpdatedAt ? ' · 갱신 '+(this.savedAnalysisUpdatedAt||'').slice(0,10) : ''}</div>`
                    : '';
                let html = savedNote + `<div class="analysis-topbar">
                    <div class="ch-tabs">` +
                    chTabs.map(([k,label]) => `<button class="ch-tab ${ch===k?'active':''}" onclick="cal.setAnalysisChannel('${k}')">${label}</button>`).join('') +
                    `</div>
                    <div class="sort-toggle">
                        <button class="sort-btn ${this.analysisSort==='sales'?'active':''}" onclick="cal.setAnalysisSort('sales')">매출순</button>
                        <button class="sort-btn ${this.analysisSort==='date'?'active':''}" onclick="cal.setAnalysisSort('date')">기간순</button>
                    </div>
                </div>
                <div class="period-bar">
                    <span class="period-label">기간</span>
                    <div class="period-presets">` +
                    presets.map(([k,label]) => `<button class="period-btn ${this.analysisPreset===k?'active':''}" onclick="cal.setAnalysisPreset('${k}')">${label}</button>`).join('') +
                    `</div>
                    <div class="period-dates">
                        <input type="date" class="period-input" value="${this.analysisFrom}" onchange="cal.setAnalysisDate('from', this.value)">
                        <span style="color:var(--ink-faint)">~</span>
                        <input type="date" class="period-input" value="${this.analysisTo}" onchange="cal.setAnalysisDate('to', this.value)">
                    </div>
                    ${(this.analysisFrom||this.analysisTo) ? `<span class="period-active">${this.analysisFrom||'처음'} ~ ${this.analysisTo||'현재'}</span>` : '<span class="period-active">전체 기간</span>'}
                </div>`;

                // 그룹화: 원천 로드 전이면 저장본, 후면 실데이터
                let groupArr;
                if (useSaved) {
                    groupArr = this.savedGroupsFor(ch) || [];
                    // 기간 필터가 걸려 있으면 저장본(전체기간 집계)은 부정확하므로 안내
                } else {
                    groupArr = Object.values(this.buildGroups(scopeData));
                }

                // 전체 통계 (스코프 기준)
                const withSales = useSaved
                    ? groupArr.filter(g => g.salesCount > 0)
                    : scopeData.filter(p => eff(p) > 0);
                const totalSales = useSaved
                    ? groupArr.reduce((s,g)=>s+g.totalSales,0)
                    : scopeData.reduce((s,p)=>s+eff(p),0);
                const avgSales = useSaved
                    ? (groupArr.length ? Math.round(groupArr.reduce((s,g)=>s+g.avgSales,0)/groupArr.length) : 0)
                    : (withSales.length ? Math.round(totalSales/withSales.length) : 0);
                const totalPromos = useSaved
                    ? groupArr.reduce((s,g)=>s+g.runCount,0)
                    : scopeData.length;
                const chLabel = (chTabs.find(t=>t[0]===ch)||['','전체'])[1];

                if (withSales.length === 0) {
                    html += `<div class="analysis-section" style="border-color:#ffe9b0; background:#fffdf5;">
                        <h2>⚠️ ${chLabel} 매출 데이터 없음</h2>
                        <div class="sub" style="margin-bottom:0;">선택한 채널·기간에 매칭된 실제 매출이 없습니다.
                        기간을 넓히거나 다른 채널을 선택해보세요.</div>
                    </div>`;
                }

                // --- 1. 효율 분석 + 그래프 ---
                html += `<div class="analysis-section">
                    <h2>📊 ${chLabel} 프로모션 효율 분석</h2>
                    <div class="sub">실제 판매 데이터(취소·교환 제외, 판매가 기준)를 프로모션 기간에 매칭해 집계합니다.
                    ${this.analysisSort==='sales' ? '매출이 높은 순으로 정렬됩니다.' : '프로모션 시작일 순으로 정렬됩니다.'}</div>
                    <div class="stat-cards">
                        <div class="stat-card"><div class="label">총 프로모션</div><div class="value">${totalPromos}건</div></div>
                        <div class="stat-card"><div class="label">매출 발생 건수</div><div class="value">${withSales.length}건</div></div>
                        <div class="stat-card"><div class="label">누적 매출</div><div class="value small">₩${totalSales.toLocaleString()}</div></div>
                        <div class="stat-card"><div class="label">건당 평균 매출</div><div class="value small">₩${avgSales.toLocaleString()}</div></div>
                    </div>`;

                // 효율 순위 (그룹 단위) - 그래프와 테이블이 동일 데이터 사용
                const ranked = groupArr.filter(g => g.salesCount > 0);
                if (this.analysisSort === 'sales') ranked.sort((a,b)=>b.avgSales-a.avgSales);
                else ranked.sort((a,b)=>{ const as=a.firstStart||'', bs=b.firstStart||''; return as>bs?1:as<bs?-1:0; });

                // 그래프: 그룹의 평균매출을 막대/선으로 (테이블과 일치)
                const chartTop = ranked.slice(0, 60).map(g => ({
                    name: g.type, base: g.type, key: g.platformKey, start: (g.firstStart||'').slice(0,10), val: g.avgSales
                }));
                html += this.renderChart(chartTop, this.analysisSort);

                // 드릴다운 패널 (막대 클릭 시 여기에 표시)
                html += useSaved
                    ? `<div id="drilldownPanel"></div><div class="ana-empty" style="margin-top:0.5rem">막대 클릭(계층 드릴다운)은 세부 데이터 로딩 후 사용할 수 있습니다…</div>`
                    : `<div id="drilldownPanel"></div>`;

                if (ranked.length) {
                    const maxAvg = Math.max(...ranked.map(g=>g.avgSales)) || 1;
                    html += `<div class="table-scroll"><table class="ana-table align-left">
                        <thead><tr>
                            ${ch==='all'?'<th>플랫폼</th>':''}<th>프로모션 유형</th>
                            <th class="num">총매출</th>
                            <th class="num">평균매출</th>
                            <th class="num">다음 기대매출</th>
                            <th>효율</th>
                            <th class="num">평균 증감률</th>
                            <th class="num">진행</th><th class="num">매출발생</th>
                        </tr></thead><tbody>`;
                    ranked.forEach((g, idx) => {
                        const barW = Math.round((g.avgSales/maxAvg)*100);
                        const avgUp = this.avgUpliftForGroup(g);
                        const colspan = ch==='all' ? 9 : 8;
                        let upCell = '<span style="color:#bbb">-</span>';
                        if (avgUp != null) {
                            const pos = avgUp >= 0;
                            upCell = `<span class="uplift-clickable" style="color:${pos?'#1a9d55':'#d23f3f'};font-weight:700;cursor:pointer;border-bottom:1px dashed currentColor">${pos?'+':''}${avgUp.toFixed(1)}% <span style="font-size:10px">▾</span></span>`;
                        }
                        html += `<tr ${avgUp!=null?`class="uplift-row" onclick="cal.toggleUpliftDetail('upd${idx}')" style="cursor:pointer"`:''}>
                            ${ch==='all'?`<td><span class="badge" style="background:${this.platColor(g.platformKey)}">${this.platName(g.platformKey)}</span></td>`:''}
                            <td>${g.type}</td>
                            <td class="num">₩${(g.totalSales||0).toLocaleString()}</td>
                            <td class="num">₩${g.avgSales.toLocaleString()}</td>
                            <td class="num">₩${g.avgSales.toLocaleString()}</td>
                            <td><div class="bar-track"><div class="bar-fill" style="width:${barW}%;background:${this.platColor(g.platformKey)}"></div></div></td>
                            <td class="num">${upCell}</td>
                            <td class="num">${g.count}</td>
                            <td class="num">${g.salesCount}</td>
                        </tr>`;
                        // 증감률 분석 펼침 행 (숨김)
                        if (avgUp != null) {
                            const a = this.upliftAnalysisForGroup(g);
                            html += `<tr class="uplift-detail" id="upd${idx}" style="display:none"><td colspan="${colspan}" style="padding:0;background:#fafbfc">${this.renderUpliftAnalysis(g, a)}</td></tr>`;
                        }
                    });
                    html += `</tbody></table></div>`;
                } else {
                    html += `<div class="ana-empty">매출이 발생한 프로모션이 없습니다.</div>`;
                }
                html += `</div>`;

                // --- 예정(미진행) 프로모션 기대 매출 예측 ---
                // --- 예정/시즌 예측 + 기대매출 측정: 원천 매출 필요 ---
                if (useSaved) {
                    html += `<div class="analysis-section">
                        <div class="ana-empty">📊 예정 프로모션 기대매출 · 시즌 예측 · 반복 그룹 분석은
                        세부 매출 데이터를 불러온 뒤 자동으로 표시됩니다…</div>
                    </div>`;
                } else {
                // 예정/시즌 예측은 미래 기준이라 기간 필터와 무관 (채널만 적용)
                const channelData = this.data.filter(p => ch === 'all' || p.key === ch);
                html += this.renderUpcomingForecast(channelData, Object.values(this.buildGroups(channelData)), chLabel);

                // --- 다가오는 시즌 예측 (작년 같은 달 패턴) ---
                html += this.renderSeasonForecast(channelData, chLabel);
                } // end if(!useSaved) 예측 섹션

                document.getElementById('analysisWrap').innerHTML = html;
                this.attachChartDrag();
            },

            // 차트 가로 드래그 스크롤
            attachChartDrag() {
                const el = document.getElementById('chartScroll');
                if (!el) return;
                let down = false, startX = 0, startScroll = 0;
                el.addEventListener('mousedown', (e)=>{ down = true; startX = e.pageX; startScroll = el.scrollLeft; });
                window.addEventListener('mouseup', ()=>{ down = false; });
                el.addEventListener('mousemove', (e)=>{ if(!down) return; e.preventDefault(); el.scrollLeft = startScroll - (e.pageX - startX); });
                // 세로 휠 → 가로 스크롤
                el.addEventListener('wheel', (e)=>{ if (Math.abs(e.deltaY) > Math.abs(e.deltaX)) { el.scrollLeft += e.deltaY; e.preventDefault(); } }, { passive: false });
            },

            // SVG 그래프 렌더 (sales=막대, date=선)
            renderChart(items, sort) {
                if (!items || items.length === 0) {
                    return `<div class="chart-box ana-empty">표시할 매출 데이터가 없습니다.</div>`;
                }
                const H = 300, padT = 20, padB = 90;
                const plotH = H - padT - padB;
                const maxVal = Math.max(...items.map(i=>i.val)) || 1;
                const fmt = (v)=> v>=100000000 ? (v/100000000).toFixed(1)+'억' : v>=10000 ? Math.round(v/10000)+'만' : Math.round(v).toLocaleString();
                const n = items.length;
                const SLOT = 84;                 // 항목당 가로 폭(px)
                const plotW = SLOT * n;          // 스크롤 영역 전체 폭
                const yAxisW = 64;               // 고정 y축 폭
                const visible = 10;              // 한 화면에 보일 개수 기준

                // 고정 y축 SVG
                let yAxis = `<svg width="${yAxisW}" height="${H}" style="flex:0 0 ${yAxisW}px;">`;
                for (let t=0;t<=4;t++){
                    const y = padT + plotH*(1-t/4);
                    yAxis += `<text x="${yAxisW-8}" y="${y+4}" text-anchor="end" font-size="11" fill="var(--ink-faint)">${fmt(maxVal*t/4)}</text>`;
                }
                yAxis += `</svg>`;

                // 스크롤되는 플롯 SVG
                let plot = `<svg width="${plotW}" height="${H}" style="display:block;">`;
                // 가이드라인
                for (let t=0;t<=4;t++){
                    const y = padT + plotH*(1-t/4);
                    plot += `<line x1="0" y1="${y}" x2="${plotW}" y2="${y}" stroke="var(--line-soft)" stroke-width="1"/>`;
                }
                if (sort === 'sales') {
                    items.forEach((it,i)=>{
                        const bw = 40;
                        const cx = SLOT*i + SLOT/2;
                        const x = cx - bw/2;
                        const bh = plotH * (it.val/maxVal);
                        const y = padT + plotH - bh;
                        const col = this.platColor(it.key);
                        const clickable = it.base ? ` style="cursor:pointer" onclick="cal.drillDown('${this.esc(it.base).replace(/'/g,"")}')"` : '';
                        plot += `<rect x="${x}" y="${y}" width="${bw}" height="${bh}" rx="3" fill="${col}"${clickable}><title>${this.esc(it.name)}: ₩${it.val.toLocaleString()}${it.base?' (클릭하여 세부 분석)':''}</title></rect>`;
                        const lbl = it.name.length>7 ? it.name.slice(0,7)+'…' : it.name;
                        plot += `<text x="${cx}" y="${H-padB+18}" text-anchor="end" font-size="10.5" fill="var(--ink-faint)" transform="rotate(-40 ${cx} ${H-padB+18})">${this.esc(lbl)}</text>`;
                    });
                } else {
                    const pts = items.map((it,i)=>{
                        const x = SLOT*i + SLOT/2;
                        const y = padT + plotH - plotH*(it.val/maxVal);
                        return [x,y,it];
                    });
                    plot += `<path d="${pts.map((p,i)=>(i===0?'M':'L')+p[0]+' '+p[1]).join(' ')}" fill="none" stroke="var(--ink)" stroke-width="2"/>`;
                    pts.forEach(p=>{
                        plot += `<circle cx="${p[0]}" cy="${p[1]}" r="4" fill="${this.platColor(p[2].key)}"><title>${this.esc(p[2].name)} (${p[2].start}): ₩${p[2].val.toLocaleString()}</title></circle>`;
                        const dlbl = (p[2].start||'').slice(2).replace(/-/g,'.'); // YYYY-MM-DD → YY.MM.DD
                        plot += `<text x="${p[0]}" y="${H-padB+18}" text-anchor="end" font-size="10.5" fill="var(--ink-faint)" transform="rotate(-40 ${p[0]} ${H-padB+18})">${dlbl}</text>`;
                    });
                }
                plot += `</svg>`;

                const hint = n > visible ? `<div class="chart-hint">← 좌우로 드래그하거나 스크롤해서 전체 ${n}개를 확인하세요 →</div>` : '';
                // 고정 y축 + 스크롤 플롯
                return `<div class="chart-box">
                    ${hint}
                    <div class="chart-flex">
                        <div class="chart-yaxis">${yAxis}</div>
                        <div class="chart-scroll" id="chartScroll">${plot}</div>
                    </div>
                </div>`;
            },

            esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); },

            // 그래프 막대 클릭 → 대분류 아래 부수/기간한정 드릴다운
            drillDown(base) {
                const panel = document.getElementById('drilldownPanel');
                if (!panel) return;
                const ch = this.analysisChannel;
                const eff = (p) => (p.actualSales != null && p.actualSales > 0) ? p.actualSales : (p.sales || 0);
                // base 키워드를 이름에 포함하는 프로모션을 모으되,
                // base와 무관한 '독립 대표유형'으로 분류되는 건 제외한다.
                // 규칙: 프로모션의 대표유형(extractType)이
                //   (a) base 자신이거나
                //   (b) base의 기간한정 변형(타임세일/하루특가)일 때만 포함.
                // → '특가' 드릴다운에서 '주말특가'(독립 유형)는 빠지고,
                //    '블랙프라이데이' 드릴다운에서 '블랙프라이데이 타임세일'은 포함됨.
                const norm = (s)=> (s||'').toLowerCase().replace(/블프/g,'블랙프라이데이').replace(/\s/g,'');
                const baseN = norm(base);
                const limitedTypes = ['타임세일','하루특가'];
                const members = this.data.filter(p => {
                    if (ch !== 'all' && p.key !== ch) return false;
                    if (!this.inPeriod(p)) return false;
                    const nn = norm(p.name);
                    if (!nn.includes(baseN)) return false;
                    const t = this.extractType(p.name);
                    if (t === base) return true;                          // 본체/시즌
                    if (limitedTypes.includes(t) && nn.includes(baseN)) return true; // base의 기간한정 변형
                    return false;                                          // 그 외 독립 유형 제외
                });
                if (members.length === 0) { panel.innerHTML = ''; return; }

                // 계층별로 분류 (base 기준으로 level 판정)
                const tiers = { 1: [], 2: [], 3: [] };
                members.forEach(p => {
                    const nn = (p.name||'').toLowerCase().replace(/블프/g,'블랙프라이데이');
                    let season = null;
                    if (/여름|summer/.test(nn)) season='여름';
                    else if (/겨울|winter/.test(nn)) season='겨울';
                    else if (/봄|spring/.test(nn)) season='봄';
                    else if (/가을|fall|autumn/.test(nn)) season='가을';
                    const isLimited = ['타임세일','하루특가','타임'].some(k=>nn.replace(/\s/g,'').includes(k));
                    let level = 1;
                    if (isLimited) level = 3;
                    else if (season) level = 2;
                    tiers[level].push({ p, season, val: eff(p) });
                });
                const tierMeta = [
                    { lv:1, label:'🎯 큰 프로모션 (본체)', desc:'시즌·기간 구분 없는 메인 행사' },
                    { lv:2, label:'🌤️ 부수 프로젝트 (시즌별)', desc:'여름·겨울 등 시즌 단위' },
                    { lv:3, label:'⏱️ 기간 한정 (타임세일)', desc:'타임세일·하루특가 등 단기' },
                ];
                const sum = (arr)=>arr.reduce((s,x)=>s+x.val,0);
                const totalAll = sum([...tiers[1],...tiers[2],...tiers[3]]);

                let html = `<div class="drilldown">
                    <div class="drilldown-head">
                        <div><span class="dd-badge" style="background:${this.platColor(ch==='all'?'global':ch)}">${this.esc(base)}</span>
                        <span class="dd-title">계층별 세부 분석</span></div>
                        <button class="dd-close" onclick="document.getElementById('drilldownPanel').innerHTML=''">✕ 닫기</button>
                    </div>
                    <div class="dd-summary">전체 ${members.length}건 · 합계 매출 ₩${totalAll.toLocaleString()}</div>`;

                tierMeta.forEach(tm => {
                    const list = tiers[tm.lv];
                    if (!list.length) return;
                    list.sort((a,b)=>b.val-a.val);
                    const tierSum = sum(list);
                    const withSales = list.filter(x=>x.val>0);
                    const avg = withSales.length ? Math.round(tierSum/withSales.length) : 0;
                    html += `<div class="dd-tier">
                        <div class="dd-tier-head">
                            <div><strong>${tm.label}</strong> <span style="color:var(--ink-faint);font-size:12px">${tm.desc}</span></div>
                            <div class="dd-tier-stat">${list.length}건 · 평균 ₩${avg.toLocaleString()}</div>
                        </div>
                        <table class="ana-table"><tbody>`;
                    list.forEach(x => {
                        html += `<tr>
                            <td style="width:48%">${this.esc(x.p.name)}</td>
                            <td style="color:#999">${(x.p.start||'').slice(0,10)} ~ ${(x.p.end||'').slice(0,10)}</td>
                            <td class="num" style="text-align:right">${x.val>0 ? '₩'+x.val.toLocaleString() : '<span style="color:#ccc">미기록</span>'}</td>
                        </tr>`;
                    });
                    html += `</tbody></table></div>`;
                });
                html += `</div>`;
                panel.innerHTML = html;
                panel.scrollIntoView({ behavior:'smooth', block:'nearest' });
            },

            // 예정(미진행) 프로모션 기대매출 예측
            renderUpcomingForecast(scopeData, allGroups, chLabel) {
                const today = this.todayStr || new Date().toISOString().slice(0,10);
                // 시작일이 오늘보다 미래인 프로모션
                const upcoming = scopeData.filter(p => (p.start||'') > today)
                    .sort((a,b)=> (a.start>b.start?1:a.start<b.start?-1:0));

                let html = `<div class="analysis-section">
                    <h2>🗓️ ${chLabel} 예정 프로모션 기대 매출</h2>
                    <div class="sub">아직 시작하지 않은 프로모션을, 과거 같은 유형의 실제 매출 평균으로 예측합니다. (오늘 ${today} 기준)</div>`;

                if (upcoming.length === 0) {
                    html += `<div class="ana-empty">예정된(미시작) 프로모션이 없습니다.</div></div>`;
                    return html;
                }

                // 유형별 과거 실적 맵 (해당 채널 그룹에서 평균/변동성)
                // allGroups의 key = platformKey::type
                const groupByKey = {};
                allGroups.forEach(g => { groupByKey[g.platformKey + '::' + g.type] = g; });

                html += `<div class="table-scroll"><table class="ana-table">
                    <thead><tr>
                        <th>플랫폼</th><th>프로모션</th><th>시작</th><th class="num">D-day</th>
                        <th class="num">기대매출</th><th class="num">예측근거</th>
                    </tr></thead><tbody>`;

                upcoming.forEach((p, idx) => {
                    const type = this.extractType(p.name);
                    const gk = (p.key||'other') + '::' + type;
                    const g = groupByKey[gk];
                    // 과거 매출 실적이 있는 같은 유형 그룹
                    const hasHistory = g && g.salesCount > 0;
                    const dday = this.daysBetween(today, p.start);
                    let forecastCell, basisCell;
                    if (hasHistory) {
                        forecastCell = '₩' + g.avgSales.toLocaleString() +
                            (g.stdev ? ` <span style="color:var(--ink-faint);font-size:11px">±${(g.stdev/10000).toFixed(0)}만</span>` : '');
                        basisCell = `${type} ${g.salesCount}회 평균`;
                    } else {
                        forecastCell = '<span style="color:var(--ink-faint)">과거 실적 없음</span>';
                        basisCell = '<span style="color:#ccc">신규 유형</span>';
                    }
                    html += `<tr>
                        <td><span class="badge" style="background:${this.platColor(p.key)}">${this.platName(p.key)}</span></td>
                        <td style="max-width:280px">${this.esc(p.name)}</td>
                        <td style="color:#999">${(p.start||'').slice(0,10)}</td>
                        <td class="num"><span class="badge" style="background:${dday<=7?'#e8590c':'var(--ink-soft)'}">D-${dday}</span></td>
                        <td class="num">${forecastCell}</td>
                        <td class="num" style="color:var(--ink-soft)">${basisCell}</td>
                    </tr>`;
                });
                html += `</tbody></table></div></div>`;
                return html;
            },

            daysBetween(from, to) {
                const a = new Date(from + 'T00:00:00');
                const b = new Date((to||'').slice(0,10) + 'T00:00:00');
                return Math.max(0, Math.round((b - a) / 86400000));
            },

            // 다가오는 시즌 예측 (작년 같은 달 패턴 분석)
            renderSeasonForecast(scopeData, chLabel) {
                const today = this.todayStr || new Date().toISOString().slice(0,10);
                const curYear = parseInt(today.slice(0,4), 10);
                const curMonth = parseInt(today.slice(5,7), 10);
                // 대상 월: 이번 달 ~ 2달 후 (예: 6,7,8)
                const targetMonths = [curMonth, curMonth+1, curMonth+2].map(m => ((m-1)%12)+1);
                const lastYear = curYear - 1;
                const monthLabel = targetMonths.join('·') + '월';

                const eff = (p) => (p.actualSales != null && p.actualSales > 0) ? p.actualSales : (p.sales || 0);

                // 작년 같은 달에 진행한 프로모션 수집
                const lastYearPromos = scopeData.filter(p => {
                    const s = (p.start||'');
                    if (s.slice(0,4) !== String(lastYear)) return false;
                    const m = parseInt(s.slice(5,7), 10);
                    return targetMonths.includes(m);
                });

                let html = `<div class="analysis-section">
                    <h2>🔭 ${chLabel} 다가오는 시즌 예측 (${monthLabel})</h2>
                    <div class="sub">올해 ${monthLabel}에 어떤 프로모션이 예상되는지, 작년(${lastYear}년) 같은 시기 실적을 분석해 추정합니다.</div>`;

                if (lastYearPromos.length === 0) {
                    html += `<div class="ana-empty">작년 ${monthLabel}에 진행한 프로모션 기록이 없습니다.</div></div>`;
                    return html;
                }

                // 유형별 그룹화 (작년 같은 시기)
                const byType = {};
                lastYearPromos.forEach(p => {
                    const type = this.extractType(p.name);
                    if (!byType[type]) byType[type] = { type, items: [], month: parseInt((p.start||'').slice(5,7),10) };
                    byType[type].items.push(p);
                });

                const rows = Object.values(byType).map(g => {
                    const withSales = g.items.filter(i => eff(i) > 0);
                    const total = g.items.reduce((s,i)=>s+eff(i),0);
                    const avg = withSales.length ? Math.round(total/withSales.length) : 0;
                    return {
                        type: g.type,
                        month: g.month,
                        count: g.items.length,
                        salesCount: withSales.length,
                        avg,
                        lastTotal: total,
                        sample: g.items[0]
                    };
                }).sort((a,b)=> b.avg - a.avg);

                // 예상 총 매출 (작년 같은 시기 합계)
                const expectedTotal = rows.reduce((s,r)=>s+r.lastTotal,0);

                html += `<div class="stat-cards">
                    <div class="stat-card"><div class="label">예상 프로모션 유형</div><div class="value">${rows.length}종</div></div>
                    <div class="stat-card"><div class="label">작년 동기 진행 횟수</div><div class="value">${lastYearPromos.length}건</div></div>
                    <div class="stat-card"><div class="label">작년 동기 매출 합계</div><div class="value small">₩${expectedTotal.toLocaleString()}</div></div>
                </div>`;

                html += `<div class="table-scroll"><table class="ana-table">
                    <thead><tr>
                        <th>예상 프로모션 유형</th><th class="num">예상 시기</th>
                        <th class="num">작년 진행</th><th class="num">기대매출(작년 평균)</th>
                        <th>예시</th>
                    </tr></thead><tbody>`;
                rows.forEach(r => {
                    const canFc = r.salesCount > 0;
                    const fc = canFc ? '₩'+r.avg.toLocaleString() : '<span style="color:var(--ink-faint)">실적 없음</span>';
                    html += `<tr>
                        <td>${this.esc(r.type)}</td>
                        <td class="num">${r.month}월경</td>
                        <td class="num">${r.count}회</td>
                        <td class="num">${fc}</td>
                        <td style="color:#999;max-width:220px;font-size:12px">${this.esc(r.sample ? r.sample.name : '')}</td>
                    </tr>`;
                });
                html += `</tbody></table></div>
                    <div class="sub" style="margin:0.75rem 0 0;">※ 작년 동기 실적 기반 추정입니다. 올해 실제 운영 계획에 따라 달라질 수 있습니다.</div>
                </div>`;
                return html;
            }
        };
        
        document.getElementById('analyzeFile').addEventListener('change', function(e) {
            cal.analyzeFile(e);
        });
        
        cal.init();
    </script>
</body>
</html>
