<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VLVD 프로모션 캘린더</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root {
            --bg: #f6f7f9;
            --surface: #ffffff;
            --surface-2: #f8f9fb;
            --ink: #1a1d21;
            --ink-soft: #5b6470;
            --ink-faint: #99a1ad;
            --line: #e8eaed;
            --line-soft: #f0f1f3;
            --accent: #1a1d21;
            --radius-lg: 20px;
            --radius-md: 14px;
            --radius-sm: 10px;
            --shadow-card: 0 1px 3px rgba(16,24,40,0.04), 0 1px 2px rgba(16,24,40,0.03);
            --shadow-soft: 0 4px 16px rgba(16,24,40,0.06);
            --font: 'Pretendard', 'Pretendard Variable', -apple-system, BlinkMacSystemFont, system-ui, 'Segoe UI', 'Noto Sans KR', sans-serif;
            --sidebar-w: 240px;
            --content-max: 1600px;
            --analysis-max: 1280px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font); background: var(--bg); color: var(--ink); -webkit-font-smoothing: antialiased; letter-spacing: -0.01em; }
        .container { display: flex; height: 100vh; flex-direction: column; }
        .top-bar { 
            background: var(--surface); 
            border-bottom: 1px solid var(--line); 
            padding: 0.85rem 2rem; 
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            gap: 2rem;
        }
        .month-control { display: flex; align-items: center; gap: 1rem; }
        .topbar-left { display: flex; align-items: center; gap: 1.25rem; flex-wrap: wrap; }
        .calendar-toolbar { display: flex; align-items: center; justify-content: flex-end; margin-bottom: 0.75rem; }
        .forecast-toggle { display: inline-flex; align-items: center; gap: 0.45rem; font-size: 13px; font-weight: 600; color: var(--ink-soft); cursor: pointer; padding: 0.45rem 0.85rem; background: var(--surface); border: 1px solid var(--line); border-radius: 999px; user-select: none; }
        .forecast-toggle input { cursor: pointer; }
        .forecast-toggle:hover { background: var(--surface-2); }
        .month-btn { background: var(--surface-2); border: 1px solid var(--line); width: 34px; height: 34px; border-radius: var(--radius-sm); cursor: pointer; font-size: 13px; color: var(--ink-soft); transition: all 0.18s; display: inline-flex; align-items: center; justify-content: center; }
        .month-btn:hover { background: #eef0f3; color: var(--ink); }
        .month-label { font-size: 16px; font-weight: 700; min-width: 130px; text-align: center; letter-spacing: -0.02em; }
        
        .controls-center { 
            display: flex; 
            align-items: center; 
            justify-content: center;
            gap: 2rem;
        }
        
        .channel-filter { display: flex; gap: 0.4rem; flex-wrap: wrap; }
        .channel-btn { padding: 0.45rem 0.95rem; border: 1px solid var(--line); border-radius: 999px; cursor: pointer; font-size: 12.5px; font-weight: 500; background: var(--surface); color: var(--ink-soft); transition: all 0.18s; }
        .channel-btn:hover { background: var(--surface-2); }
        .channel-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
        
        .platform-links { 
            display: flex; 
            gap: 0.6rem;
        }
        
        .platform-link { 
            display: flex; 
            align-items: center; 
            justify-content: center;
            min-width: 60px;
            height: 40px;
            border-radius: var(--radius-sm); 
            border: 1px solid var(--line);
            text-decoration: none; 
            cursor: pointer;
            transition: all 0.18s;
            background: var(--accent);
            color: #fff;
            font-size: 12.5px;
            font-weight: 600;
            padding: 0 0.9rem;
            text-align: center;
        }
        
        .platform-link:hover { 
            transform: translateY(-2px);
            box-shadow: var(--shadow-soft);
        }
        
        .controls-right {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            justify-content: flex-end;
        }
        
        .view-buttons { display: flex; gap: 0.25rem; background: var(--surface-2); padding: 3px; border-radius: var(--radius-sm); border: 1px solid var(--line); }
        .view-btn { background: transparent; border: none; padding: 0.4rem 0.8rem; border-radius: 7px; cursor: pointer; font-size: 12.5px; font-weight: 500; color: var(--ink-soft); transition: all 0.18s; }
        .view-btn.active { background: var(--surface); color: var(--ink); font-weight: 600; box-shadow: 0 1px 2px rgba(16,24,40,0.06); }
        
        .settings-btn { background: var(--surface-2); border: 1px solid var(--line); width: 38px; height: 38px; border-radius: var(--radius-sm); cursor: pointer; font-size: 14px; transition: all 0.18s; }
        .settings-btn:hover { background: #eef0f3; }
        
        .upload-btn { background: var(--surface-2); border: 1px solid var(--line); color: var(--ink); padding: 0.5rem 0.95rem; border-radius: var(--radius-sm); cursor: pointer; font-size: 12.5px; font-weight: 600; transition: all 0.18s; }
        .upload-btn:hover { background: #eef0f3; }
        
        .main { flex: 1; display: block; background: var(--bg); overflow-y: auto; }
        .content { flex: 1; padding: 2.25rem 2rem 3rem; max-width: var(--content-max); margin: 0 auto; width: 100%; }
        .calendar { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius-lg); padding: 1.5rem; box-shadow: var(--shadow-card); }
        

        .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); gap: 0.6rem; margin-bottom: 1rem; border-bottom: 1px solid var(--line); padding-bottom: 0.75rem; }
        .weekday { text-align: center; font-size: 14px; font-weight: 600; color: var(--ink-faint); padding: 0.4rem; letter-spacing: 0.02em; }
        
        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 0.6rem;
            grid-auto-rows: 1fr;
            align-items: stretch;
        }
        
        .day-cell {
            min-height: 110px;
            border: 1px solid var(--line);
            border-radius: var(--radius-md);
            padding: 0.85rem;
            background: var(--surface-2);
            cursor: pointer;
            transition: all 0.18s;
            font-size: 14px;
            font-weight: 600;
            color: var(--ink-soft);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        .day-cell:hover { background: #eef0f3; border-color: #d8dce1; }
        .day-cell.empty { background: transparent; border: none; cursor: default; }
        .day-cell.has-promo { background: var(--surface); }
        
        .day-cell.today {
            background: var(--surface);
            border: 1.5px solid var(--ink);
            box-shadow: 0 0 0 3px rgba(26,29,33,0.06);
        }
        
        .day-cell.today > div:first-child {
            color: var(--ink);
            font-weight: 700;
        }
        .forecast-chip {
            margin-top: 0.25rem; padding: 0.25rem 0.4rem; border: 1px dashed; border-radius: 6px;
            font-size: 10px; font-weight: 600; background: var(--surface);
            display: flex; align-items: center; gap: 0.25rem; line-height: 1.3;
            white-space: normal; word-break: break-word; opacity: 0.92;
        }
        .forecast-chip .fc-tag { color: #fff; font-size: 8.5px; padding: 0.05rem 0.3rem; border-radius: 4px; flex-shrink: 0; }
        
        .promo-item {
            padding: 0.6rem 0.7rem;
            font-size: 13px;
            color: #fff;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
            margin-top: 0.4rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: all 0.2s;
            line-height: 1.35;
            border-radius: 12px;
        }
        
        .promo-item:hover { opacity: 0.9; }
        
        .promo-item.first { 
            border-radius: 12px 0 0 12px;
            margin-right: -2px;
            padding-right: 0.6rem;
        }
        
        .promo-item.middle { 
            border-radius: 0;
            margin-left: -2px;
            margin-right: -2px;
            padding-left: 0.7rem;
            padding-right: 0.7rem;
        }
        
        .promo-item.last { 
            border-radius: 0 12px 12px 0;
            margin-left: -2px;
            padding-left: 0.6rem;
        }
        
        .promo-item.single { 
            border-radius: 12px;
            margin-left: 0;
            margin-right: 0;
        }
        
        .b-29cm { background: var(--color-29cm); }
        .b-musinsa { background: var(--color-musinsa); }
        .b-own { background: var(--color-own); }
        .b-global { background: var(--color-global); }
        
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 1rem; }
        .modal.show { display: flex; }
        .modal-box { background: #fff; border-radius: 8px; padding: 2rem; max-width: 700px; width: 100%; max-height: 90vh; overflow-y: auto; box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; border-bottom: 1px solid #e0e0e0; padding-bottom: 1rem; }
        .modal-header h2 { font-size: 18px; font-weight: 600; }
        .close { background: none; border: none; font-size: 24px; cursor: pointer; color: #999; }
        .form-group { margin-bottom: 1.5rem; }
        .form-label { font-size: 11px; font-weight: 600; color: #666; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-input { width: 100%; padding: 0.7rem 0.85rem; border: 1px solid var(--line); border-radius: var(--radius-sm); font-size: 14px; font-family: inherit; color: var(--ink); background: var(--surface); }
        .form-input:focus { outline: none; border-color: var(--ink); box-shadow: 0 0 0 3px rgba(26,29,33,0.07); }
        .form-value { font-size: 14px; padding: 0.75rem; background: #f5f5f5; border-radius: 4px; word-break: break-all; }
        .form-buttons { display: flex; gap: 1rem; margin-top: 2rem; }
        .btn { padding: 0.75rem 1.5rem; border: 1px solid #e0e0e0; border-radius: 4px; cursor: pointer; flex: 1; font-size: 14px; font-weight: 600; transition: all 0.2s; }
        .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
        .btn-primary:hover { opacity: 0.88; }
        .btn-secondary { background: var(--surface-2); color: var(--ink); border: 1px solid var(--line); }
        .btn-secondary:hover { background: #eef0f3; }
        
        .file-input-btn {
            padding: 1rem;
            background: #f9f9f9;
            border: 2px dashed #d0d0d0;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            text-align: center;
            transition: all 0.2s;
            display: block;
            width: 100%;
            font-weight: 600;
            color: #666;
        }
        
        .file-input-btn:hover {
            background: #f0f7ff;
            border-color: #1976d2;
            color: #1976d2;
        }
        
        .file-input-btn.active {
            background: #f0f7ff;
            border-color: #388e3c;
            color: #388e3c;
        }
        
        .file-info {
            font-size: 12px;
            color: #666;
            margin-top: 0.5rem;
            word-break: break-all;
            text-align: center;
        }
        
        .file-info.selected {
            color: #388e3c;
            font-weight: 600;
        }
        
        #analyzeFile {
            display: none;
        }
        
        .color-picker-group {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }
        
        .color-item {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .color-label {
            font-size: 12px;
            font-weight: 600;
            color: #666;
            min-width: 70px;
        }
        
        .color-input-wrapper {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex: 1;
        }
        
        .color-input {
            width: 50px;
            height: 40px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            cursor: pointer;
        }
        
        .color-value {
            font-size: 12px;
            color: #999;
            font-family: monospace;
        }
        
        .analysis-info {
            background: #f0f7ff;
            border: 1px solid #b3e5fc;
            border-radius: 6px;
            padding: 1rem;
            margin-bottom: 1.5rem;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            margin: 0.6rem 0;
            gap: 1rem;
        }
        
        .info-label {
            font-weight: 600;
            color: #666;
            min-width: 80px;
        }
        
        .info-value {
            color: #1976d2;
            font-weight: 600;
            flex: 1;
        }
        
        .info-row input,
        .info-row select {
            flex: 1;
            padding: 0.5rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 12px;
        }
        
        .platform-banner {
            background: var(--surface);
            border: 1px solid var(--line);
            padding: 1.1rem 1.5rem;
            margin-top: 1.5rem;
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            gap: 1.5rem;
            box-shadow: var(--shadow-card);
        }
        
        .banner-label {
            font-size: 12.5px;
            font-weight: 600;
            color: var(--ink-soft);
            min-width: 100px;
            white-space: nowrap;
        }
        
        .platform-banner .platform-links {
            display: flex;
            gap: 0.75rem;
            flex: 1;
        }
        
        .platform-banner .platform-link {
            flex: 1;
            padding: 0.5rem 1rem;
            border-radius: var(--radius-sm);
            border: 1px solid var(--accent);
            text-decoration: none;
            cursor: pointer;
            transition: all 0.18s;
            background: var(--accent);
            color: #fff;
            font-size: 12.5px;
            font-weight: 600;
            text-align: center;
            min-width: auto;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .platform-banner .platform-link:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-soft);
        }

        /* ===== 페이지 네비게이션 ===== */
        .nav-buttons { display: flex; gap: 0.25rem; background: var(--surface-2); padding: 4px; border-radius: 999px; border: 1px solid var(--line); }
        .nav-btn {
            padding: 0.5rem 1.1rem; border: none; border-radius: 999px;
            cursor: pointer; font-size: 13px; background: transparent; font-weight: 600;
            transition: all 0.18s; color: var(--ink-soft);
        }
        .nav-btn.active { background: var(--surface); color: var(--ink); box-shadow: 0 1px 3px rgba(16,24,40,0.08); }
        .nav-btn:hover:not(.active) { color: var(--ink); }

        .page { display: none; }
        .page.active { display: block; }

        /* 캘린더 위 필터바 */
        .calendar-filter-bar {
            display: flex; align-items: center; gap: 0.75rem;
            padding: 0.75rem 0; margin-bottom: 0.5rem; flex-wrap: wrap;
        }
        .calendar-filter-bar .filter-label { font-size: 12.5px; color: var(--ink-faint); font-weight: 600; margin-right: 0.25rem; }

        /* ===== 분석 페이지 ===== */
        .analysis-wrap { padding: 2.25rem 2rem 3rem; max-width: var(--analysis-max); margin: 0 auto; width: 100%; }
        .analysis-section { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius-lg); padding: 1.75rem; margin-bottom: 1.5rem; box-shadow: var(--shadow-card); }
        .analysis-section h2 { font-size: 19px; margin-bottom: 0.4rem; color: var(--ink); letter-spacing: -0.02em; font-weight: 700; }
        .analysis-section .sub { font-size: 13px; color: var(--ink-faint); margin-bottom: 1.4rem; line-height: 1.6; }

        .stat-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 1.25rem; }
        .stat-card { background: var(--surface-2); border: 1px solid var(--line-soft); border-radius: var(--radius-md); padding: 1.2rem 1.3rem; }
        .stat-card .label { font-size: 12px; color: var(--ink-faint); margin-bottom: 0.5rem; font-weight: 500; }
        .stat-card .value { font-size: 26px; font-weight: 700; color: var(--ink); letter-spacing: -0.03em; }
        .stat-card .value.small { font-size: 26px; letter-spacing: -0.04em; }

        .ana-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .ana-table th, .ana-table td { padding: 0.7rem 0.85rem; text-align: left; border-bottom: 1px solid var(--line-soft); }
        .ana-table th { background: var(--surface-2); font-weight: 600; color: var(--ink-soft); position: sticky; top: 0; cursor: pointer; user-select: none; font-size: 12px; }
        .ana-table th:hover { background: #eef1f3; }
        .ana-table td.num, .ana-table th.num { text-align: right; font-variant-numeric: tabular-nums; }
        .ana-table tbody tr:hover { background: var(--surface-2); }
        .ana-table.align-left th, .ana-table.align-left td,
        .ana-table.align-left td.num, .ana-table.align-left th.num { text-align: left; }
        .table-scroll { max-height: 460px; overflow-y: auto; border: 1px solid var(--line-soft); border-radius: var(--radius-md); }

        .badge { display: inline-block; padding: 0.2rem 0.55rem; border-radius: 999px; font-size: 11px; font-weight: 600; color: #fff; }

        .bar-track { background: var(--line); border-radius: 999px; height: 7px; overflow: hidden; min-width: 60px; }
        .bar-fill { height: 100%; border-radius: 4px; }

        .forecast-controls { display: flex; gap: 0.75rem; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; }
        .forecast-controls select, .forecast-controls input {
            padding: 0.5rem 0.75rem; border: 1px solid var(--line); border-radius: var(--radius-sm); font-size: 13px;
        }
        .ana-empty { padding: 3rem; text-align: center; color: var(--ink-faint); font-size: 14px; }
        .sync-status { font-size: 12px; color: #888; margin-left: auto; }

        /* ===== 반응형 ===== */
        html, body { max-width: 100%; overflow-x: hidden; }
        @media (max-width: 900px) {
            .top-bar { grid-template-columns: 1fr; gap: 0.75rem; padding: 0.85rem 1rem; }
            .controls-center { justify-content: flex-start; }
            .controls-right { justify-content: flex-start; flex-wrap: wrap; }
            .content, .analysis-wrap { padding-left: 1rem; padding-right: 1rem; }
            .platform-banner { flex-direction: column; align-items: stretch; gap: 0.75rem; }
            .platform-banner .platform-links { flex-direction: column; }
        }
        @media (max-width: 640px) {
            .weekdays { gap: 0.25rem; }
            .cal-grid { gap: 0.25rem; }
            .day-cell { min-height: 44px; padding: 0.4rem; font-size: 11px; }
            .promo-item { font-size: 10px; padding: 0.35rem 0.4rem; }
            .stat-cards { grid-template-columns: 1fr 1fr; }
        }
        /* ===== 분석 채널 탭 / 정렬 / 차트 ===== */
        .analysis-topbar {
            display: flex; align-items: center; justify-content: space-between;
            gap: 1rem; margin-bottom: 1.25rem; flex-wrap: wrap;
        }
        .ch-tabs { display: flex; gap: 0.4rem; background: var(--surface); padding: 5px; border-radius: 999px; border: 1px solid var(--line); box-shadow: var(--shadow-card); }
        .ch-tab { padding: 0.5rem 1.2rem; border: none; border-radius: 999px; cursor: pointer; font-size: 13.5px; font-weight: 600; background: transparent; color: var(--ink-soft); transition: all 0.18s; }
        .ch-tab.active { background: var(--accent); color: #fff; }
        .ch-tab:hover:not(.active) { background: var(--surface-2); color: var(--ink); }
        .sort-toggle { display: flex; gap: 0.25rem; background: var(--surface-2); padding: 4px; border-radius: var(--radius-sm); border: 1px solid var(--line); }
        .sort-btn { padding: 0.45rem 0.9rem; border: none; border-radius: 7px; cursor: pointer; font-size: 12.5px; font-weight: 600; background: transparent; color: var(--ink-soft); transition: all 0.18s; }
        .sort-btn.active { background: var(--surface); color: var(--ink); box-shadow: 0 1px 2px rgba(16,24,40,0.08); }
        .chart-box { background: var(--surface-2); border: 1px solid var(--line-soft); border-radius: var(--radius-md); padding: 1rem 1.25rem; margin-bottom: 1.25rem; min-height: 80px; }
        .chart-box.ana-empty { display: flex; align-items: center; justify-content: center; }
        .chart-hint { font-size: 11.5px; color: var(--ink-faint); text-align: center; margin-bottom: 0.5rem; }

        /* 드릴다운 패널 */
        .drilldown { background: var(--surface-2); border: 1px solid var(--line); border-radius: var(--radius-md); padding: 1.25rem 1.4rem; margin: 0.5rem 0 1.25rem; }
        .drilldown-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.4rem; }
        .dd-badge { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 999px; font-size: 12px; font-weight: 700; color: #fff; }
        .dd-title { font-size: 15px; font-weight: 700; margin-left: 0.4rem; }
        .dd-close { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius-sm); padding: 0.35rem 0.7rem; font-size: 12px; cursor: pointer; color: var(--ink-soft); }
        .dd-close:hover { background: #eef0f3; }
        .dd-summary { font-size: 13px; color: var(--ink-soft); margin-bottom: 1rem; font-weight: 600; }
        .dd-tier { background: var(--surface); border: 1px solid var(--line-soft); border-radius: var(--radius-sm); padding: 0.9rem 1rem; margin-bottom: 0.85rem; }
        .dd-tier-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.6rem; flex-wrap: wrap; gap: 0.5rem; }

            // 파일명에서 날짜 추출
            // 지원: _0601-0611 (연속), _0618.0627 (회차 여러날), _20260601-20260611 (연도포함)
            parseDatesFromFilename(fileName) {
                const yr = new Date().getFullYear();
                let base = fileName.replace(/\.(xlsx|xls|csv)$/i, '');
                let m;

                // 1) YYYY.MM.DD-YYYY.MM.DD 또는 YYYYMMDD-YYYYMMDD (연도 포함 연속)
                m = base.match(/(\d{4})[.\-]?(\d{2})[.\-]?(\d{2})\s*[-~]\s*(\d{4})[.\-]?(\d{2})[.\-]?(\d{2})/);
                if (m) {
                    return { ranges: [{ start: `${m[1]}-${m[2]}-${m[3]}`, end: `${m[4]}-${m[5]}-${m[6]}` }] };
                }
                // 2) MM.DD-MM.DD (점 있는 연속) ← 07.01-07.12
                m = base.match(/(?:^|[_\s])(\d{2})\.(\d{2})\s*[-~]\s*(\d{2})\.(\d{2})(?:$|[_\s.])/);
                if (m) {
                    return { ranges: [{ start: `${yr}-${m[1]}-${m[2]}`, end: `${yr}-${m[3]}-${m[4]}` }] };
                }
                // 3) MMDD-MMDD (점 없는 연속) ← 0701-0712
                m = base.match(/(?:^|[_\s])(\d{2})(\d{2})\s*[-~]\s*(\d{2})(\d{2})(?:$|[_\s])/);
                if (m) {
                    return { ranges: [{ start: `${yr}-${m[1]}-${m[2]}`, end: `${yr}-${m[3]}-${m[4]}` }] };
                }
                // 4) MMDD.MMDD(.MMDD...) (점 구분 회차, 각 4자리) ← 0618.0627
                m = base.match(/(?:^|[_\s])((?:\d{4})(?:\.\d{4})+)(?:$|[_\s])/);
                if (m) {
                    const days = m[1].split('.').map(d => ({ start: `${yr}-${d.slice(0,2)}-${d.slice(2,4)}`, end: `${yr}-${d.slice(0,2)}-${d.slice(2,4)}` }));
                    return { ranges: days };
                }
                // 5) 단일 YYYYMMDD 또는 YYYY.MM.DD
                m = base.match(/(?:^|[_\s])(\d{4})[.\-]?(\d{2})[.\-]?(\d{2})(?:$|[_\s])/);
                if (m) {
                    return { ranges: [{ start: `${m[1]}-${m[2]}-${m[3]}`, end: `${m[1]}-${m[2]}-${m[3]}` }] };
                }
                // 6) 단일 MM.DD (점 있는 단일) ← 07.01
                m = base.match(/(?:^|[_\s])(\d{2})\.(\d{2})(?:$|[_\s])/);
                if (m) {
                    return { ranges: [{ start: `${yr}-${m[1]}-${m[2]}`, end: `${yr}-${m[1]}-${m[2]}` }] };
                }
                // 7) 단일 MMDD (점 없는 단일) ← 0429
                m = base.match(/(?:^|[_\s])(\d{2})(\d{2})(?:$|[_\s])/);
                if (m) {
                    return { ranges: [{ start: `${yr}-${m[1]}-${m[2]}`, end: `${yr}-${m[1]}-${m[2]}` }] };
                }
                return { ranges: [] };
            },

            // 파일명에서 프로모션명만 추출 (브랜드명·날짜 제거)
            // 예: 비바라비다_이구익스클루시브_일반할인_0701-0712 → 이구익스클루시브_일반할인
            extractPromoName(fileName) {
                let base = fileName.replace(/\.(xlsx|xls|csv)$/i, '');
                const brands = ['비바라비다', 'VLVD', 'vlvd'];
                // 날짜로 보이는 조각인지 판별
                const isDateChunk = (s) => {
                    return /^\d{4}([.\-~]\d{4})*$/.test(s)            // 0701, 0701-0712, 0618.0627
                        || /^\d{8}([.\-~]\d{8})*$/.test(s)            // 20260701, 20260701-20260712
                        || /^\d{2}\.\d{2}([.\-~]\d{2}\.\d{2})*$/.test(s)  // 07.01, 07.01-07.12
                        || /^\d{4}\.\d{2}\.\d{2}([.\-~]\d{4}\.\d{2}\.\d{2})*$/.test(s); // 2026.07.01-...
                };
                let parts = base.split('_').map(s => s.trim()).filter(s => s.length > 0);
                // 맨 앞 브랜드명 제거
                if (parts.length > 1 && brands.some(b => parts[0] === b || parts[0].startsWith('(' + b))) {
                    parts.shift();
                }
                // 날짜 조각 제거
                parts = parts.filter(s => !isDateChunk(s));
                const name = parts.join('_').trim();
                return name || base;  // 다 지워지면 원본 유지
            },

            analyzeFile(event) {
                const file = event.target.files[0];
                if (!file) return;

                const fileBtn = document.querySelector('.file-input-btn');
                const fileStatus = document.getElementById('fileStatus');

                fileBtn.classList.add('active');
                fileStatus.textContent = '📂 분석 중...';
                fileStatus.classList.remove('selected');

                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        // SheetJS로 정상 파싱 (상품 수 카운트)
                        let skuCount = 0;
                        try {
                            const wb = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
                            const ws = wb.Sheets[wb.SheetNames[0]];
                            const rows = XLSX.utils.sheet_to_json(ws, { header: 1 });
                            // 상품번호가 숫자인 행만 카운트 (헤더/안내문 제외)
                            skuCount = rows.filter(r => r && r[0] != null && /^\d{5,}$/.test(String(r[0]).trim())).length;
                            if (skuCount === 0) {
                                // 폴백: 비어있지 않은 데이터 행 - 헤더 추정 4행
                                skuCount = Math.max(0, rows.filter(r => r && r.some(c => c != null && String(c).trim() !== '')).length - 4);
                            }
                        } catch (xe) { skuCount = 0; }

                        const fileName = file.name.replace(/\.(xlsx|xls|csv)$/i, '');
                        // 파일명에서 날짜 추출
                        const parsed = this.parseDatesFromFilename(file.name);
                        const ranges = parsed.ranges;

                        let result = {
                            fileName: file.name,
                            file: file,
                            brand: '비바라비다',
                            promotionName: this.extractPromoName(file.name),
                            platform: '29cm',
                            skuCount: skuCount,
                            ranges: ranges,  // 회차 날짜 배열
                            startDate: ranges.length ? ranges[0].start : '',
                            endDate: ranges.length ? ranges[0].end : ''
                        };

                        this.analyzedData = result;
                        this.showAnalysisResult(result);
                        const dateMsg = ranges.length
                            ? `✓ ${file.name} 분석 완료! (회차 ${ranges.length}개 인식)`
                            : `✓ ${file.name} 분석 완료! (날짜는 직접 선택해주세요)`;
                        fileStatus.textContent = dateMsg;
                        fileStatus.classList.add('selected');
                    } catch (err) {
                        console.log('분석 오류:', err);
                        fileStatus.textContent = '❌ 분석 실패 - 파일 형식 확인';
                    }
                };
                reader.readAsArrayBuffer(file);
            },

                const ranges = (data.ranges && data.ranges.length) ? data.ranges : [{ start: '', end: '' }];
                this._rounds = ranges.map(r => ({ start: r.start, end: r.end }));

                const html = `

            renderRounds() {
                const c = document.getElementById('roundsContainer');
                if (!c) return;
                const multi = this._rounds.length > 1;
                c.innerHTML = this._rounds.map((r, i) => `
                    <div style="display:flex;gap:0.4rem;align-items:center;margin-bottom:0.4rem;">
                        ${multi ? `<span style="font-size:12px;color:#888;min-width:42px;font-weight:600;">${i+1}회차</span>` : ''}
                        <input type="date" value="${r.start}" onchange="cal.updateRound(${i},'start',this.value)" style="flex:1;padding:0.4rem;border:1px solid #ddd;border-radius:6px;">
                        <span style="color:#bbb;">~</span>
                        <input type="date" value="${r.end}" onchange="cal.updateRound(${i},'end',this.value)" style="flex:1;padding:0.4rem;border:1px solid #ddd;border-radius:6px;">
                        ${multi ? `<button type="button" onclick="cal.removeRound(${i})" style="background:#f3f3f3;border:none;border-radius:6px;width:28px;height:28px;cursor:pointer;color:#999;">×</button>` : ''}
                    </div>
                `).join('');
            },

            addRound() {
                // 마지막 회차 종료일 다음날을 기본값으로 제안
                const last = this._rounds[this._rounds.length - 1];
                let s = '', e = '';
                if (last && last.end) {
                    const d = new Date(last.end); d.setDate(d.getDate() + 1);
                    s = e = d.toISOString().slice(0, 10);
                }
                this._rounds.push({ start: s, end: e });
                this.renderRounds();
            },

            removeRound(i) {
                if (this._rounds.length <= 1) return;
                this._rounds.splice(i, 1);
                this.renderRounds();
            },

            updateRound(i, field, val) {
                if (this._rounds[i]) this._rounds[i][field] = val;
            },
            
            registerFromFile() {
                const promotionName = document.getElementById('ana-promo')?.value || this.analyzedData.promotionName;
                const platform = document.getElementById('ana-platform')?.value || this.analyzedData.platform;
                const rounds = (this._rounds || []).filter(r => r.start && r.end);

                if (!promotionName) {
                    alert('기획전 이름을 입력하세요');
                    return;
                }
                if (rounds.length === 0) {
                    alert('회차 일정을 1개 이상 입력하세요 (시작일·종료일)');
                    return;
                }
                for (const r of rounds) {
                    if (r.start > r.end) {
                        alert('시작날짜가 종료날짜보다 늦을 수 없습니다: ' + r.start);
                        return;
                    }
                }

                const platformMap = { '29cm': '29CM', 'musinsa': '무신사', 'own': '자사몰', 'global': '글로벌' };
                const multi = rounds.length > 1;
                const baseId = Date.now();
                const created = [];

                rounds.forEach((r, i) => {
                    const nm = multi ? `${promotionName} (${i+1}회차)` : promotionName;
                    const newPromo = {
                        id: 'file_' + baseId + '_' + i,
                        name: nm,
                        start: r.start,
                        end: r.end,
                        platform: platformMap[platform],
                        key: platform,
                        desc: this.analyzedData.fileName + ' (' + this.analyzedData.skuCount + '개)',
                        file: this.analyzedData.fileName,
                        sales: 0,
                        target: 0,
                        feedback: ''
                    };
                    this.data.push(newPromo);
                    created.push(newPromo);
                    // 파일은 첫 회차에만 업로드 (같은 파일이므로 중복 방지)
                    if (i === 0 && this.analyzedData && this.analyzedData.file) {
                        this.uploadFile(newPromo.id, this.analyzedData.file);
                    }
                    this.saveToSupabase(newPromo);
                });

                this.saveToLocalStorage();
                alert(`✓ ${promotionName} ${multi ? `(${rounds.length}개 회차) ` : ''}등록 완료!`);
                this.closeFileUpload();
                this.render();
            },

            getShort: k => ({'29cm':'29CM','musinsa':'무신사','own':'자사','global':'글로'}[k] || k),
            
            getPromoText(p) {
                if (this.view === 'brief') {
                    return this.getShort(p.key);
                } else if (this.view === 'standard') {
                    return this.getShort(p.key) + ' - ' + p.name;
                } else {
                    return this.getShort(p.key) + ' - ' + p.name + (p.desc ? '\n' + p.desc : '');
                }
            },
            
            addDays(dateStr, days) {
                const date = new Date(dateStr);
                date.setDate(date.getDate() + days);
                return date.toISOString().split('T')[0];
            },
            
            getPromoPosition(promoId, date) {
                const p = this.data.find(x => x.id === promoId);
                if (!p) return 'single';
                
                const prevDate = this.addDays(date, -1);
                const nextDate = this.addDays(date, 1);
                
                const hasPrev = p.start <= prevDate && prevDate <= p.end;
                const hasNext = p.start <= nextDate && nextDate <= p.end;
                
                if (!hasPrev && !hasNext) return 'single';
                if (!hasPrev && hasNext) return 'first';
                if (hasPrev && !hasNext) return 'last';
                if (hasPrev && hasNext) return 'middle';
                
                return 'single';
            },
            
            prevMonth() { this.month--; if (this.month < 1) { this.month = 12; this.year--; } this.render(); },
            nextMonth() { this.month++; if (this.month > 12) { this.month = 1; this.year++; } this.render(); },

                this.view = v;
                document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));

                document.getElementById('monthLabel').textContent = this.year + '년 ' + months[this.month - 1];
                
                const fd = new Date(this.year, this.month - 1, 1).getDay();
                const ld = new Date(this.year, this.month, 0).getDate();
                let html = '';

                // 작년 패턴 예측 (이 달에 표시할 것만 미리 계산)
                const forecastByDate = this.showForecastOnCalendar ? this.buildCalendarForecast() : {};
                
                for (let i = 0; i < fd; i++) html += '<div class="day-cell empty"></div>';
                
                for (let d = 1; d <= ld; d++) {

                    const isToday = date === this.todayStr;

                    if (this.view === 'brief') {

                    let cell = '<div class="day-cell' + (promos.length ? ' has-promo' : '') + (isToday ? ' today' : '') + '" onclick="cal.dayClick(\''+date+'\')">';

                    displayPromos.forEach(p => {
                        const txt = this.getPromoText(p);
                        const col = {'29cm':'b-29cm','musinsa':'b-musinsa','own':'b-own','global':'b-global'}[p.key] || 'b-29cm';
                        const pos = this.getPromoPosition(p.id, date);
                        if (this.view === 'detailed') {
                            // 자세히: 여러 줄 허용
                            const lines = txt.split('\n').length;
                            const height = Math.min(lines, 3) * 1.3 + 0.4;
                            cell += '<div class="promo-item ' + col + ' ' + pos + '" onclick="cal.showEdit(\''+p.id+'\'); event.stopPropagation();" title="'+p.name+'" style="min-height: ' + height + 'em; white-space: pre-wrap; word-break: break-word;">' + txt.split('\n').slice(0,3).join('\n') + '</div>';
                        } else {
                            // 약식·표준: 모든 카드 동일 높이(1줄 고정, 넘치면 …) → 칸 단차 방지
                            const oneLine = txt.replace(/\n/g, ' ');
                            cell += '<div class="promo-item ' + col + ' ' + pos + '" onclick="cal.showEdit(\''+p.id+'\'); event.stopPropagation();" title="'+p.name+'" style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">' + oneLine + '</div>';
                        }
                    });
                    // 작년 패턴 예측 칩
                    const fcs = forecastByDate[date];
                    if (fcs) {
                        fcs.forEach(f => {
                            if (this.filter !== 'all' && f.key !== this.filter) return;
                            const cmap = {'29cm':'#1976d2','musinsa':'#388e3c','own':'#f57c00','global':'#7b1fa2'};
                            const c = cmap[f.key] || '#888';
                            cell += '<div class="forecast-chip" style="border-color:'+c+';color:'+c+'" title="작년 패턴 예측: '+this.esc(f.name)+'">'
                                + '<span class="fc-tag" style="background:'+c+'">예측</span> '
                                + this.esc(f.short) + (f.expected>0 ? ' · ₩' + this.shortMoney(f.expected) : '') + '</div>';
                        });
                    }
                    cell += '</div>';
                    html += cell;
                }
                
                document.getElementById('calGrid').innerHTML = html;
            },

            // 캘린더 예측 토글
            toggleForecastOnCalendar(on) { this.showForecastOnCalendar = on; this.render(); },

            // 금액 축약 (123,400,000 → 1.2억 / 5,000,000 → 500만)
            shortMoney(v) {
                v = Number(v)||0;
                if (v>=100000000) return (v/100000000).toFixed(1)+'억';
                if (v>=10000) return Math.round(v/10000)+'만';
                return v.toLocaleString();
            },

            // 작년 같은 시기 프로모션 → 올해 같은 날짜의 예측 생성
            buildCalendarForecast() {
                this.applyActualSales && this.applyActualSales();
                const eff = (p) => (p.actualSales != null && p.actualSales > 0) ? p.actualSales : (p.sales || 0);
                const lastYear = this.year - 1;
                // 이번 달(작년 동월)에 시작한 프로모션
                const lastYearPromos = this.data.filter(p => {
                    const s = (p.start||'');
                    return s.slice(0,4)===String(lastYear) && parseInt(s.slice(5,7),10)===this.month;
                });
                // 유형별 평균매출 (해당 채널 전체 이력 기준)
                const groups = this.buildGroups();
                const groupAvg = {};
                Object.values(groups).forEach(g => { groupAvg[g.platformKey+'::'+g.type] = g.avgSales||0; });

                const byDate = {};
                lastYearPromos.forEach(p => {
                    const type = this.extractType(p.name);
                    const expected = groupAvg[(p.key||'other')+'::'+type] || eff(p) || 0;
                    // 작년 시작일의 '일'을 올해 같은 달/일로 매핑
                    const day = (p.start||'').slice(8,10);
                    const date = this.year + '-' + String(this.month).padStart(2,'0') + '-' + day;
                    if (!byDate[date]) byDate[date] = [];
                    byDate[date].push({
                        key: p.key, name: p.name,
                        short: this.platName(p.key) + ' ' + type,
                        expected
                    });
                });
                return byDate;
            },

                this.selectedFile = null;
                this.showForm(true);

            loadFromLocalStorage() {
                try {
                    const saved = localStorage.getItem('vlvd_promotions');
                    if (saved) {
                        const localData = JSON.parse(saved);
                        this.data = localData;

            // 파일 업로드
            uploadFile(promoId, file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const fileData = {
                        name: file.name,
                        size: file.size,
                        type: file.type,
                        data: e.target.result // Base64 인코딩
                    };
                    
                    fileStorage[promoId] = fileData;
                    console.log('✓ 파일 저장됨:', file.name);
                };
                reader.readAsArrayBuffer(file);
            },
            
            // 파일 다운로드
            downloadFile(promoId) {
                const fileData = fileStorage[promoId];
                if (!fileData) {
                    alert('파일이 없습니다');
                    return;
                }
                
                const blob = new Blob([fileData.data], { type: fileData.type });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = fileData.name;
                a.click();
                URL.revokeObjectURL(url);
                
                console.log('✓ 파일 다운로드:', fileData.name);
            },

            async deletePromo(id) {
                if (!confirm('정말 삭제하시겠습니까?')) {
                    return;
                }
                
                // 데이터에서 삭제
                this.data = this.data.filter(p => p.id !== id);
                
                // Local Storage 저장
                this.saveToLocalStorage();
                
                // Supabase에서 삭제
                if (supabaseClient && id.startsWith('sb_')) {
                    const supabaseId = id.replace('sb_', '');
                    try {
                        const { error } = await supabaseClient
                            .from(TABLE_NAME)
                            .delete()
                            .eq('id', supabaseId);
                        
                        if (!error) {
                            console.log('✓ Supabase에서 삭제됨');
                        }
                    } catch (err) {
                        console.log('Supabase 삭제 오류:', err);
                    }
                }
                
                // 파일도 삭제
                delete fileStorage[id];
                
                alert('프로모션이 삭제되었습니다');
                this.render();
